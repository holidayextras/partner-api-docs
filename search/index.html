      "hxapi-de-start-airport": {
        "title": "Availability at Car Park - DE-Start method",
        "content": "Availability at Car Park - DE-Start methodCar Park Availability RequestMethodGETEndpointThe endpoint to use is:https://api.holidayextras.co.uk/de-start/v1/carpark/CarParkCodeRequest ParametersNB: All parameter names are case sensitive.            Name      Data Type      Format      Mandatory?      Additional Information                  StartCustomer      String      [0-9] 6 chars      Y      This will be assigned to you by your Account Manager during set up.              BusinessUnit      String      [0-9] 3 chars      Y      This will be assigned to you by your Account Manager during set up.              Operator      String      [A-Z] 3 chars      Y      This always defaults to BJT.              key      String      [A-Z] 10 chars      Y      This will be assigned to you by your Account Manager during set up.              token      String      [0-9] 9 chars      Y      This is the same token used in the availability request.              ArrivalDate      Date      YYYY-MM-DD      Y      Date customer drops vehicle at car park.              ArrivalTime      Time      HHMM      Y      Time customer drops vehicle at car park.              DepartDate      Date      YYYY-MM-DD      Y      Date customer picks up vehicle from car park.              DepartTime      Time      HHMM      Y      Time customer picks up vehicle from car park.              NumberOfPax      Integer      [0-9] 2 chars      Y      Number of passengers.      Car Park Availability ResponseThe car park booking response will confirm that a booking has been placed in our system.For a detailed explanation of the fields returned, please see below:            Field      Additional Information                  CarPark/TotalPrice      Amount payable by the customer.              CarPark/BookingURL      The URL to POST the booking request to for this particular product.              CarPark/MoreInfoURL      The link to more information about this product, sourced from the Product Library.              API_Header/Request      The API returns every parameter and value you sent in the previous request.      Worked ExamplesBelow are worked examples of both the request and response for availability for car parking using the DE-Start method.Car Park Availability Request - DE-Start methodhttps://api.holidayextras.co.uk/de-start/sandbox/v1/carpark/FRA8?StartCustomer=YourStartCustomer&amp;BusinessUnit=YourBusinessUnit&amp;IInitials=BJT&amp;ArrivalDate=2018-12-01&amp;ArrivalTime=1200&amp;DepartDate=2018-12-08&amp;DepartTime=1400&amp;NumberOfPax=1&amp;key=YourKey&amp;token=YourTokenCar Park Availability Response - DE-Start method&lt;?xml version=\"1.0\" ?&gt;&lt;API_Reply Product=\"CarPark\" RequestCode=\"1\" Result=\"OK\"&gt;  &lt;CarPark c=\"1\"&gt;    &lt;CarDetails&gt;N&lt;/CarDetails&gt;    &lt;TotalPrice&gt;160.00&lt;/TotalPrice&gt;    &lt;GatePrice&gt;0.00&lt;/GatePrice&gt;    &lt;Name&gt;Airparks Parkhaus Frankfurt - Winterspecial&lt;/Name&gt;    &lt;Code&gt;FRA8&lt;/Code&gt;    &lt;Filter&gt;      &lt;recommended&gt;1&lt;/recommended&gt;    &lt;/Filter&gt;    &lt;BookingURL&gt;/carpark/FRA2&lt;/BookingURL&gt;    &lt;MoreInfoURL&gt;/product/FRA2&lt;/MoreInfoURL&gt;  &lt;/CarPark&gt;  &lt;API_Header&gt;    &lt;Request&gt;      &lt;StartCustomer&gt;YourStartCustomer&lt;/StartCustomer&gt;      &lt;BusinessUnit&gt;YourBusinessUnit&lt;/BusinessUnit&gt;      &lt;Initials&gt;BJT&lt;/Initials&gt;      &lt;ArrivalDate&gt;2018-12-01&lt;/ArrivalDate&gt;      &lt;ArrivalTime&gt;1200&lt;/ArrivalTime&gt;      &lt;DepartDate&gt;2018-12-08&lt;/DepartDate&gt;      &lt;DepartTime&gt;1400&lt;/DepartTime&gt;      &lt;NumberOfPax&gt;1&lt;/NumberOfPax&gt;      &lt;key&gt;YourKey&lt;/key&gt;      &lt;token&gt;YourToken&lt;/token&gt;    &lt;/Request&gt;  &lt;/API_Header&gt;&lt;/API_Reply&gt;",
        "url": "/hxapi/de-start/airport/"
      }
      ,
    
      "hxapi-lounge-av-airport": {
        "title": "Availability At Lounge",
        "content": "Availability At LoungeLounge Availability RequestMethodGETEndpointThe endpoint to use is:https://api.holidayextras.co.uk/v1/lounge/AirportCodeFor example, for lounge availability at Gatwick the endpoint is:https://api.holidayextras.co.uk/v1/lounge/LGWTo find the airport locations available for lounges, please refer to the locations endpoint.Request ParametersNB: All parameter names are case sensitive.            Name      Data Type      Format      Mandatory?      Additional Information                  ABTANumber      String      [A-Z0-9] 5 chars      Y      This is also known as an ‘agent code’. This will be confirmed to you by your Account Manager during set up.              Password      String      [A-Z0-9] 5 chars      Y*      Password required for retail agent requests - intermediaries do not require a password.This will be confirmed to you by your Account Manager during set up.              Initials      String      [A-Z] 3 chars      N      The initials of the Operator / Agent.              key      String      [A-Z]      Y      This will be assigned to you by your Account Manager during set up.              token      String      [0-9] 9 chars      Y      Please see user token endpoint for details of how to generate a token.              ArrivalDate      Date      YYYY-MM-DD      Y      Date customer enters the lounge.              ArrivalTime      Time      HHMM      Y      Time customer enters the lounge.              Adults      Integer      [0-4] 1 char      Y      Number of adults requiring entry to the lounge. Please note: a maximum of 6 passengers is permitted on any one booking.              Children      Integer      [0-3] 1 char      N      Number of children requiring entry to the lounge. Please note: a maximum of 6 passengers is permitted on any one booking.              Infants      Integer      1 char      N      Number of infants requiring entry to the lounge. Please note: a maximum of 6 passengers is permitted on any one booking.              OutFlight      String      [A-Z0-9] 9 chars      N      This is also known as an ‘flight number’. Used to establish which terminal the customer is flying from using our look up tool and return products specific to that terminal.              System      String      [A-Z] 3 chars      Y*      For European products, you need to pass in the value of System=ABG (the default is System=ABC, which is UK products only).              lang      String      [A-Z] 2 chars      Y*      Required for requests for European products. (Values available are en, de, it, es, pt and nl.)              fields      String      [A-Z] a csv list of product info fields      N      A list of product info fields can be passed in to return configurable product information e.g. fields=name,address,latitude,sellingpoint.      Lounge Availability ResponseThe lounge availability response will return the specific product requested, so long as it has availability on the specific dates and times. A summary of the request received can be found in the header field at the end of the response.For a detailed explanation of the fields returned, please see below:            Field      Additional Information                  Lounge/Price      The price of product without any surcharges/fees added.              Lounge/NonDiscPrice      The non discounted price. Some agent codes apply a discount so we return this field to enable a comparison.              Lounge/Name      The name of the lounge.              Lounge/Code      The product code for the lounge, which must be used in the booking request.              Lounge/BookingURL      The URL to POST the booking request to for this particular product.              Lounge/MoreInfoURL      The link to more information about this product, sourced from the Product Library.      Worked ExamplesBelow are worked examples of both the request and response for availability at an airport.UK Products Availability Requesthttps://api.holidayextras.co.uk/v1/lounge/LHR?ABTANumber=YourABTANumber&amp;Password=YourPassword&amp;Initials=YourInitials&amp;key=YourKey&amp;token=YourToken&amp;ArrivalDate=2018-12-01&amp;ArrivalTime=1200&amp;Adults=2&amp;Children=0UK Products Availability Response&lt;?xml version=\"1.0\"?&gt;&lt;API_Reply Product=\"Lounge\" RequestCode=\"1\" Result=\"OK\" cached=\"1\" expires=\"2018-01-11 12:24:54\"&gt;    &lt;Lounge&gt;        &lt;Name&gt;Plaza Premium T5 lounge - 3 hours&lt;/Name&gt;        &lt;Code&gt;LHRPA5&lt;/Code&gt;        &lt;BookingURL&gt;/v1/lounge/HPLHRPA5&lt;/BookingURL&gt;        &lt;MoreInfoURL&gt;/v1/product/LHRPA5&lt;/MoreInfoURL&gt;        &lt;NonDiscPrice&gt;80.00&lt;/NonDiscPrice&gt;        &lt;Price&gt;80.00&lt;/Price&gt;        &lt;terminal&gt;5&lt;/terminal&gt;        &lt;Filter&gt;            &lt;landside&gt;0&lt;/landside&gt;        &lt;/Filter&gt;        &lt;option_count&gt;14&lt;/option_count&gt;    &lt;/Lounge&gt;    &lt;Lounge&gt;        &lt;Name&gt;No1 Lounge, Terminal 3, Heathrow&lt;/Name&gt;        &lt;Code&gt;LHRNN3&lt;/Code&gt;        &lt;BookingURL&gt;/v1/lounge/HPLHRNN3&lt;/BookingURL&gt;        &lt;MoreInfoURL&gt;/v1/product/LHRNN3&lt;/MoreInfoURL&gt;        &lt;NonDiscPrice&gt;64.00&lt;/NonDiscPrice&gt;        &lt;Price&gt;64.00&lt;/Price&gt;        &lt;terminal&gt;3&lt;/terminal&gt;        &lt;Filter&gt;            &lt;landside&gt;0&lt;/landside&gt;        &lt;/Filter&gt;        &lt;option_count&gt;14&lt;/option_count&gt;    &lt;/Lounge&gt;    &lt;Lounge&gt;        &lt;Name&gt;SkyTeam Lounge T4&lt;/Name&gt;        &lt;Code&gt;LHRSTE&lt;/Code&gt;        &lt;BookingURL&gt;/v1/lounge/HPLHRSTE&lt;/BookingURL&gt;        &lt;MoreInfoURL&gt;/v1/product/LHRSTE&lt;/MoreInfoURL&gt;        &lt;NonDiscPrice&gt;60.00&lt;/NonDiscPrice&gt;        &lt;Price&gt;60.00&lt;/Price&gt;        &lt;terminal&gt;4&lt;/terminal&gt;        &lt;option_count&gt;14&lt;/option_count&gt;    &lt;/Lounge&gt;    &lt;Pricing&gt;        &lt;CCardSurchargePercent&gt;2.00&lt;/CCardSurchargePercent&gt;        &lt;CCardSurchargeMin&gt;0.00&lt;/CCardSurchargeMin&gt;        &lt;CCardSurchargeMax&gt;4.00&lt;/CCardSurchargeMax&gt;        &lt;DCardSurchargePercent&gt;0.00&lt;/DCardSurchargePercent&gt;        &lt;DCardSurchargeMin&gt;0.00&lt;/DCardSurchargeMin&gt;        &lt;DCardSurchargeMax&gt;0.00&lt;/DCardSurchargeMax&gt;        &lt;CancellationWaiver&gt;            &lt;Waiver&gt;1.99&lt;/Waiver&gt;        &lt;/CancellationWaiver&gt;        &lt;CancellationWaiver&gt;            &lt;Waiver&gt;1.99&lt;/Waiver&gt;        &lt;/CancellationWaiver&gt;        &lt;Rates&gt;            &lt;GBP&gt;1&lt;/GBP&gt;            &lt;EUR&gt;1.1045&lt;/EUR&gt;            &lt;USD&gt;1.319&lt;/USD&gt;        &lt;/Rates&gt;    &lt;/Pricing&gt;    &lt;SepaID/&gt;    &lt;API_Header&gt;        &lt;Request&gt;            &lt;ABTANumber&gt;YourABTANumber&lt;/ABTANumber&gt;            &lt;Password&gt;YourPassword&lt;/Password&gt;            &lt;Initials&gt;YourInitials&lt;/Initials&gt;            &lt;key&gt;YourKey&lt;/key&gt;            &lt;token&gt;YourToken&lt;/token&gt;            &lt;ArrivalDate&gt;2018-12-01&lt;/ArrivalDate&gt;            &lt;ArrivalTime&gt;1200&lt;/ArrivalTime&gt;            &lt;Adults&gt;2&lt;/Adults&gt;            &lt;Children&gt;0&lt;/Children&gt;            &lt;v&gt;1&lt;/v&gt;        &lt;/Request&gt;    &lt;/API_Header&gt;&lt;/API_Reply&gt;European Products Availability Requesthttps://api.holidayextras.co.uk/v1/lounge/HAM?ABTANumber=YourABTANumber&amp;Password=YourPassword&amp;Initials=YourInitials&amp;key=YourKey&amp;token=YourToken&amp;ArrivalDate=2018-12-01&amp;ArrivalTime=1200&amp;Adults=2&amp;Children=0&amp;System=ABG&amp;lang=deEuropean Products Availability Response&lt;?xml version=\"1.0\"?&gt;&lt;API_Reply Product=\"Lounge\" RequestCode=\"1\" Result=\"OK\" cached=\"1\" expires=\"2018-01-11 12:30:25\"&gt;    &lt;Lounge&gt;        &lt;Name&gt;Hamburg Airport Lounge&lt;/Name&gt;        &lt;Code&gt;HAMLHL&lt;/Code&gt;        &lt;BookingURL&gt;/v1/lounge/FRHAMLHL&lt;/BookingURL&gt;        &lt;MoreInfoURL&gt;/v1/product/HAMLHL&lt;/MoreInfoURL&gt;        &lt;NonDiscPrice&gt;74.00&lt;/NonDiscPrice&gt;        &lt;Price&gt;74.00&lt;/Price&gt;        &lt;terminal&gt;Z&lt;/terminal&gt;        &lt;option_count&gt;1&lt;/option_count&gt;    &lt;/Lounge&gt;    &lt;Pricing&gt;        &lt;CCardSurchargePercent&gt;0.00&lt;/CCardSurchargePercent&gt;        &lt;CCardSurchargeMin&gt;0.00&lt;/CCardSurchargeMin&gt;        &lt;CCardSurchargeMax&gt;0.00&lt;/CCardSurchargeMax&gt;        &lt;Rates&gt;            &lt;GBP&gt;1&lt;/GBP&gt;            &lt;EUR&gt;1.1045&lt;/EUR&gt;            &lt;USD&gt;1.319&lt;/USD&gt;        &lt;/Rates&gt;    &lt;/Pricing&gt;    &lt;SepaID/&gt;    &lt;API_Header&gt;        &lt;Request&gt;            &lt;ABTANumber&gt;YourABTANumber&lt;/ABTANumber&gt;            &lt;Password&gt;YourPassword&lt;/Password&gt;            &lt;Initials&gt;YourInitials&lt;/Initials&gt;            &lt;key&gt;YourKey&lt;/key&gt;            &lt;token&gt;YourToken&lt;/token&gt;            &lt;ArrivalDate&gt;2018-12-01&lt;/ArrivalDate&gt;            &lt;ArrivalTime&gt;1200&lt;/ArrivalTime&gt;            &lt;Adults&gt;2&lt;/Adults&gt;            &lt;Children&gt;0&lt;/Children&gt;            &lt;System&gt;ABG&lt;/System&gt;            &lt;lang&gt;de&lt;/lang&gt;            &lt;v&gt;1&lt;/v&gt;        &lt;/Request&gt;    &lt;/API_Header&gt;&lt;/API_Reply&gt;",
        "url": "/hxapi/lounge/av/airport/"
      }
      ,
    
      "hxapi-parking-av-airport": {
        "title": "Availability At Airport",
        "content": "Availability At AirportAPI Docs &gt; product:Parking &gt; endpoint:carpark &gt; request:Availability by AirportAirport Availability RequestMethodGETEndpointThe endpoint to use is:https://api.holidayextras.co.uk/v1/carpark/AirportCodeFor example, for London Gatwick the endpoint is:\tXML\tJSON\thttps://api.holidayextras.co.uk/v1/carpark/LGW\thttps://api.holidayextras.co.uk/v1/carpark/LGW.jsNote the .js extension.To find the airport locations available for car parking, please refer to the locations endpoint.Request ParametersNB: All parameter names are case sensitive.            Name      Data Type      Format      Mandatory?      Additional Information                  ABTANumber      String      [A-Z0-9] 5 chars      Y      This is also known as an ‘agent code’. This will be confirmed to you by your Account Manager during set up.              Password      String      [A-Z0-9] 5 chars      Y*      Password required for retail agent requests - intermediaries do not require a password.This will be confirmed to you by your Account Manager during set up.              Initials      String      [A-Z] 3 chars      N      The initials of the Operator / Agent.              key      String      [A-Z]      Y      This will be assigned to you by your Account Manager during set up.              token      String      [0-9] 9 chars      Y      Please see user token endpoint for details of how to generate a token.              ArrivalDate      Date      YYYY-MM-DD      Y      Date customer drops vehicle at car park.              ArrivalTime      Time      HHMM      Y      Time customer drops vehicle at car park.              DepartDate      Date      YYYY-MM-DD      Y      Date customer picks up vehicle from car park.              DepartTime      Time      HHMM      Y      Time customer picks up vehicle from car park.              NumberOfPax      Integer      [0-9] 2 chars      N      Number of passengers.              OutFlight      String      [A-Z0-9] 9 chars      N      This is also known as an ‘flight number’. Used to establish which terminal the customer is flying from using our look up tool and return products specific to that terminal.              filter      String      [A-Z]      N      Pass in values filter=on_airport, filter=recommended or filter=meet_and_greet to only show car parks meeting those criteria. You can filter by any field that comes back in the filter section of the API.              fields      String      [A-Z] a csv list of product info fields      N      A list of product info fields can be passed in to return configurable product information e.g. fields=name,address,latitude,sellingpoint.              top3      Boolean      [0,1]      N      If a value of 1 is passed in for the top3 param, then a maximum of three car parks will be returned, one on airport, one park and ride, and one meet and greet.              System      String      [A-Z] 3 chars      Y*      For European products, you need to pass in the value of System=ABG (the default is System=ABC, which is UK products only).              lang      String      [A-Z] 2 chars      Y*      Required for requests for European products. (Values available are en, de, it, es, pt and nl.)      Airport Availability ResponseThe airport availability response will return all the products that have availability at the requested location on specific dates and durations. A summary of the request received can be found in the header field at the end of the response.For a detailed explanation of the fields returned, please see below:            Field      Additional Information                  CarPark/TotalPrice      The price of product without any surcharges/fees added.              CarPark/NonDiscPrice      The non discounted price. Some agent codes apply a discount so we return this field to enable a comparison.              CarPark/RequestFlags      NB: For European products, please see the separate table below. These flags list which details the car park operator requires from the customer. If a flag is returned with a ‘Y’ your application should send the corresponding field/value in the booking request.Flags are only returned when required. The flags which can be returned are: Registration, CarMake, CarModel, CarColour, OutFlight, ReturnFlight, OutTerminal, ReturnTerminal, Destination, MobileNum.              CarPark/Filter      We have a filter mechanism on our site, to show particular types of product, such as Meet and Greet. The filters that apply to a product are returned here. Possible values are: meet_and_greet, recommended, on_airport, terminal, valet_included, car_parked_for_you.              CarPark/BookingURL      The URL to POST the booking request to for this particular product. Note: The product code includes prefix.              CarPark/MoreInfoURL      The link to more information about this product, sourced from the Product Library. Note: The product code doesn’t include prefix.              Pricing/CreditCardSurcharge      NB: This is only relevant for Intermediary Agents in Europe, where Holiday Extras is responsible for processing the payment, not the Agent. The first step in the calculation is to determine the credit card surcharge payable (x), based on the value of the booking, using this formula: x = (TotalPrice + the CanxWaiver) / 100 x CCardSurchargePercent Second, to prevent the surcharge from exceeding certain boundaries we have min and max thresholds, which can be calculated as follows: if x &lt; CCardSurchargeMin; x = CCardSurchargeMin else if x &gt; CCardSurchargeMax; x = CCardSurchargeMax              Pricing/CancellationWaiver      We provide an optional cancellation waiver. If this is not added then cancellation will incur a fee. The fee is outlined in our terms and conditions. NB: This value is not currently returned via the XML.              API_Header/Request      The API returns every parameter and value you sent in the previous request.      European products onlyFor European products only, the availability response will return a field called &lt;CarDetFlags&gt;, which identifies the fields required when making a booking. (This is instead of the &lt;RequestFlags&gt; field which is returned for UK products only).For example: &lt;CarDetFlags&gt; NNNNNNNNNNNNNNNNNN &lt;/CarDetFlags&gt;The order of the flags is always the same, and refers to these parameters respectively:            Position      Parameter      Data Type      Format      Additional Information                  1      Registration      String      [A-Z0-9] 10 chars      Vehicle registration number  NB: This field is not validated through the API.              2      CarMake      String      [A-Z0-9] 10 chars      Make of vehicle, e.g. Audi.              3      CarModel      String      [A-Z0-9] 10 chars      Model of vehicle, e.g. A6.              4      CarColour      String      [A-Z0-9] 10 chars      Colour of vehicle, e.g. White.              5      NumberOfPax      Integer      [0-9]      Number of passengers in the vehicle.              6      CarDropoffTime      Time      HHMM      Arrival time when you drop the vehicle off at the car park e.g 1000.              7      CarPickupTime      Time      HHMM      Return time, when you pick the vehicle up from the car park, e.g. 1600.              8      OutTerminal      String      [A-Z0-9] 2 chars      Single letter or number representation of the terminal e.g N or S or 4              9      OutFltNo      String      [A-Z0-9] 10 chars      Outbound flight number e.g. EZY123.              10      InFltNo      String      [A-Z0-9] 10 chars      Return flight number e.g. EZY124.              11      OutFltTime      Time      HHMM      Departure time of the outbound flight e.g. 1200.              12      InFltTime      Time      HHMM      Arrival time of the inbound flight e.g. 1500.              13      MobileNum      String      [A-Z0-9] 15 chars      Customer’s mobile number.              14      ShipName      String      [A-Z0-9] 20 chars      Name of the ship, e.g. AIDA              15      PierName      String      [A-Z0-9] 20 chars      Name of the pier or port where the ship is departing from              16      ChildSeat      String      Y/N      Is a child car seat needed?              17      AddlServices      String      [A-Z0-9] 50 chars      In this parameter you may add additional remarks regarding the booking.              18      RetTerminal      String      [A-Z0-9] 2 chars      Single letter or number representation of the terminal e.g N or S or 4      Worked ExamplesBelow are worked examples of both the request and response for availability at an airport.UK Products Availability Request\tXML\tJSON\thttps://api.holidayextras.co.uk/carpark/LGW?ABTANumber=YourABTANumber&amp;Password=YourPassword&amp;Initials=YourInitials&amp;key=YourKey&amp;token=YourToken&amp;ArrivalDate=2020-01-07&amp;ArrivalTime=1200&amp;DepartDate=2020-01-08&amp;DepartTime=1200&amp;NumberOfPax=1\thttps://api.holidayextras.co.uk/carpark/LGW.js?ABTANumber=YourABTANumber&amp;Password=YourPassword&amp;Initials=YourInitials&amp;key=YourKey&amp;token=YourToken&amp;ArrivalDate=2020-01-07&amp;ArrivalTime=1200&amp;DepartDate=2020-01-08&amp;DepartTime=1200&amp;NumberOfPax=1Note the .js extension.UK Products Availability ResponseNB: This is a shortened example compiled from a full availability response.\tXML\tJSON\t&lt;?xml version=\"1.0\"?&gt;&lt;API_Reply Product=\"CarPark\" RequestCode=\"1\" Result=\"OK\" cached=\"1\" expires=\"2019-12-06 17:31:56\"&gt;  &lt;CarPark&gt;    &lt;Name&gt;Purple Parking - all terminals&lt;/Name&gt;    &lt;Code&gt;LGV9&lt;/Code&gt;    &lt;BookingURL&gt;/carpark/HPLGV9&lt;/BookingURL&gt;    &lt;MoreInfoURL&gt;/product/LGV9&lt;/MoreInfoURL&gt;    &lt;RequestFlags&gt;      &lt;CarColour&gt;1&lt;/CarColour&gt;      &lt;CarMake&gt;1&lt;/CarMake&gt;      &lt;CarModel&gt;1&lt;/CarModel&gt;      &lt;Registration&gt;1&lt;/Registration&gt;      &lt;ReturnFlight&gt;1&lt;/ReturnFlight&       "hxapi-viewamendcancel-amend-complex": {
        "title": "Amend Booking - complex (with reprice)",
        "content": "Amend Booking - complex (with reprice)API Docs &gt; product:amendThe booking details that can be changed for a complex amend are as follows:  Arrival date or time;  Depart date or time.Amend Booking RequestWe recommend using the view booking method first, to ensure that you have all the details required from the most up to date record of the booking.You can then run a GET booking request using the amend endpoint and methodology detailed here to check the new amount (increase / decrease in price from original booking).MethodPOSTEndpointThe endpoint to use is (where YourBookingRef is the Holiday Extras booking reference):https://api.holidayextras.co.uk/v1/booking/YourBookingRefRequest ParametersNB: All parameter names are case sensitive.For all amend booking requests, you will need to send these parameters:            Name      Data Type      Format      Mandatory?      Additional Information                  ABTANumber      String      [A-Z0-9] 5 chars      Y      This is also known as an ‘agent code’. This will be confirmed to you by your Account Manager during set up.              Password      String      [A-Z0-9] 5 chars      N*      Password required for retail agent requests - intermediaries do not require a password.This will be confirmed to you by your Account Manager during set up.              Initials      String      [A-Z] 3 chars      N      The initials of the Operator / Agent.              key      String      [A-Z]      Y      This will be assigned to you by your Account Manager during set up.              Email      String      [A-Z0-9] 50 chars      Y      Email address used to make the booking (i.e. the email address of the lead passenger)              System      String      [A-Z] 3 chars      Y*      For European products, you need to pass in the value of System=ABG (the default is System=ABC, which is UK products only).      In order to amend the booking with the new details, you only need to pass in the specific parameters you want to amend. For a complex amend these are as follows:            Name      Data Type      Format      Mandatory?      Additional Information                  ArrivalDate      Date      YYYY-MM-DD      Y      Date customer drops vehicle at car park.              ArrivalTime      Time      HHMM      Y      Time customer drops vehicle at car park.              DepartDate      Date      YYYY-MM-DD      Y      Date customer picks up vehicle from car park.              DepartTime      Time      HHMM      Y      Time customer picks up vehicle from car park.      Amend Booking ResponseThe amend booking response will return the booking record with all of the updated details.For a detailed explanation of the fields returned, please see the respective booking requests for hotels, parking and lounges.Worked ExamplesBelow are worked examples of both the request and response for amending (complex) a booking.Amend Booking Request (complex for a hotel)The original booking was made for a hotel staying on 1st December 2018 with 8 days parking.https://api.holidayextras.co.uk/booking/YourBookingRef    &lt;Request&gt;        &lt;ABTANumber&gt;YourABTA&lt;/ABTANumber&gt;        &lt;Password&gt;YourPassword&lt;/Password&gt;        &lt;Initials&gt;YourInitials&lt;/Initials&gt;        &lt;key&gt;YourKey&lt;/key&gt;        &lt;ArrivalDate&gt;2018-12-02&lt;/ArrivalDate&gt;        &lt;ParkingDays&gt;15&lt;/ParkingDays&gt;    &lt;/Request&gt;Amend Booking Response (complex for a hotel)&lt;?xml version=\"1.0\"?&gt;&lt;API_Reply System=\"ABC\" Version=\"1\" Product=\"Hotel\" Customer=\"A\" Session=\"999999999\" RequestCode=\"14\" Result=\"OK\"&gt;    &lt;CarDetails&gt;        &lt;Registration&gt;TEST123&lt;/Registration&gt;        &lt;CarMake/&gt;        &lt;CarModel/&gt;        &lt;CarColour/&gt;        &lt;OutFlight&gt;TBC&lt;/OutFlight&gt;    &lt;/CarDetails&gt;    &lt;ClientDetails&gt;        &lt;Title&gt;MRS&lt;/Title&gt;        &lt;Initial&gt;T&lt;/Initial&gt;        &lt;Surname&gt;TEST&lt;/Surname&gt;        &lt;Address/&gt;        &lt;DataProtection&gt;Y&lt;/DataProtection&gt;        &lt;Email&gt;test@test.com&lt;/Email&gt;    &lt;/ClientDetails&gt;    &lt;Booking&gt;        &lt;BookingRef&gt;YourBookingRef&lt;/BookingRef&gt;        &lt;PdfUrl&gt;/v1/confirmation?email=test@test.com&amp;booking_ref=YourBookingRef&amp;product_type=hotels&lt;/PdfUrl&gt;        &lt;AgentComm&gt;931&lt;/AgentComm&gt;        &lt;VATonComm/&gt;    &lt;/Booking&gt;    &lt;Pricing&gt;        &lt;OriginalPrice&gt;93.10&lt;/OriginalPrice&gt;        &lt;NewPrice&gt;93.10&lt;/NewPrice&gt;        &lt;CCardSurchargeAmount&gt;0.00&lt;/CCardSurchargeAmount&gt;        &lt;CanxWaiver&gt;0.00&lt;/CanxWaiver&gt;        &lt;AmendmentFee&gt;N/A&lt;/AmendmentFee&gt;        &lt;PriceDifference&gt;N/A&lt;/PriceDifference&gt;    &lt;/Pricing&gt;    &lt;Itinerary&gt;        &lt;ArrivalDate&gt;2018-12-02&lt;/ArrivalDate&gt;        &lt;Nights&gt;1&lt;/Nights&gt;        &lt;BoardBasis&gt;RO&lt;/BoardBasis&gt;        &lt;Code&gt;LHRMEP&lt;/Code&gt;        &lt;CarDropoffTime&gt;0000&lt;/CarDropoffTime&gt;        &lt;CarPickupTime&gt;0000&lt;/CarPickupTime&gt;        &lt;CarPickupDate&gt;2018-12-17&lt;/CarPickupDate&gt;        &lt;ReturnFlight/&gt;        &lt;TerminalCode/&gt;        &lt;ParkingDays&gt;15&lt;/ParkingDays&gt;        &lt;ParkingSpaces&gt;1&lt;/ParkingSpaces&gt;        &lt;NonSmoking&gt;Y&lt;/NonSmoking&gt;    &lt;/Itinerary&gt;    &lt;Room&gt;        &lt;Rooms&gt;1&lt;/Rooms&gt;        &lt;Adults&gt;2&lt;/Adults&gt;        &lt;Children&gt;0&lt;/Children&gt;        &lt;Infants&gt;0&lt;/Infants&gt;        &lt;Price&gt;93.10&lt;/Price&gt;        &lt;Code&gt;DBL&lt;/Code&gt;    &lt;/Room&gt;    &lt;API_Header&gt;        &lt;Request&gt;            &lt;ABTANumber&gt;YourABTANumber&lt;/ABTANumber&gt;            &lt;Password&gt;YourPassword&lt;/Password&gt;            &lt;key&gt;YourKey&lt;/key&gt;            &lt;ArrivalDate&gt;2018-12-02&lt;/ArrivalDate&gt;            &lt;Nights&gt;1&lt;/Nights&gt;            &lt;RoomCode&gt;DBL&lt;/RoomCode&gt;            &lt;ParkingDays&gt;15&lt;/ParkingDays&gt;            &lt;PriceCheckFlag&gt;Y&lt;/PriceCheckFlag&gt;            &lt;PriceCheckPrice&gt;93.10&lt;/PriceCheckPrice&gt;            &lt;v&gt;1&lt;/v&gt;        &lt;/Request&gt;    &lt;/API_Header&gt;&lt;/API_Reply&gt;",
        "url": "/hxapi/viewamendcancel/amend_complex/"
      }

      "hxapi-viewamendcancel-amend-simple": {
        "title": "Amend Booking - simple (no reprice)",
        "content": "Amend Booking - simple (no reprice)API Docs &gt; product:amendThe booking details that can be changed for a simple amend are as follows:  Lead passenger name;  Email address;  In the case of parking or hotel plus parking bookings, car registration (and other car details);  Flight numbers (if you are updating multiple flight numbers then you may prefer to use the Flight Update method instead (which permits batch updates).Amend Booking RequestWe recommend using the view booking method first, to ensure that you have all the details required from the most up to date record of the booking.MethodPOSTEndpointThe endpoint to use is (where YourBookingRef is the Holiday Extras booking reference):https://api.holidayextras.co.uk/v1/booking/YourBookingRefRequest ParametersNB: All parameter names are case sensitive.For all amend booking requests, you will need to send these parameters:            Name      Data Type      Format      Mandatory?      Additional Information                  ABTANumber      String      [A-Z0-9] 5 chars      Y      This is also known as an ‘agent code’. This will be confirmed to you by your Account Manager during set up.              Password      String      [A-Z0-9] 5 chars      N*      Password required for retail agent requests - intermediaries do not require a password.This will be confirmed to you by your Account Manager during set up.              Initials      String      [A-Z] 3 chars      N      The initials of the Operator / Agent.              key      String      [A-Z]      Y      This will be assigned to you by your Account Manager during set up.              Email      String      [A-Z0-9] 50 chars      Y      Email address used to make the booking (i.e. the email address of the lead passenger)              System      String      [A-Z] 3 chars      Y*      For European products, you need to pass in the value of System=ABG (the default is System=ABC, which is UK products only).      In order to amend the booking with the new details, you only need to pass in the specific parameters you want to amend. For a simple amend these are as follows:            Name      Data Type      Format      Mandatory?      Additional Information                  Title      String      [0-9] 4 chars      Y      Title of lead passenger              Initial      String      [A-Z] 1 chars      Y      Initial of lead passenger              Surname      String      [0-9] 20 chars      Y      Surname of lead passenger              Address[]      String      [A-Z0-9] 25 chars      Y      First line of address (house name / number and road) of lead passenger. NB: This field can be set to NA              Town      String      [A-Z] 20 chars      Y      Town of address. NB: This field can be set to NA              County      String      [A-Z] 20 chars      Y      County of address. NB: This field can be set to NA              PostCode      String      [A-Z0-9] 10 chars      Y      Post code of address. NB: This field can be set to NA              Email      String      [A-Z0-9] 50 chars      Y      The email address of customer.      For parking bookings:You may change any of the car details, as indicated in the car park availability response.Amend Booking ResponseThe amend booking response will return the booking record with all of the updated details.For a detailed explanation of the fields returned, please see the respective booking requests for hotels, parking and lounges.Worked ExamplesBelow are worked examples of both the request and response for amending (simple) a booking.UK Products Amend Booking Request (simple for a car park)The original booking was made with test details of Mr T TEST:https://api.holidayextras.co.uk/booking/YourBookingRef    &lt;Request&gt;        &lt;ABTANumber&gt;YourABTA&lt;/ABTANumber&gt;        &lt;Password&gt;YourPassword&lt;/Password&gt;        &lt;Initials&gt;YourInitials&lt;/Initials&gt;        &lt;key&gt;YourKey&lt;/key&gt;        &lt;Title&gt;MR&lt;/Title&gt;        &lt;Initial&gt;A&lt;/Initial&gt;        &lt;Surname&gt;TESTA&lt;/Surname&gt;        &lt;Address&gt;123 Test Street&lt;/Address&gt;        &lt;Town&gt;Testville&lt;/Town&gt;        &lt;County&gt;Testshire&lt;/County&gt;        &lt;PostCode&gt;TE12 3ST&lt;/PostCode&gt;        &lt;Email&gt;test@test.com&lt;/Email&gt;        &lt;Registration&gt;TE17 STS&lt;/Registration&gt;    &lt;/Request&gt;UK Products Amend Booking Response (simple for a car park)&lt;?xml version=\"1.0\"?&gt;&lt;API_Reply System=\"ABC\" Version=\"1\" Product=\"CarPark\" Customer=\"A\" Session=\"999999999\" RequestCode=\"14\" Result=\"OK\"&gt;    &lt;CarDetails&gt;        &lt;Registration&gt;TE17STS&lt;/Registration&gt;        &lt;CarMake&gt;RANGE ROVER&lt;/CarMake&gt;        &lt;CarModel&gt;EVOQUE&lt;/CarModel&gt;        &lt;CarColour&gt;WHITE&lt;/CarColour&gt;        &lt;OutFlight&gt;EZY8985&lt;/OutFlight&gt;    &lt;/CarDetails&gt;    &lt;ClientDetails&gt;        &lt;Title&gt;MR&lt;/Title&gt;        &lt;Initial&gt;A&lt;/Initial&gt;        &lt;Surname&gt;TESTA&lt;/Surname&gt;        &lt;Address&gt;123 TEST STREET&lt;/Address&gt;        &lt;DataProtection&gt;Y&lt;/DataProtection&gt;        &lt;Email&gt;test@test.com&lt;/Email&gt;    &lt;/ClientDetails&gt;    &lt;Booking&gt;        &lt;BookingRef&gt;YourBookingRef&lt;/BookingRef&gt;        &lt;PdfUrl&gt;/v1/confirmation?email=test@test.com&amp;booking_ref=YourBookingRef&amp;product_type=carparks&lt;/PdfUrl&gt;    &lt;/Booking&gt;    &lt;CarPark&gt;        &lt;ArrivalDate&gt;2018-12-01&lt;/ArrivalDate&gt;        &lt;DepartDate&gt;2018-12-08&lt;/DepartDate&gt;        &lt;ArrivalTime&gt;1200&lt;/ArrivalTime&gt;        &lt;DepartTime&gt;1200&lt;/DepartTime&gt;        &lt;NumberOfPax&gt;1&lt;/NumberOfPax&gt;        &lt;ReturnFlight&gt;EZY8982&lt;/ReturnFlight&gt;        &lt;Duration&gt;7&lt;/Duration&gt;        &lt;Remarks/&gt;        &lt;Code&gt;MAR1&lt;/Code&gt;        &lt;Name&gt;APH&lt;/Name&gt;        &lt;MoreInfoURL&gt;/v1/product/MAR1&lt;/MoreInfoURL&gt;        &lt;distance_to_airport/&gt;        &lt;introduction&gt;Holidays are about treating yourself and pushing the boat out. At APH Manchester, they believe you can have  a quality service and excellent security without it costing an arm and a leg. They also want to get you to the terminal swiftly - transfers take just five minutes, so you'll be at check-in with plenty of time to spend the pounds you've saved.&lt;/introduction&gt;        &lt;logo&gt;/imageLibrary/Images/manchester-aph-new-logo.jpg&lt;/logo&gt;        &lt;BookingURL&gt;/v1/carpark/MAR1&lt;/BookingURL&gt;        &lt;Filter&gt;            &lt;park_and_ride&gt;1&lt;/park_and_ride&gt;            &lt;meet_and_greet&gt;0&lt;/meet_and_greet&gt;        &lt;/Filter&gt;    &lt;/CarPark&gt;    &lt;API_Header&gt;        &lt;Request&gt;            &lt;ABTANumber&gt;YourABTANumber&lt;/ABTANumber&gt;            &lt;Password&gt;YourPassword&lt;/Password&gt;            &lt;Initials&gt;YourInitials&lt;/Initials&gt;            &lt;key&gt;YourKey&lt;/key&gt;            &lt;ArrivalDate&gt;2018-12-01&lt;/ArrivalDate&gt;            &lt;ArrivalTime&gt;1200&lt;/ArrivalTime&gt;            &lt;DepartDate&gt;2018-12-08&lt;/DepartDate&gt;            &lt;DepartTime&gt;1200&lt;/DepartTime&gt;            &lt;NumberOfPax&gt;1&lt;/NumberOfPax&gt;            &lt;Title&gt;MR&lt;/Title&gt;            &lt;Initial&gt;A&lt;/Initial&gt;            &lt;Surname&gt;TESTA&lt;/Surname&gt;            &lt;Address&gt;123 Test Street&lt;/Address&gt;            &lt;Town&gt;Testville&lt;/Town&gt;            &lt;County&gt;Testshire&lt;/County&gt;            &lt;PostCode&gt;TE12 3ST&lt;/PostCode&gt;            &lt;Email&gt;test@test.com&lt;/Email&gt;            &lt;PriceCheckFlag&gt;Y&lt;/PriceCheckFlag&gt;            &lt;PriceCheckPrice&gt;57.99&lt;/PriceCheckPrice&gt;            &lt;CarColour&gt;White&lt;/CarColour&gt;            &lt;CarMake&gt;Range Rover&lt;/CarMake&gt;            &lt;CarModel&gt;Evoque&lt;/CarModel&gt;            &lt;Destination&gt;Munich&lt;/Destination&gt;            &lt;OutFlight&gt;EZY8985&lt;/OutFlight&gt;            &lt;OutTerminal&gt;N&lt;/OutTerminal&gt;            &lt;Registration&gt;TE17 STS&lt;/Registration&gt;            &lt;ReturnFlight&gt;EZY8982&lt;/ReturnFlight&gt;            &lt;ReturnTerminal&gt;N&lt;/ReturnTerminal&gt;            &lt;MobileNum&gt;01234567890&lt;/MobileNum&gt;            &lt;v&gt;1&lt;/v&gt;        &lt;/Request&gt;    &lt;/API_Header&gt;&lt;/API_Reply&gt;",
        "url": "/hxapi/viewamendcancel/amend_simple/"
      }

      "hxapi-insurance-availability": {
        "title": "Insurance Schemes Availability",
        "content": "Insurance Schemes AvailabilityAPI Docs &gt; product:InsuranceInsurance Schemes Availability RequestThis endpoint will respond with a quotation for a policy to be issued under an insurance scheme.MethodGETEndpointTo request the list of insurance schemes available, the endpoint to use is:https://api.holidayextras.co.uk/v1/insurancepolicy/RegionCodeFor example, to request a quote for a policy covering Europe (low risk), the endpoint is:https://api.holidayextras.co.uk/v1/insurancepolicy/EUROPELOWTo find the list of available regions, please refer to the section on insurance countries.Request ParametersNB: All parameter names are case sensitive.            Name      Data Type      Format      Mandatory?      Additional Information                  ABTANumber      String      [A-Z0-9] 5 chars      Y      This is also known as an ‘agent code’. This will be confirmed to you by your Account Manager during set up.              Password      String      [A-Z0-9] 5 chars      Y      Password required for retail agent requests - intermediaries do not require a password.This will be confirmed to you by your Account Manager during set up.              key      String      [A-Z]      Y      This will be assigned to you by your Account Manager during set up.              token      String      [0-9] 9 chars      Y      Please see user token endpoint for details of how to generate a token.              StartDate      Date      YYYY-MM-DD      Y      Date customer wants policy to start (start date of trip if single trip, or up to 30 days from search date if annual trip)              EndDate      Date      YYYY-MM-DD      N*      Date customer wants policy to end (return date of trip if single trip). NB: If no end date is provided, system will assume you are requesting an annual policy.              birthDate[]      Date      YYYY-MM-DD      Y      Date of birth for customers. All customers requiring inclusion on this policy quote must provide their date of birth. You can add multiple people by ennumerating each date of birth in the format birthDate[0], birthDate[1], birthDate[2], and so on.              title[]      String      [A-Z] 4 chars      Y      Title for customers. All customers requiring inclusion on this policy quote must provide their title. You can add multiple people by ennumerating each title in the format title[0], title[1], title[2], and so on.              firstName[]      String      [A-Z] 15 chars      Y      First name for customers. All customers requiring inclusion on this policy quote must provide their first name. You can add multiple people by ennumerating each first name in the format firstName[0], firstName[1], firstName[2], and so on.              lastName[]      String      [A-Z] 15 chars      Y      Last name for customers. All customers requiring inclusion on this policy quote must provide their last name. You can add multiple people by ennumerating each last name in the format lastName[0], lastName[1], lastName[2], and so on.      Insurance Schemes Availability ResponseThe insurance schemes availability response will return all the products that are available on the requested dates for that region. A summary of the request received can be found in the header field at the end of the response.For a detailed explanation of the fields returned, please see below:            Field      Additional Information                  Itinerary/Destination                     Itinerary/DestNum                     Itinerary/StartDate                     Itinerary/EndDate                     Itinerary/AnnualStart                     Quote/SchemeCode                     Quote/SchemeDes                     Quote/PolicyEnd                     Quote/PolicyStart                     Quote/Annual                     Quote/SchemePrice                     Quote/SchemeName                     Quote/CancellationCover                     Quote/CancellationXS                     Quote/MedicalCover                     Quote/MedicalXS                     Quote/BaggageCover                     Quote/BaggageXS                     Quote/PolicyWording                     Quote/KeyFacts                     Quote/Wintersports                     Quote/Insolvency                     Quote/destinationID                     API_Header      The API returns every parameter and value you sent in the previous request.      Worked ExamplesBelow are worked examples of both the request and response for insurance quote.Insurance Schemes Availability Requesthttps://api.holidayextras.co.uk/v1/insurancepolicy/EUROPELOW?ABTANumber=YourABTANumber&amp;Password=YourPassword&amp;key=YourKey&amp;token=YourToken&amp;StartDate=2017-12-01&amp;EndDate=2017-12-08&amp;birthDate[0]=1982-06-26&amp;title[0]=Mr&amp;firstName[0]=TEST&amp;lastName[0]=TESTInsurance Schemes Availability ResponseNB: This is a shortened example compiled from a full insurance quote response.&lt;?xml version=\"1.0\" ?&gt;&lt;API_Reply Product=\"Quote\"&gt;    &lt;Itinerary&gt;        &lt;Destination&gt;Europelow&lt;/Destination&gt;        &lt;DestNum&gt;6&lt;/DestNum&gt;        &lt;StartDate&gt;2017-12-01&lt;/StartDate&gt;        &lt;EndDate&gt;2017-12-08&lt;/EndDate&gt;        &lt;AnnualStart&gt;30AUG17&lt;/AnnualStart&gt;    &lt;/Itinerary&gt;    &lt;Quote&gt;        &lt;SchemeCode&gt;8673&lt;/SchemeCode&gt;        &lt;SchemeDes&gt;&lt;/SchemeDes&gt;        &lt;PolicyEnd&gt;2017-12-08&lt;/PolicyEnd&gt;        &lt;PolicyStart&gt;2017-12-01&lt;/PolicyStart&gt;        &lt;Annual&gt;N&lt;/Annual&gt;        &lt;SchemePrice&gt;18.26&lt;/SchemePrice&gt;        &lt;SchemeName&gt;OTA&lt;/SchemeName&gt;        &lt;CancellationCover&gt;500&lt;/CancellationCover&gt;        &lt;CancellationXS&gt;75&lt;/CancellationXS&gt;        &lt;MedicalCover&gt;5000000&lt;/MedicalCover&gt;        &lt;MedicalXS&gt;100&lt;/MedicalXS&gt;        &lt;BaggageCover&gt;&lt;/BaggageCover&gt;        &lt;BaggageXS&gt;&lt;/BaggageXS&gt;        &lt;PolicyWording&gt;http://secure.holidayextras.co.uk/images/groups/insurancemagenta/policy_wording/HXMainAgent0317(HX001).pdf&lt;/PolicyWording&gt;        &lt;KeyFacts&gt;http://secure.holidayextras.co.uk/images/groups/insurancemagenta/policy_wording/&lt;/KeyFacts&gt;        &lt;Wintersports&gt;Y&lt;/Wintersports&gt;        &lt;Insolvency&gt;N&lt;/Insolvency&gt;        &lt;destinationID&gt;13&lt;/destinationID&gt;    &lt;/Quote&gt;    &lt;API_Header&gt;        &lt;Request&gt;            &lt;ABTANumber&gt;YourABTANumber&lt;/ABTANumber&gt;            &lt;Password&gt;YourPassword&lt;/Password&gt;            &lt;key&gt;YourKey&lt;/key&gt;            &lt;token&gt;YourToken&lt;/token&gt;            &lt;StartDate&gt;2017-12-01&lt;/StartDate&gt;            &lt;EndDate&gt;2017-12-08&lt;/EndDate&gt;            &lt;birthDate&gt;1982-06-26&lt;/birthDate&gt;            &lt;title&gt;Mr&lt;/title&gt;            &lt;firstName&gt;TEST&lt;/firstName&gt;            &lt;lastName&gt;TEST&lt;/lastName&gt;            &lt;v&gt;1&lt;/v&gt;        &lt;/Request&gt;    &lt;/API_Header&gt;&lt;/API_Reply&gt;",
        "url": "/hxapi/insurance/availability/"
      }
      ,
    
      "hxapi-carhire-availability": {

"Netherlands\",          \"postcode\": \"1118 AX\",          \"phone\": \"31 20 3164190\",          \"locationType\": \"At the airport\",          \"openingTimes\": {            \"mon\": {              \"open\": \"06:30\",              \"close\": \"23:00\"            },            \"tue\": {              \"open\": \"06:30\",              \"close\": \"23:00\"            },            \"wed\": {              \"open\": \"06:30\",              \"close\": \"23:00\"            },            \"thu\": {              \"open\": \"06:30\",              \"close\": \"23:00\"            },            \"fri\": {              \"open\": \"06:30\",              \"close\": \"23:00\"            },            \"sat\": {              \"open\": \"07:00\",              \"close\": \"23:00\"            },            \"sun\": {              \"open\": \"07:00\",              \"close\": \"23:00\"            }          }        },        \"Features\": {          \"airConditioning\": null,          \"automaticTransmission\": \"\"        },        \"Discount\": null,        \"SupplierData\": {          \"rateQualifier\": \"E162281612011054F0\",          \"productId\": 1,          \"baseProductCurrency\": \"GBP\",          \"excessRefundPolicy\": {            \"price\": 4193,            \"discount\": null          }        }      },      {...}    ],    \"Pricing\": {      \"CCardSurchargePercent\": 2.5,      \"CCardSurchargeMin\": 1.5,      \"CCardSurchargeMax\": 4    },    \"API_Header\": {      \"Request\": {        \"key\": 1,        \"From\": \"2016-11-06\",        \"ArrivalTime\": 1200,        \"To\": \"2016-11-13\",        \"DepartTime\": 1600,        \"PickupLocation\": \"FL965\",        \"DropoffLocation\": \"FL965\",        \"DateOfBirth\": \"1990-10-10\",        \"format\": \"js\"      }    }  }}",

      "hxapi-barcode": {
        "title": "Barcode",
        "content": "BarcodeAn increasing number of car parks, and other products, are updating the way they operate to introduce scanning systems in order to speed up arrival procedures. You will be required to include a 2D barcode on every customer confirmation. The only instance where you should not include a 2D barcode is when a car park stipulates that a QR code is required.This endpoint simply enables you to specify a booking reference and receive a Code128 barcode representation of that in return.In our experience, the size can be scaled down, but you must keep the proportions the same to prevent blurring.MethodGETParameters            Name      Data Type      Format      Required                  key      Number             Y              BookingRef      Alphanumeric      [A-z,0-9]{5,12}      Y              angle      Numeric      Multiple of 90      N      The file extension is also required, to tell the API to return the correct image headers.Requesthttps://api.holidayextras.co.uk/sandbox/v1/barcode/ABCDE.png?key=YourKeySo you can include it in your page as easily as…&lt;img src=\"https://api.holidayextras.co.uk/sandbox/v1/barcode/ABCDE.png?key=YourKey\" /&gt;The image can be rotated to fit the side of a page:https://api.holidayextras.co.uk/sandbox/v1/barcode/ABCDE.png?key=YourKey&amp;angle=90Orhttps://api.holidayextras.co.uk/sandbox/v1/barcode/ABCDE.png?key=YourKey&amp;angle=270ReplyThe reply in this case will be an image, not XML.QR CodeYou can establish whether a car park requires a QR code by including the parameter ‘&amp;fields=qr_code’ within your request. The response will either be ‘0’ or ‘1’.To enable a QR code you use google charts, just add the booking ref as value for chl=  ​so in the example below the booking ref would be HX123.​http://chart.apis.google.com/chart?cht=qr&amp;chs=300x300&amp;chl=HX123&amp;chld=H%7C0",
        "url": "/hxapi/barcode/"
      }

      "hxapi-de-start-bkg": {
        "title": "Book Car Park - DE-Start method",
        "content": "Book Car Park - DE-Start methodCar Park Booking RequestMethodPOSTEndpointThe endpoint to use is:https://payment.holidayextras.co.uk/legacy/carpark/CarParkCodeRequest ParametersThe parameters must be sent in the body of the request, as x-www-form-urlencoded data.NB: All parameter names are case sensitive.            Name      Data Type      Format      Mandatory?      Additional Information                  StartCustomer      String      [0-9] 6 chars      Y      This will be assigned to you by your Account Manager during set up.              BusinessUnit      String      [0-9] 3 chars      Y      This will be assigned to you by your Account Manager during set up.              Operator      String      [A-Z] 3 chars      Y      This always defaults to BJT.              key      String      [A-Z] 10 chars      Y      This will be assigned to you by your Account Manager during set up.              token      String      [0-9] 9 chars      Y      This is the same token used in the availability request.              ArrivalDate      Date      YYYY-MM-DD      Y      Date customer drops vehicle at car park.              ArrivalTime      Time      HHMM      Y      Time customer drops vehicle at car park.              DepartDate      Date      YYYY-MM-DD      Y      Date customer picks up vehicle from car park.              DepartTime      Time      HHMM      Y      Time customer picks up vehicle from car park.              Registration      String      [A-Z0-9] 10 chars      N §      Vehicle registration number.              CarMake      String      [A-Z0-9] 10 chars      N §      The make of the car, e.g Audi.              CarModel      String      [A-Z0-9] 10 chars      N §      The model of the car, e.g. A6.              CarColour      String      [A-Z] 10 chars      N §      The colour of the car, e.g. black.              Title      String      [0-9] 4 chars      Y      Title of lead passenger.              Initial      String      [A-Z] 1 chars      Y      Initial of lead passenger.              Surname      String      [A-Z] 20 chars      Y      Surname of lead passenger.              NumberOfPax      Integer      [0-9] 2 chars      Y      Number of passengers.              Remarks      String      [A-Z0-9] 60 chars      N      Any remarks the agent wishes to add to the booking. Please note, these are not passed through to the supplier.      § The fields required by the carpark are returned in the availability request, in the &lt;RequestFlags&gt; element.Request flagsWhen you receive the availability response, it will indicate which request flags are required to be sent as part of the booking request.The request flags differ depending on the product’s region and the supplier’s requirements. A summary is below, but please see the relevant sections in the availability endpoint documentation.PaymentThis existing integration does support direct encashment from retail customers. For more information please see the section on Payment.Car Park Booking ResponseThe car park booking response will confirm that a booking has been placed in our system.For a detailed explanation of the fields returned, please see below:            Booking/BookingRef      This is the reference for this booking. It must be referred to in all communication with us concerning this booking. NB: Our booking references are up to 12 char alphanumeric (including 1/I and 0/O/Q).              Booking/AgentComm      Commission you have earned from this booking.              CarDetails      Confirmation of the vehicle details that were sent in the booking request.              ClientDetails      Confirmation of the lead passenger’s details that were sent in the booking request.              HandlingFee      Any booking fees that are applicable for processing this transaction. Currently, we do not charge for processing bookings, so this figure will be zero.              MoreInfoURL      The URL for viewing the booking.              CarPark      Details of the car park that were sent in the booking request.              API_Header/Request      A list of parameters that were sent in the booking request.      Worked ExamplesBelow are worked examples of both the request and response for booking car parking using the DE-Start method.Car Park Booking Request - DE-Start methodhttps://payment.holidayextras.co.uk/legacy/carpark/FRA8    &lt;Request&gt;        &lt;StartCustomer&gt;YourStartCustomer&lt;/StartCustomer&gt;        &lt;BusinessUnit&gt;YourBusinessUnit&lt;/BusinessUnit&gt;        &lt;Operator&gt;BJT&lt;/Operator&gt;        &lt;Initials&gt;YourInitials&lt;/Initials&gt;        &lt;key&gt;YourKey&lt;/key&gt;        &lt;token&gt;YourToken&lt;/token&gt;        &lt;ArrivalDate&gt;2017-12-01&lt;/ArrivalDate&gt;        &lt;ArrivalTime&gt;1200&lt;/ArrivalTime&gt;        &lt;DepartDate&gt;2017-12-08&lt;/DepartDate&gt;        &lt;DepartTime&gt;1200&lt;/DepartTime&gt;        &lt;NumberOfPax&gt;1&lt;/NumberOfPax&gt;        &lt;Registration&gt;TE17 STS&lt;/Registration&gt;        &lt;CarMake&gt;Range Rover&lt;/CarMake&gt;        &lt;CarModel&gt;Evoque&lt;/CarModel&gt;        &lt;CarColour&gt;White&lt;/CarColour&gt;        &lt;Title&gt;MR&lt;/Title&gt;        &lt;Initial&gt;T&lt;/Initial&gt;        &lt;Surname&gt;TEST&lt;/Surname&gt;        &lt;Remarks&gt;Car Park Test&lt;/Remarks&gt;    &lt;/Request&gt;Car Park Booking Response - DE-Start method&lt;?xml version=\"1.0\"?&gt;&lt;API_Reply Product=\"CarPark\" RequestCode=\"5\" Result=\"OK\"&gt;  &lt;Booking&gt;    &lt;BookingRef&gt;YourBookingRef&lt;/BookingRef&gt;    &lt;AgentComm&gt;5.47-&lt;/AgentComm&gt;    &lt;VATonComm&gt;0.87-&lt;/VATonComm&gt;    &lt;StartRef&gt;YourStartRef&lt;/StartRef&gt;  &lt;/Booking&gt;  &lt;CarDetails&gt;    &lt;Registration&gt;TE17 STS&lt;/Registration&gt;  &lt;/CarDetails&gt;  &lt;ClientDetails&gt;    &lt;Title&gt;MR&lt;/Title&gt;    &lt;Initial&gt;T&lt;/Initial&gt;    &lt;Surname&gt;TEST&lt;/Surname&gt;    &lt;CustomerRef&gt;N/A&lt;/CustomerRef&gt;    &lt;Remarks&gt;Car Park Test&lt;/Remarks&gt;  &lt;/ClientDetails&gt;  &lt;API_Header&gt;    &lt;Request&gt;      &lt;StartCustomer&gt;YourStartCustomer&lt;/StartCustomer&gt;      &lt;BusinessUnit&gt;YourBusinessUnit&lt;/BusinessUnit&gt;      &lt;Operator&gt;BJT&lt;/Operator&gt;      &lt;Initials&gt;YourInitials&lt;/Initials&gt;      &lt;key&gt;YourKey&lt;/key&gt;      &lt;token&gt;YourToken&lt;/token&gt;      &lt;ArrivalDate&gt;2017-12-01&lt;/ArrivalDate&gt;      &lt;ArrivalTime&gt;1200&lt;/ArrivalTime&gt;      &lt;DepartDate&gt;2017-12-08&lt;/DepartDate&gt;      &lt;DepartTime&gt;1200&lt;/DepartTime&gt;      &lt;NumberOfPax&gt;1&lt;/NumberOfPax&gt;      &lt;Registration&gt;TE17 STS&lt;/Registration&gt;      &lt;CarMake&gt;Range Rover&lt;/CarMake&gt;      &lt;CarModel&gt;Evoque&lt;/CarModel&gt;      &lt;CarColour&gt;White&lt;/CarColour&gt;      &lt;Title&gt;MR&lt;/Title&gt;      &lt;Initial&gt;T&lt;/Initial&gt;      &lt;Surname&gt;TEST&lt;/Surname&gt;      &lt;Remarks&gt;Car Park Test&lt;/Remarks&gt;      &lt;debug&gt;1&lt;/debug&gt;      &lt;system&gt;de&lt;/system&gt;      &lt;System&gt;ABG&lt;/System&gt;    &lt;/Request&gt;  &lt;/API_Header&gt;  &lt;CarPark&gt;    &lt;ArrivalDate&gt;01DEC18&lt;/ArrivalDate&gt;    &lt;DepartDate&gt;08DEC18&lt;/DepartDate&gt;    &lt;ArrivalTime&gt;1200&lt;/ArrivalTime&gt;    &lt;DepartTime&gt;1200&lt;/DepartTime&gt;    &lt;Duration&gt;8&lt;/Duration&gt;    &lt;NumberOfPax&gt;1&lt;/NumberOfPax&gt;    &lt;Code&gt;FRA8&lt;/Code&gt;    &lt;BookingURL&gt;/api/carpark/FRA8/debug&lt;/BookingURL&gt;    &lt;MoreInfoURL&gt;/api/product/FRA8/debug&lt;/MoreInfoURL&gt;  &lt;/CarPark&gt;&lt;/API_Reply&gt;",
        "url": "/hxapi/de-start/bkg/"
      }

      "hxapi-fasttrack-bkg": {
        "title": "Book FastTrack",
        "content": "Book FastTrackFastTrack Booking RequestMethodPOSTEndpointThe endpoint to use is:https://api.holidayextras.co.uk/v1/fastTrack/FastTrackCodeFor example, for FastTrack Terminal 1 at Manchester airport the endpoint is:https://api.holidayextras.co.uk/v1/fastTrack/APMANSF1Request ParametersThe parameters must be sent in the body of the request, as x-www-form-urlencoded data.NB: All parameter names are case sensitive.            Name      Data Type      Format      Mandatory?      Additional Information                  ABTANumber      String      [A-Z0-9] 5 chars      Y      This is also known as an ‘agent code’. This will be confirmed to you by your Account Manager during set up.              Password      String      [A-Z0-9] 5 chars      N*      Password required for retail agent requests - intermediaries do not require a password.This will be confirmed to you by your Account Manager during set up.              Initials      String      [A-Z] 3 chars      N      The initials of the Operator / Agent.              key      String      [A-Z]      Y      This will be assigned to you by your Account Manager during set up.              token      String      [0-9] 9 chars      Y      This is the same token used in the availability request.              ArrivalDate      Date      YYYY-MM-DD      Y      Date customer wishes to enter the fasttrack.              ArrivalTime      Time      HHMM      Y      Time customer wishes to enter the fasttrack.              Adults      Integer      [0-4] 1 char      Y      Number of adults requiring entry to the fasttrack.              Children      Integer      [0-3] 1 char      N      Number of children requiring entry to the fasttrack.              Infants      Integer      1 char      Y      Number of infants requiring entry to the fasttrack.              Title      String      [A-Z] 4 chars      Y      Title of lead passenger              Initial      String      [A-Z] 1 chars      Y      Initial of lead passenger              Surname      String      [A-Z] 20 chars      Y      Surname of lead passenger              Address[]      String      [A-Z0-9] 25 chars      Y      First line of address (house name / number and road) of lead passenger If you require more than 1 address line, then you can replicate this field and increment the number in square brackets, i.e. “Address[1]” for address line 2, and so on.NB: This field can be set to NA              Town      String      [A-Z] 20 chars      Y      Town of address NB: This field can be set to NA              County      String      [A-Z] 20 chars      Y      County of address NB: This field can be set to NA              PostCode      String      [A-Z0-9] 10 chars      Y      Post code of address NB: This field can be set to NA              Email      String      [A-Z0-9] 50 chars      Y      Email of lead passenger              MobileNum      String      [0-9] 20 char      Y      Mobile phone number of lead passenger.              PriceCheckFlag      String      Y      Y      Indicates a price check will be carried out prior to booking. If the price is lower in the system the booking will be made as the customer will benefit from a saving.  If the price has changed and is higher than the price stated on availability, an error will return to explain that the price has increased, the booking can still be made but the customer must confirm that they will pay the higher amount.  You should then resubmit the request changing the PriceCheckPrice with the new price.              PriceCheckPrice      Float      [0-9] 8 chars      Y      Price of the product, received from the availability request or price check.              System      String      [A-Z] 3 chars      Y*      For European products, you need to pass in the value of System=ABG (the default is System=ABC, which is UK products only).              Waiver      Boolean\t[0,1]      Y      Defaults to 0 if not supplied.             PaymentIn the UK, we are PCI DSS compliant and so we do not accept customers’ payment details being passed to us via the API. Further details can be found in our section on Payment.Please contact your Account Manager if you have any questions concerning payment.FastTrack Booking ResponseThe fasttrack booking response will confirm that a booking has been placed in our system.For a detailed explanation of the fields returned, please see below:            Field      Additional Information                  Booking/BookingRef      This is the reference for this booking. It must be referred to in all communication with us concerning this booking. NB: Our booking references are up to 12 char alphanumeric (including 1/I and 0/O/Q).              Booking/AgentComm      Commission you have earned from this booking.              Booking/MoreInfoURL      The URL for viewing the booking. See view booking for more details.              API_Header/Request      A list of parameters that were sent in the booking request.      Booking ConfirmationWe expect partners to create their own booking confirmations to send to customers, using the information provided in the booking response .Worked ExamplesBelow are worked examples of both the request and response for booking a fasttrack.UK Products Booking Requesthttps://api.holidayextras.co.uk/v1/fastTrack/APMANSF11    &lt;Request&gt;        &lt;ABTANumber&gt;YourABTANumber&lt;/ABTANumber&gt;        &lt;Password&gt;YourPassword&lt;/Password&gt;        &lt;Initials&gt;YourInitials&lt;/Initials&gt;        &lt;key&gt;YourKey&lt;/key&gt;        &lt;token&gt;YourToken&lt;/token&gt;        &lt;ArrivalDate&gt;2018-12-01&lt;/ArrivalDate&gt;        &lt;ArrivalTime&gt;1200&lt;/ArrivalTime&gt;        &lt;Adults&gt;2&lt;/Adults&gt;        &lt;Children&gt;0&lt;/Children&gt;        &lt;Infants&gt;0&lt;/Infants&gt;        &lt;Title&gt;MR&lt;/Title&gt;        &lt;Initial&gt;T&lt;/Initial&gt;        &lt;Surname&gt;TEST&lt;/Surname&gt;        &lt;Address&gt;123 Test Street&lt;/Address&gt;        &lt;Town&gt;Testville&lt;/Town&gt;        &lt;County&gt;Testshire&lt;/County&gt;        &lt;PostCode&gt;TE12 3ST&lt;/PostCode&gt;        &lt;Email&gt;test@test.com&lt;/Email&gt;        &lt;MobileNum&gt;01234567890&lt;/MobileNum&gt;        &lt;PriceCheckFlag&gt;Y&lt;/PriceCheckFlag&gt;        &lt;PriceCheckPrice&gt;70.00&lt;/PriceCheckPrice&gt;    &lt;/Request&gt;UK Products Booking Response&lt;?xml version=\"1.0\"?&gt;&lt;API_Reply Product=\"FastTrack\" RequestCode=\"5\" Result=\"OK\"&gt;  &lt;Booking&gt;    &lt;BookingRef&gt;APBBFKBX&lt;/BookingRef&gt;    &lt;AgentComm&gt;1.25&lt;/AgentComm&gt;    &lt;VATonComm&gt;0.21&lt;/VATonComm&gt;    &lt;MoreInfoURL&gt;v1/booking/APBBFKBX&lt;/MoreInfoURL&gt;    &lt;EmailConfirmationAttachments&gt;      &lt;name&gt;Fast Track Voucher&lt;/name&gt;      &lt;source&gt;https://voucher-staging.holidayextras.co.uk/voucher/fastTrack?email=dimitar.kod%40gmail.com&amp;booking_ref=APBBFKBX&amp;agent=TESTX&amp;productType=fastTrack&amp;productCode=MANSF1&lt;/source&gt;      &lt;type&gt;text/html&lt;/type&gt;    &lt;/EmailConfirmationAttachments&gt;  &lt;/Booking&gt;  &lt;API_Header&gt;    &lt;Request&gt;      &lt;ABTANumber&gt;YourABTANumber&lt;/ABTANumber&gt;      &lt;Password&gt;YourPassword&lt;/Password&gt;      &lt;key&gt;YourKey&lt;/key&gt;      &lt;token&gt;YourToken&lt;/token&gt;      &lt;Initials&gt;YourInitials&lt;/Initials&gt;      &lt;ArrivalDate&gt;2018-12-01&lt;/ArrivalDate&gt;      &lt;ArrivalTime&gt;1200&lt;/ArrivalTime&gt;      &lt;Adults&gt;2&lt;/Adults&gt;      &lt;Children&gt;0&lt;/Children&gt;      &lt;Infants&gt;0&lt;/Infants&gt;      &lt;Title&gt;Mr&lt;/Title&gt;      &lt;Initial&gt;T&lt;/Initial&gt;      &lt;Surname&gt;TEST&lt;/Surname&gt;      &lt;Address&gt;123 Test Street&lt;/Address&gt;      &lt;Town&gt;Testville&lt;/Town&gt;      &lt;County&gt;Testshire&lt;/County&gt;      &lt;PostCode&gt;TE12 3ST&lt;/PostCode&gt;      &lt;Email&gt;test@test.com&lt;/Email&gt;      &lt;MobileNum&gt;01234567890&lt;/MobileNum&gt;      &lt;PriceCheckFlag&gt;Y&lt;/PriceCheckFlag&gt;      &lt;PriceCheckPrice&gt;70.00&lt;/PriceCheckPrice&gt;      &lt;v&gt;1&lt;/v&gt;    &lt;/Request&gt;  &lt;/API_Header&gt;&lt;/API_Reply&gt;",
        "url": "/hxapi/fasttrack/bkg/"
      }

      "hxapi-lounge-bkg": {
        "title": "Book Lounge",
        "content": "Book LoungeLounge Booking RequestMethodPOSTEndpointThe endpoint to use is:https://api.holidayextras.co.uk/v1/lounge/LoungeCodeFor example, for Plaza Premium T5 lounge - 3 hours at London Heathrow Airport the endpoint is:https://api.holidayextras.co.uk/v1/lounge/LHRPA5Request ParametersThe parameters must be sent in the body of the request, as x-www-form-urlencoded data.NB: All parameter names are case sensitive.            Name      Data Type      Format      Mandatory?      Additional Information                  ABTANumber      String      [A-Z0-9] 5 chars      Y      This is also known as an ‘agent code’. This will be confirmed to you by your Account Manager during set up.              Password      String      [A-Z0-9] 5 chars      N*      Password required for retail agent requests - intermediaries do not require a password.This will be confirmed to you by your Account Manager during set up.              Initials      String      [A-Z] 3 chars      N      The initials of the Operator / Agent.              key      String      [A-Z]      Y      This will be assigned to you by your Account Manager during set up.              token      String      [0-9] 9 chars      Y      This is the same token used in the availability request.              ArrivalDate      Date      YYYY-MM-DD      Y      Date customer wishes to enter the lounge.              ArrivalTime      Time      HHMM      Y      Time customer wishes to enter the lounge.              Adults      Integer      [0-4] 1 char      Y      Number of adults requiring entry to the lounge. Please note: a maximum of 6 passengers is permitted on any one booking.              Children      Integer      [0-3] 1 char      N      Number of children requiring entry to the lounge. Please note: a maximum of 6 passengers is permitted on any one booking.              Infants      Integer      1 char      Y      Number of infants requiring entry to the lounge. Please note: a maximum of 6 passengers is permitted on any one booking.              Title      String      [A-Z] 4 chars      Y      Title of lead passenger              Initial      String      [A-Z] 1 chars      Y      Initial of lead passenger              Surname      String      [A-Z] 20 chars      Y      Surname of lead passenger              Address[]      String      [A-Z0-9] 25 chars      Y      First line of address (house name / number and road) of lead passenger If you require more than 1 address line, then you can replicate this field and increment the number in square brackets, i.e. “Address[1]” for address line 2, and so on.NB: This field can be set to NA              Town      String      [A-Z] 20 chars      Y      Town of address NB: This field can be set to NA              County      String      [A-Z] 20 chars      Y      County of address NB: This field can be set to NA              PostCode      String      [A-Z0-9] 10 chars      Y      Post code of address NB: This field can be set to NA              Email      String      [A-Z0-9] 50 chars      Y      Email of lead passenger              MobileNum      String      [0-9] 20 char      Y      Mobile phone number of lead passenger.              PriceCheckFlag      String      Y      Y      Indicates a price check will be carried out prior to booking. If the price is lower in the system the booking will be made as the customer will benefit from a saving.  If the price has changed and is higher than the price stated on availability, an error will return to explain that the price has increased, the booking can still be made but the customer must confirm that they will pay the higher amount.  You should then resubmit the request changing the PriceCheckPrice with the new price.              PriceCheckPrice      Float      [0-9] 8 chars      Y      Price of the product, received from the availability request or price check.              System      String      [A-Z] 3 chars      Y*      For European products, you need to pass in the value of System=ABG (the default is System=ABC, which is UK products only).              Waiver      Boolean\t[0,1]      Y      Defaults to 0 if not supplied.             PaymentIn the UK, we are PCI DSS compliant and so we do not accept customers’ payment details being passed to us via the API. Further details can be found in our section on Payment.Please contact your Account Manager if you have any questions concerning payment.Lounge Booking ResponseThe lounge booking response will confirm that a booking has been placed in our system.For a detailed explanation of the fields returned, please see below:            Field      Additional Information                  Booking/BookingRef      This is the reference for this booking. It must be referred to in all communication with us concerning this booking. NB: Our booking references are up to 12 char alphanumeric (including 1/I and 0/O/Q).              Booking/AgentComm      Commission you have earned from this booking.              Booking/MoreInfoURL      The URL for viewing the booking. See view booking for more details.              API_Header/Request      A list of parameters that were sent in the booking request.      Booking ConfirmationWe expect partners to create their own booking confirmations to send to customers, using the information provided in the booking response.However, we also have capability to send booking confirmation emails ourselves on behalf of partners. This feature is not available as standard, and so if you wish to enable this please speak to your Account Manager.Worked ExamplesBelow are worked examples of both the request and response for booking a lounge.UK Products Booking Requesthttps://api.holidayextras.co.uk/v1/lounge/LHRPO3    &lt;Request&gt;        &lt;ABTANumber&gt;YourABTANumber&lt;/ABTANumber&gt;        &lt;Password&gt;YourPassword&lt;/Password&gt;        &lt;Initials&gt;YourInitials&lt;/Initials&gt;        &lt;key&gt;YourKey&lt;/key&gt;        &lt;token&gt;YourToken&lt;/token&gt;        &lt;ArrivalDate&gt;2018-12-01&lt;/ArrivalDate&gt;        &lt;ArrivalTime&gt;1200&lt;/ArrivalTime&gt;        &lt;Adults&gt;2&lt;/Adults&gt;        &lt;Children&gt;0&lt;/Children&gt;        &lt;Infants&gt;0&lt;/Infants&gt;        &lt;Title&gt;MR&lt;/Title&gt;        &lt;Initial&gt;T&lt;/Initial&gt;        &lt;Surname&gt;TEST&lt;/Surname&gt;        &lt;Address&gt;123 Test Street&lt;/Address&gt;        &lt;Town&gt;Testville&lt;/Town&gt;        &lt;County&gt;Testshire&lt;/County&gt;        &lt;PostCode&gt;TE12 3ST&lt;/PostCode&gt;        &lt;Email&gt;test@test.com&lt;/Email&gt;        &lt;MobileNum&gt;01234567890&lt;/MobileNum&gt;        &lt;PriceCheckFlag&gt;Y&lt;/PriceCheckFlag&gt;        &lt;PriceCheckPrice&gt;70.00&lt;/PriceCheckPrice&gt;    &lt;/Request&gt;UK Products Booking Response&lt;?xml version=\"1.0\"?&gt;&lt;API_Reply Product=\"Lounge\" RequestCode=\"5\" Result=\"OK\"&gt;    &lt;Booking&gt;        &lt;BookingRef&gt;YourBookingRef&lt;/BookingRef&gt;        &lt;AgentComm&gt;7.00&lt;/AgentComm&gt;        &lt;VATonComm&gt;0.00&lt;/VATonComm&gt;        &lt;MoreInfoURL&gt;/v1/booking/YourBookingRef&lt;/MoreInfoURL&gt;    &lt;/Booking&gt;    &lt;API_Header&gt;        &lt;Request&gt;            &lt;ABTANumber&gt;YourABTANumber&lt;/ABTANumber&gt;            &lt;Password&gt;YourPassword&lt;/Password&gt;            &lt;key&gt;YourKey&lt;/key&gt;            &lt;token&gt;YourToken&lt;/token&gt;            &lt;Initials&gt;YourInitials&lt;/Initials&gt;            &lt;ArrivalDate&gt;2018-12-01&lt;/ArrivalDate&gt;            &lt;ArrivalTime&gt;1200&lt;/ArrivalTime&gt;            &lt;Adults&gt;2&lt;/Adults&gt;            &lt;Children&gt;0&lt;/Children&gt;            &lt;Infants&gt;0&lt;/Infants&gt;            &lt;Title&gt;Mr&lt;/Title&gt;            &lt;Initial&gt;T&lt;/Initial&gt;            &lt;Surname&gt;TEST&lt;/Surname&gt;            &lt;Address&gt;123 Test Street&lt;/Address&gt;            &lt;Town&gt;Testville&lt;/Town&gt;            &lt;County&gt;Testshire&lt;/County&gt;            &lt;PostCode&gt;TE12 3ST&lt;/PostCode&gt;            &lt;Email&gt;test@test.com&lt;/Email&gt;            &lt;MobileNum&gt;01234567890&lt;/MobileNum&gt;            &lt;PriceCheckFlag&gt;Y&lt;/PriceCheckFlag&gt;            &lt;PriceCheckPrice&gt;70.00&lt;/PriceCheckPrice&gt;            &lt;v&gt;1&lt;/v&gt;        &lt;/Request&gt;    &lt;/API_Header&gt;&lt;/API_Reply&gt;European Products Booking Requesthttps://api.holidayextras.co.uk/v1/lounge/HAMLHL    &lt;Request&gt;        &lt;ABTANumber&gt;YourABTANumber&lt;/ABTANumber&gt;        &lt;Password&gt;YourPassword&lt;/Password&gt;        &lt;Initials&gt;YourInitials&lt;/Initials&gt;        &lt;key&gt;YourKey&lt;/key&gt;        &lt;token&gt;YourToken&lt;/token&gt;        &lt;System&gt;ABG&lt;/System&gt;        &lt;ArrivalDate&gt;2018-12-01&lt;/ArrivalDate&gt;        &lt;ArrivalTime&gt;1200&lt;/ArrivalTime&gt;        &lt;Adults&gt;2&lt;/Adults&gt;        &lt;Children&gt;0&lt;/Children&gt;        &lt;Infants&gt;0&lt;/Infants&gt;        &lt;Title&gt;MR&lt;/Title&gt;        &lt;Initial&gt;T&lt;/Initial&gt;        &lt;Surname&gt;TEST&lt;/Surname&gt;        &lt;Address&gt;123 Test Street&lt;/Address&gt;        &lt;Town&gt;Testville&lt;/Town&gt;        &lt;County&gt;Testshire&lt;/County&gt;        &lt;PostCode&gt;TE12 3ST&lt;/PostCode&gt;        &lt;Email&gt;test@test.com&lt;/Email&gt;        &lt;MobileNum&gt;01234567890&lt;/MobileNum&gt;        &lt;PriceCheckFlag&gt;Y&lt;/PriceCheckFlag&gt;        &lt;PriceCheckPrice&gt;70.00&lt;/PriceCheckPrice&gt;    &lt;/Request&gt;European Products Booking Response&lt;?xml version=\"1.0\"?&gt;&lt;API_Reply Product=\"Lounge\" RequestCode=\"5\" Result=\"OK\"&gt;    &lt;Booking&gt;        &lt;BookingRef&gt;YourBookingRef&lt;/BookingRef&gt;        &lt;AgentComm&gt;5.44&lt;/AgentComm&gt;        &lt;VATonComm&gt;0.00&lt;/VATonComm&gt;        &lt;MoreInfoURL&gt;/v1/booking/YourBookingRef&lt;/MoreInfoURL&gt;    &lt;/Booking&gt;    &lt;API_Header&gt;        &lt;Request&gt;            &lt;ABTANumber&gt;YourABTANumber&lt;/ABTANumber&gt;            &lt;Password&gt;YourPassword&lt;/Password&gt;            &lt;Initials&gt;YourInitials&lt;/Initials&gt;            &lt;key&gt;YourKey&lt;/key&gt;            &lt;token&gt;YourToken&lt;/token&gt;            &lt;System&gt;ABG&lt;/System&gt;            &lt;ArrivalDate&gt;2018-12-01&lt;/ArrivalDate&gt;            &lt;ArrivalTime&gt;1200&lt;/ArrivalTime&gt;            &lt;Adults&gt;2&lt;/Adults&gt;            &lt;Children&gt;0&lt;/Children&gt;            &lt;Infants&gt;0&lt;/Infants&gt;            &lt;Title&gt;Mr&lt;/Title&gt;            &lt;Initial&gt;T&lt;/Initial&gt;            &lt;Surname&gt;TEST&lt;/Surname&gt;            &lt;Address&gt;123 Test Street&lt;/Address&gt;            &lt;Town&gt;Testville&lt;/Town&gt;            &lt;County&gt;Testshire&lt;/County&gt;            &lt;PostCode&gt;TE12 3ST&lt;/PostCode&gt;            &lt;Email&gt;test@test.com&lt;/Email&gt;            &lt;MobileNum&gt;01234567890&lt;/MobileNum&gt;            &lt;PriceCheckFlag&gt;Y&lt;/PriceCheckFlag&gt;            &lt;PriceCheckPrice&gt;70.00&lt;/PriceCheckPrice&gt;            &lt;v&gt;1&lt;/v&gt;        &lt;/Request&gt;    &lt;/API_Header&gt;&lt;/API_Reply&gt;",
        "url": "/hxapi/lounge/bkg/"
      }
