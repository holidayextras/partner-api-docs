      "hxapi-parking-bkg": {
        "title": "Book Car Park",
        "content": "Book Car ParkAPI Docs &gt; product:Parking &gt; endpoint:carpark &gt; Make BookingCar Park Booking RequestMethodPOSTEndpointThe endpoint to use is:https://api.holidayextras.co.uk/v1/carpark/CarParkCodeFor example, for Maple Manor Meet and Greet at London Gatwick North terminal the endpoint is:https://api.holidayextras.co.uk/v1/carpark/LGW4Request ParametersThe parameters must be sent in the body of the request, as x-www-form-urlencoded data.NB: All parameter names are case sensitive.            Name      Data Type      Format      Mandatory?      Additional Information                  ABTANumber      String      [A-Z0-9] 5 chars      Y      This is also known as an ‘agent code’. This will be confirmed to you by your Account Manager during set up.              Password      String      [A-Z0-9] 5 chars      N*      Password required for retail agent requests - intermediaries do not require a password.This will be confirmed to you by your Account Manager during set up.              Initials      String      [A-Z] 3 chars      N      The initials of the Operator / Agent.              key      String      [A-Z]      Y      This will be assigned to you by your Account Manager during set up.              token      String      [0-9] 9 chars      Y      This is the same token used in the availability request.              ArrivalDate      Date      YYYY-MM-DD      Y      Date customer drops vehicle at car park.              ArrivalTime      Time      HHMM      Y      Time customer drops vehicle at car park.              DepartDate      Date      YYYY-MM-DD      Y      Date customer picks up vehicle from car park.              DepartTime      Time      HHMM      Y      Time customer picks up vehicle from car park.              NumberOfPax      Integer      [0-9] 2 chars      Y      Number of passengers.              Title      String      [A-Z] 4 chars      Y      Title of lead passenger              Initial      String      [A-Z] 1 chars      Y      Initial of lead passenger              Surname      String      [A-Z] 20 chars      Y      Surname of lead passenger              Address[]      String      [A-Z0-9] 25 chars      Y      First line of address (house name / number and road) of lead passenger If you require more than 1 address line, then you can replicate this field and increment the number in square brackets, i.e. “Address[1]” for address line 2, and so on.NB: This field can be set to NA              Town      String      [A-Z] 20 chars      Y      Town of address NB: This field can be set to NA              County      String      [A-Z] 20 chars      Y      County of address NB: This field can be set to NA              PostCode      String      [A-Z0-9] 10 chars      Y      Post code of address NB: This field can be set to NA              Email      String      [A-Z0-9] 50 chars      Y      Email of lead passenger              PriceCheckFlag      String      Y      Y      Indicates a price check will be carried out prior to booking. If the price is lower in the system the booking will be made as the customer will benefit from a saving.  If the price has changed and is higher than the price stated on availability, an error will return to explain that the price has increased, the booking can still be made but the customer must confirm that they will pay the higher amount.  You should then resubmit the request changing the PriceCheckPrice with the new price.              PriceCheckPrice      Float      [0-9]      Y      Price of the product, received from the availability request or price check.              System      String      [A-Z] 3 chars      Y*      For European products, you need to pass in the value of System=ABG (the default is System=ABC, which is UK products only).      Request flagsWhen you receive the availability response, it will indicate which request flags are required to be sent as part of the booking request.The request flags differ depending on the product’s region and the supplier’s requirements. A summary is below, but please see the relevant sections in the availability endpoint documentation.UK ProductsThe &lt;RequestFlags&gt; field dictates which fields need to be sent as part of the booking request.European ProductsThe availability response will return a list of 18 flags in the &lt;CarDetFlags&gt; field with a yes/no response to indicate if required. The order of the flags is always the same.PaymentIn the UK, we are PCI DSS compliant and so we do not accept customers’ payment details being passed to us via the API. Further details can be found in our section on Payment.Please contact your Account Manager if you have any questions concerning payment.Booking Terms and ConditionsIt is important that the customer has access to the Terms and Conditions at the time of placing their booking and after. We highly recommend that these are made clear to the customer before booking.For European products, please use the following link:http://www.holidayextras.de/images/de-hx/pdf/agb.pdfIf you require translations of Terms and Conditions into other languages, you can simply change /de-hx/ (German) into nl-hx (Dutch), it-hex (Italian), pt-hx (Portuguese), fr-hx (French), es-hx (Spanish) or en-hx (English).Car Park Booking ResponseThe car park booking response will confirm that a booking has been placed in our system.For a detailed explanation of the fields returned, please see below:            Field      Additional Information                  Booking/BookingRef      This is the reference for this booking. It must be referred to in all communication with us concerning this booking. NB: Our booking references are up to 12 char alphanumeric (including 1/I and 0/O/Q).              Booking/AgentComm      Commission you have earned from this booking.              CarDetails      Confirmation of the vehicle details that were sent in the booking request.              ClientDetails      Confirmation of the lead passenger’s details that were sent in the booking request.              HandlingFee      Any booking fees that are applicable for processing this transaction. Currently, we do not charge for processing bookings, so this figure will be zero.              MoreInfoURL      The URL for viewing the booking. See view booking for more details.              CarPark      Details of the car park that were sent in the booking request.              API_Header/Request      A list of parameters that were sent in the booking request.      Booking ConfirmationWe expect partners to create their own booking confirmations to send to customers, using the information provided in the booking response.However, we also have capability to send booking confirmation emails ourselves on behalf of partners. This feature is not available as standard, and so if you wish to enable this please speak to your Account Manager.Worked ExamplesBelow are worked examples of both the request and response for booking car parking.UK Products Booking Requesthttps://api.holidayextras.co.uk/carpark/LGW4    &lt;Request&gt;        &lt;ABTANumber&gt;YourABTA&lt;/ABTANumber&gt;        &lt;Password&gt;YourPassword&lt;/Password&gt;        &lt;Initials&gt;YourInitials&lt;/Initials&gt;        &lt;key&gt;YourKey&lt;/key&gt;        &lt;token&gt;YourToken&lt;/token&gt;        &lt;ArrivalDate&gt;2017-12-01&lt;/ArrivalDate&gt;        &lt;ArrivalTime&gt;1200&lt;/ArrivalTime&gt;        &lt;DepartDate&gt;2017-12-08&lt;/DepartDate&gt;        &lt;DepartTime&gt;1200&lt;/DepartTime&gt;        &lt;NumberOfPax&gt;1&lt;/NumberOfPax&gt;        &lt;Title&gt;MR&lt;/Title&gt;        &lt;Initial&gt;T&lt;/Initial&gt;        &lt;Surname&gt;TEST&lt;/Surname&gt;        &lt;Address&gt;123 Test Street&lt;/Address&gt;        &lt;Town&gt;Testville&lt;/Town&gt;        &lt;County&gt;Testshire&lt;/County&gt;        &lt;PostCode&gt;TE12 3ST&lt;/PostCode&gt;        &lt;Email&gt;test@test.com&lt;/Email&gt;        &lt;PriceCheckFlag&gt;Y&lt;/PriceCheckFlag&gt;        &lt;PriceCheckPrice&gt;57.99&lt;/PriceCheckPrice&gt;        &lt;CarColour&gt;White&lt;/CarColour&gt;        &lt;CarMake&gt;Range Rover&lt;/CarMake&gt;        &lt;CarModel&gt;Evoque&lt;/CarModel&gt;        &lt;Destination&gt;Munich&lt;/Destination&gt;        &lt;OutFlight&gt;EZY8985&lt;/OutFlight&gt;        &lt;OutTerminal&gt;N&lt;/OutTerminal&gt;        &lt;Registration&gt;TE17 STS&lt;/Registration&gt;        &lt;ReturnFlight&gt;EZY8982&lt;/ReturnFlight&gt;        &lt;ReturnTerminal&gt;N&lt;/ReturnTerminal&gt;        &lt;MobileNum&gt;01234567890&lt;/MobileNum&gt;    &lt;/Request&gt;UK Products Booking Response&lt;?xml version=\"1.0\"?&gt;&lt;API_Reply Product=\"CarPark\" RequestCode=\"5\" Result=\"OK\"&gt;    &lt;Booking&gt;        &lt;BookingRef&gt;YourBookingRef&lt;/BookingRef&gt;        &lt;AgentComm&gt;7.25&lt;/AgentComm&gt;        &lt;VATonComm&gt;0.00&lt;/VATonComm&gt;        &lt;PdfUrl&gt;/v1/confirmation?email=test%40test.com&amp;amp;booking_ref=HPABCDE&amp;amp;product_type=carparks&lt;/PdfUrl&gt;    &lt;/Booking&gt;    &lt;CarDetails&gt;        &lt;Registration&gt;TE17 STS&lt;/Registration&gt;        &lt;CarMake&gt;RANGE ROVER&lt;/CarMake&gt;        &lt;CarModel&gt;EVOQUE&lt;/CarModel&gt;        &lt;CarColour&gt;WHITE&lt;/CarColour&gt;        &lt;OutFlight&gt;EZY8985&lt;/OutFlight&gt;        &lt;Destination&gt;MUNICH&lt;/Destination&gt;        &lt;MobileNum/&gt;    &lt;/CarDetails&gt;    &lt;ClientDetails&gt;        &lt;Title&gt;MR&lt;/Title&gt;        &lt;Initial&gt;T&lt;/Initial&gt;        &lt;Surname&gt;TEST&lt;/Surname&gt;        &lt;Email&gt;test@test.com&lt;/Email&gt;    &lt;/ClientDetails&gt;    &lt;HandlingFee&gt;0.00&lt;/HandlingFee&gt;    &lt;MoreInfoURL&gt;/booking/YourBookingRef&lt;/MoreInfoURL&gt;    &lt;CarPark&gt;        &lt;ArrivalDate&gt;2017-12-01&lt;/ArrivalDate&gt;        &lt;DepartDate&gt;2017-12-08&lt;/DepartDate&gt;        &lt;ArrivalTime&gt;1200&lt;/ArrivalTime&gt;        &lt;DepartTime&gt;1200&lt;/DepartTime&gt;        &lt;Duration&gt;7&lt;/Duration&gt;        &lt;NumberOfPax&gt;1&lt;/NumberOfPax&gt;        &lt;ReturnFlight&gt;EZY8982&lt;/ReturnFlight&gt;        &lt;Code&gt;LGW4&lt;/Code&gt;        &lt;TotalPrice&gt;57.99&lt;/TotalPrice&gt;        &lt;Name&gt;Maple Manor Meet and Greet North&lt;/Name&gt;        &lt;introduction&gt;With 20 years' experience in providing a great service, Maple Manor Meet and Greet parking is a firm favourite with our customers and it's easy to see why. One of their professional, insured chauffeurs will meet you at the North terminal and park your car for you in a secured car park while you catch your flight. It couldn't be simpler and all for this low price. We only sell airport-approved Meet and Greet services and Maple Manor is no exception.&lt;/introduction&gt;        &lt;advance_purchase&gt;1&lt;/advance_purchase&gt;        &lt;logo&gt;//d1xcii4rs5n6co.cloudfront.net/libraryimages/LGW4_LGV0_LGT9_LGY8_thumbnail_logo.png&lt;/logo&gt;        &lt;BookingURL&gt;/carpark/LGW4&lt;/BookingURL&gt;        &lt;MoreInfoURL&gt;/product/LGW4&lt;/MoreInfoURL&gt;    &lt;/CarPark&gt;    &lt;API_Header&gt;        &lt;Request&gt;            &lt;ABTANumber&gt;YourABTANumber&lt;/ABTANumber&gt;            &lt;Password&gt;YourPassword&lt;/Password&gt;            &lt;Initials&gt;YourInitials&lt;/Initials&gt;            &lt;key&gt;YourKey&lt;/key&gt;            &lt;token&gt;YourToken&lt;/token&gt;            &lt;ArrivalDate&gt;2017-12-01&lt;/ArrivalDate&gt;            &lt;ArrivalTime&gt;1200&lt;/ArrivalTime&gt;            &lt;DepartDate&gt;2017-12-08&lt;/DepartDate&gt;            &lt;DepartTime&gt;1200&lt;/DepartTime&gt;            &lt;NumberOfPax&gt;1&lt;/NumberOfPax&gt;            &lt;Title&gt;MR&lt;/Title&gt;            &lt;Initial&gt;T&lt;/Initial&gt;            &lt;Surname&gt;TEST&lt;/Surname&gt;            &lt;Address&gt;123 Test Street&lt;/Address&gt;            &lt;Town&gt;Testville&lt;/Town&gt;            &lt;County&gt;Testshire&lt;/County&gt;            &lt;PostCode&gt;TE12 3ST&lt;/PostCode&gt;            &lt;Email&gt;test@test.com&lt;/Email&gt;            &lt;PriceCheckFlag&gt;Y&lt;/PriceCheckFlag&gt;            &lt;PriceCheckPrice&gt;57.99&lt;/PriceCheckPrice&gt;            &lt;CarColour&gt;White&lt;/CarColour&gt;            &lt;CarMake&gt;Range Rover&lt;/CarMake&gt;            &lt;CarModel&gt;Evoque&lt;/CarModel&gt;            &lt;Destination&gt;Munich&lt;/Destination&gt;            &lt;OutFlight&gt;EZY8985&lt;/OutFlight&gt;            &lt;OutTerminal&gt;N&lt;/OutTerminal&gt;            &lt;Registration&gt;TE17 STS&lt;/Registration&gt;            &lt;ReturnFlight&gt;EZY8982&lt;/ReturnFlight&gt;            &lt;ReturnTerminal&gt;N&lt;/ReturnTerminal&gt;            &lt;MobileNum&gt;01234567890&lt;/MobileNum&gt;        &lt;/Request&gt;    &lt;/API_Header&gt;&lt;/API_Reply&gt;European Products Booking Requesthttps://api.holidayextras.co.uk/carpark/MU01&lt;Request&gt;            &lt;ABTANumber&gt;YourABTANumber&lt;/ABTANumber&gt;            &lt;Password&gt;YourPassword&lt;/Password&gt;            &lt;Initials&gt;YourInitials&lt;/Initials&gt;            &lt;key&gt;YourKey&lt;/key&gt;            &lt;token&gt;YourToken&lt;/token&gt;            &lt;ArrivalDate&gt;2017-12-01&lt;/ArrivalDate&gt;            &lt;ArrivalTime&gt;1200&lt;/ArrivalTime&gt;            &lt;DepartDate&gt;2017-12-08&lt;/DepartDate&gt;            &lt;DepartTime&gt;1200&lt;/DepartTime&gt;            &lt;NumberOfPax&gt;1&lt;/NumberOfPax&gt;            &lt;Title&gt;HERR&lt;/Title&gt;            &lt;Initial&gt;T&lt;/Initial&gt;            &lt;Surname&gt;TEST&lt;/Surname&gt;            &lt;Address&gt;123 Test Street&lt;/Address&gt;            &lt;Town&gt;Testville&lt;/Town&gt;            &lt;County&gt;Testshire&lt;/County&gt;            &lt;PostCode&gt;TE12 3ST&lt;/PostCode&gt;            &lt;Email&gt;test@test.com&lt;/Email&gt;            &lt;PriceCheckFlag&gt;Y&lt;/PriceCheckFlag&gt;            &lt;PriceCheckPrice&gt;35.00&lt;/PriceCheckPrice&gt;            &lt;System&gt;ABG&lt;/System&gt;            &lt;O       "hxapi-bundles": {
        "title": "Bundles",
        "content": "BundlesSome results that are returned from availability on the API will be what we call bundles, these consist of a main product, such as a hotel, bundled together with an additional supplement, like a dinner.Bundles are currently only available on hotel searches.AvailabilityBundles can be identified by their product code, which has an additional element preceding the main product code joined by a +.E.g...&lt;Name&gt;Cresta Court with 2-course dinner&lt;/Name&gt;&lt;Code&gt;MANCCT+B519&lt;/Code&gt;&lt;BookingURL&gt;/v1/hotel/HPMANCCT+B519&lt;/BookingURL&gt;&lt;Price&gt;110.65&lt;/Price&gt;...The price given will be for the entire bundle including the supplement with the current passenger quantity ( determined by the given room code ).A product library request can be made with the complete bundle product code to get content related to the package as a whole instead of simply the main product. E.g /v1/product/MANCCT+B519BookingThe BookingURL element will contain the full product code, including prefix, that must be supplied when a bundle is to be booked, this will ensure that system books the main product as well as the appropriate supplement. When booking a bundle on a hotel search the quantity of the supplement will be determined by the given room occupancy in the Adults and Children fields.The booking response for a bundle booking will show the main product and the booked supplement as seperate elements. The TotalPrice field will contain the full price of the booking, but the supplement price will also be shown separately under the CurrentSupplements block.E.g...&lt;Booking&gt;&lt;BookingRef&gt;XXXXX&lt;/BookingRef&gt;&lt;AgentComm&gt;12.41&lt;/AgentComm&gt;&lt;VATonComm&gt;2.07&lt;/VATonComm&gt;&lt;MoreInfoURL&gt;/v1/booking/XXXXX&lt;/MoreInfoURL&gt;&lt;/Booking&gt;&lt;Hotel/&gt;&lt;Itinerary&gt;&lt;TotalPrice&gt;110.65&lt;/TotalPrice&gt;&lt;ArrivalDate&gt;2019-03-10&lt;/ArrivalDate&gt;&lt;Nights&gt;1&lt;/Nights&gt;&lt;BoardBasis&gt;RO&lt;/BoardBasis&gt;&lt;NonSmoking&gt;N&lt;/NonSmoking&gt;&lt;ReturnFlight/&gt;&lt;TerminalCode/&gt;&lt;Code&gt;MANCCT&lt;/Code&gt;&lt;Name/&gt;&lt;ParkingDays&gt;0&lt;/ParkingDays&gt;&lt;ParkingSpaces&gt;0&lt;/ParkingSpaces&gt;&lt;/Itinerary&gt;&lt;Room&gt;&lt;Adults&gt;2&lt;/Adults&gt;&lt;Children&gt;1&lt;/Children&gt;&lt;Infants&gt;0&lt;/Infants&gt;&lt;Code&gt;TRL&lt;/Code&gt;&lt;/Room&gt;&lt;CurrentSupplements&gt;&lt;Code&gt;MANCDI&lt;/Code&gt;&lt;Name&gt;2-course dinner&lt;/Name&gt;&lt;Price&gt;29.90&lt;/Price&gt;&lt;NonDiscPrice&gt;29.90&lt;/NonDiscPrice&gt;&lt;Per&gt;person&lt;/Per&gt;&lt;Adults&gt;2&lt;/Adults&gt;&lt;Children&gt;1&lt;/Children&gt;&lt;Date&gt;2019-03-10&lt;/Date&gt;&lt;Canx&gt;Y&lt;/Canx&gt;&lt;Remarks/&gt;&lt;/CurrentSupplements&gt;...The product code of the supplement will also be returned in the booking response which can be used to retrieve product specific content in the product library request that can be displayed on booking confirmations. When creating confirmation emails be sure to highlight that the supplement has been added as a part of this booking.Post BookingA bundle booking can be amended or cancelled following the same rules as a general product. The supplement has a Canx field in the booking response that will define if that particular add-on can be cancelled as part of the booking. It is not currently possible to amend the quantity of the supplement or remove it from the booking using the API.",
        "url": "/hxapi/bundles/"
      }

      "hxapi-de-start-cancel": {
        "title": "Cancel Booking - DE Start Method",
        "content": "Cancel Booking - DE Start MethodCancel Booking RequestCancelling a booking is a two-stage process:  Check if the booking is cancellable, and any charges for doing so, using the GET method outlined below;  Cancel the booking using the POST method outlined below.MethodGET / POSTEndpointThe endpoint to use is (where YourBookingRef is the Holiday Extras booking reference):https://payment.holidayextras.co.uk/legacy/booking/YourBookingRefRequest ParametersStep 1: Check if booking is cancellable (GET)NB: All parameter names are case sensitive.            Name      Data Type      Format      Mandatory?      Additional Information                  StartCustomer      String      [0-9] 6 chars      Y      This will be assigned to you by your Account Manager during set up.              BusinessUnit      String      [0-9] 3 chars      Y      This will be assigned to you by your Account Manager during set up.              Operator      String      [A-Z] 3 chars      Y      This always defaults to BJT.              key      String      [A-Z]      Y      This will be assigned to you by your Account Manager during set up.              token      String      [0-9] 9 chars      Y      This is the same token used in the availability request.              ConfirmCancel      String      1 chars      Y      Set this to N for this initial step.              CancelRef      String      [A-Z] 10 chars      Y      The reference for the cancellation, e.g. agent’s initials.      Step 2: Cancel booking (POST)NB: All parameter names are case sensitive.            Name      Data Type      Format      Mandatory?      Additional Information                  StartCustomer      String      [0-9] 6 chars      Y      This will be assigned to you by your Account Manager during set up.              BusinessUnit      String      0-9] 3 chars      Y      This will be assigned to you by your Account Manager during set up.              Operator      String      [A-Z] 3 chars      Y      This always defaults to BJT.              key      String      [A-Z]      Y      This will be assigned to you by your Account Manager during set up.              token      String      [0-9] 9 chars      Y      This is the same token used in the availability request.              ConfirmCancel      String      1 chars      Y      Set this to N for this initial step.              CancelRef      String      [A-Z0-9] 10 chars      Y      The reference for the cancellation, e.g. agent’s initials.      Cancel Booking Response - DE-Start MethodThe cancel booking response will confirm that a booking has been cancelled in our system.For a detailed explanation of the fields returned, please see below:            Field      Additional Information                  Booking/BookingRef      This is the reference for this booking. It must be referred to in all communication with us concerning this booking. NB: Our booking references are up to 12 char alphanumeric (including 1/I and 0/O/Q).              Cancel/RefundAmount      This shows the amount to be refunded to the customer.              API_Header/Request      A list of parameters that were sent in the booking request.      Credit Card FeesAs of 12th January 2018 we no longer charge credit card fees, in line with the Payment Services Directive (PSD2). This applies to both UK and EU products.Worked examplesBelow are worked examples of both the request and response for cancelling a booking.Cancel Booking Request - Step 1https://payment.holidayextras.co.uk/legacy/booking/YourBookingRef?BusinessUnit=YourBusinessUnit&amp;ConfirmCancel=N&amp;Operator=BJT&amp;SStartCustomer=YourStartCustomer&amp;key=YourKey&amp;token=YourToken&amp;CancelRef=YourCancelRefCancel Booking Response - Step 1&lt;?xml version=\"1.0\" ?&gt;&lt;API_Reply System=\"ABG\" Version=\"1.0\" Product=\"Cancel\" Customer=\"A\" Session=\"123456789\" RequestCode=\"9\" Result=\"OK\"&gt;  &lt;Booking&gt;    &lt;BookingRef&gt;YourBookingRef&lt;/BookingRef&gt;    &lt;StartRef&gt;YourStartRef&lt;/StartRef&gt;  &lt;/Booking&gt;  &lt;Cancel&gt;    &lt;CancelFee&gt;0.00&lt;/CancelFee&gt;    &lt;CancelInfo&gt;Es gibt keine Geb&amp;#252;hr f&amp;#252;r die Stornierung dieser Buchung&lt;/CancelInfo&gt;  &lt;/Cancel&gt;  &lt;API_Header&gt;    &lt;Request&gt;      &lt;BusinessUnit&gt;YourBusinessUnit&lt;/BusinessUnit&gt;      &lt;ConfirmCancel&gt;N&lt;/ConfirmCancel&gt;      &lt;Operator&gt;BJT&lt;/Operator&gt;      &lt;StartCustomer&gt;YourStartCustomer&lt;/StartCustomer&gt;      &lt;key&gt;YourKey&lt;/key&gt;      &lt;token&gt;YourToken&lt;/token&gt;      &lt;CancelRef&gt;YourCancelRef&lt;/CancelRef&gt;      &lt;system&gt;de&lt;/system&gt;      &lt;System&gt;ABG&lt;/System&gt;    &lt;/Request&gt;  &lt;/API_Header&gt;&lt;/API_Reply&gt;Cancel Booking Request - Step 2https://payment.holidayextras.co.uk/legacy/booking/YourBookingRef    &lt;Request&gt;        &lt;BusinessUnit&gt;YourBusinessUnit&lt;/BusinessUnit&gt;        &lt;ConfirmCancel&gt;Y&lt;/ConfirmCancel&gt;        &lt;Operator&gt;BJT&lt;/Operator&gt;        &lt;StartCustomer&gt;YourStartCustomer&lt;/StartCustomer&gt;        &lt;key&gt;YourKey&lt;/key&gt;        &lt;token&gt;YourToken&lt;/token&gt;        &lt;CancelRef&gt;YourCancelRef&lt;/CancelRef&gt;    &lt;/Request&gt;Cancel Booking Response - Step 2&lt;?xml version=\"1.0\" ?&gt;&lt;API_Reply System=\"ABG\" Version=\"1.0\" Product=\"Cancel\" Customer=\"A\" Session=\"123456789\" RequestCode=\"9\" Result=\"OK\"&gt;  &lt;Booking&gt;    &lt;BookingRef&gt;YourBookingRef&lt;/BookingRef&gt;    &lt;StartRef&gt;YourStartRef&lt;/StartRef&gt;  &lt;/Booking&gt;  &lt;Cancel&gt;    &lt;CancelFee&gt;0.00&lt;/CancelFee&gt;    &lt;CancelRef&gt;YourCancelRef&lt;/CancelRef&gt;    &lt;CancelInfo&gt;Bitten Sie um R&amp;#252;ckgabe des Kundenvouchers, da er seine G&amp;#252;ltigkeit nicht verliert&lt;/CancelInfo&gt;  &lt;/Cancel&gt;  &lt;API_Header&gt;    &lt;Request&gt;      &lt;BusinessUnit&gt;YourBusinessUnit&lt;/BusinessUnit&gt;      &lt;CancelRef&gt;YourCancelRef&lt;/CancelRef&gt;      &lt;ConfirmCancel&gt;Y&lt;/ConfirmCancel&gt;      &lt;Operator&gt;BJT&lt;/Operator&gt;      &lt;StartCustomer&gt;YourStartCustomer&lt;/StartCustomer&gt;      &lt;key&gt;YourKey&lt;/key&gt;      &lt;token&gt;YourToken&lt;/token&gt;      &lt;system&gt;de&lt;/system&gt;      &lt;System&gt;ABG&lt;/System&gt;    &lt;/Request&gt;  &lt;/API_Header&gt;&lt;/API_Reply&gt;",
        "url": "/hxapi/de-start/cancel/"
      }

      "hxapi-viewamendcancel-cancel": {
        "title": "Cancel Booking",
        "content": "Cancel BookingAPI Docs &gt; product:cancelCancel Booking RequestCancelling a booking is a two-stage process:  Check if the booking is cancellable, and any charges for doing so, using the GET method outlined below;  Cancel the booking using the POST method outlined below.MethodGET / POSTEndpointThe endpoint to use is (where YourBookingRef is the Holiday Extras booking reference):https://api.holidayextras.co.uk/v1/booking/YourBookingRefRequest ParametersStep 1: Check if booking is cancellable (GET)NB: All parameter names are case sensitive.            Name      Data Type      Format      Mandatory?      Additional Information                  ABTANumber      String      [A-Z0-9] 5 chars      Y      This is also known as an ‘agent code’. This will be confirmed to you by your Account Manager during set up.              Password      String      [A-Z0-9] 5 chars      N*      Password required for retail agent requests - intermediaries do not require a password.This will be confirmed to you by your Account Manager during set up.              Initials      String      [A-Z] 3 chars      N      The initials of the Operator / Agent.              key      String      [A-Z]      Y      This will be assigned to you by your Account Manager during set up.              System      String      [A-Z] 3 chars      Y*      For European products, you need to pass in the value of System=ABG (the default is System=ABC, which is UK products only).              ConfirmCancel      String      1 chars      Y      Set this to N for this initial step.              CancelRef      String      [A-Z0-9] 10 chars      Y      The reference for the cancellation, e.g. agent’s initials.      Step 2: Cancel booking (POST)NB: All parameter names are case sensitive.            Name      Data Type      Format      Mandatory?      Additional Information                  ABTANumber      String      [A-Z0-9] 5 chars      Y      This is also known as an ‘agent code’. This will be confirmed to you by your Account Manager during set up.              Password      String      [A-Z0-9] 5 chars      N*      Password required for retail agent requests - intermediaries do not require a password.This will be confirmed to you by your Account Manager during set up.              Initials      String      [A-Z] 3 chars      N      The initials of the Operator / Agent.              key      String      [A-Z]      Y      This will be assigned to you by your Account Manager during set up.              System      String      [A-Z] 3 chars      Y*      For European products, you need to pass in the value of System=ABG (the default is System=ABC, which is UK products only).              ConfirmCancel      String      1 chars      Y      Set this to Y for the cancellation step.              CancelRef      String      [A-Z0-9] 10 chars      Y      The reference for the cancellation, e.g. agent’s initials.      Cancel Booking ResponseThe cancel booking response will confirm that a booking has been cancelled in our system.For a detailed explanation of the fields returned, please see below:            Field      Additional Information                  Booking/BookingRef      This is the reference for this booking. It must be referred to in all communication with us concerning this booking. NB: Our booking references are up to 12 char alphanumeric (including 1/I and 0/O/Q).              Cancel/RefundAmount      This shows the amount to be refunded to the customer.              API_Header/Request      A list of parameters that were sent in the booking request.      Credit Card FeesAs of 12th January 2018 we no longer charge credit card fees, in line with the Payment Services Directive (PSD2). This applies to both UK and EU products.Worked examplesBelow are worked examples of both the request and response for cancelling a booking.Cancel Booking Request - Step 1https://api.holidayextras.co.uk/v1/booking/YourBookingRef?ABTANumber=YourABTANumber&amp;Password=YourPassword&amp;key=YourKey&amp;ConfirmCancel=N&amp;CancelRef=YourCancelRefCancel Booking Response - Step 1&lt;?xml version=\"1.0\"?&gt;&lt;API_Reply Result=\"OK\"&gt;    &lt;Booking&gt;        &lt;BookingRef&gt;YourBookingRef&lt;/BookingRef&gt;    &lt;/Booking&gt;    &lt;Cancel&gt;        &lt;CancelFee&gt;0.00&lt;/CancelFee&gt;        &lt;CancelRef/&gt;        &lt;CancelInfo&gt;There is no charge for cancelling this booking&lt;/CancelInfo&gt;        &lt;RefundAmount&gt;35.92&lt;/RefundAmount&gt;    &lt;/Cancel&gt;    &lt;API_Header&gt;        &lt;Request&gt;            &lt;ABTANumber&gt;YourABTANumber&lt;/ABTANumber&gt;            &lt;Password&gt;YourPassword&lt;/Password&gt;            &lt;key&gt;YourKey&lt;/key&gt;            &lt;ConfirmCancel&gt;N&lt;/ConfirmCancel&gt;            &lt;CancelRef&gt;YourCancelRef&lt;/CancelRef&gt;            &lt;v&gt;1&lt;/v&gt;        &lt;/Request&gt;    &lt;/API_Header&gt;&lt;/API_Reply&gt;Cancel Booking Request - Step 2https://api.holidayextras.co.uk/v1/booking/YourBookingRef    &lt;Request&gt;        &lt;ABTANumber&gt;YourABTA&lt;/ABTANumber&gt;        &lt;Password&gt;YourPassword&lt;/Password&gt;        &lt;Initials&gt;YourInitials&lt;/Initials&gt;        &lt;key&gt;YourKey&lt;/key&gt;        &lt;ConfirmCancel&gt;Y&lt;/ConfirmCancel&gt;        &lt;CancelRef&gt;YourCancelRef&lt;/CancelRef&gt;    &lt;/Request&gt;Cancel Booking Response - Step 2&lt;?xml version=\"1.0\"?&gt;&lt;API_Reply Result=\"OK\"&gt;    &lt;Booking&gt;        &lt;BookingRef&gt;YourBookingRef&lt;/BookingRef&gt;    &lt;/Booking&gt;    &lt;Cancel&gt;        &lt;CancelFee&gt;0.00&lt;/CancelFee&gt;        &lt;CancelRef&gt;06684&lt;/CancelRef&gt;        &lt;CancelInfo&gt;Please retrieve your client's copy of voucher as booking will be reinstated if used&lt;/CancelInfo&gt;        &lt;RefundAmount&gt;35.92&lt;/RefundAmount&gt;    &lt;/Cancel&gt;    &lt;API_Header&gt;        &lt;Request&gt;            &lt;ABTANumber&gt;YourABTANumber&lt;/ABTANumber&gt;            &lt;Password&gt;YourPassword&lt;/Password&gt;            &lt;key&gt;YourKey&lt;/key&gt;            &lt;ConfirmCancel&gt;Y&lt;/ConfirmCancel&gt;            &lt;CancelRef&gt;YourCancelRef&lt;/CancelRef&gt;            &lt;v&gt;1&lt;/v&gt;        &lt;/Request&gt;    &lt;/API_Header&gt;&lt;/API_Reply&gt;Cancelling bookings made with a credit or debit cardA small number of agents in Europe pass through payment details in our API (for historic reasons). The method for cancelling these products differs slightly in that an extra parameter is required to authenticate against the booking. The extra parameter is identified below.            Name      Data Type      Format      Mandatory?      Additional Information              CreditCardLast4      Integer      [0-9] 4 chars      Y      These are the last 4 digits on the card that the customer used to make payment.      The cancellation request must be POSTed against the following endpoint:https://payment.holidayextras.co.uk/legacy/",
        "url": "/hxapi/viewamendcancel/cancel/"
      }

      "hxapi-parking-av-carpark": {
        "title": "Availability At Car Park",
        "content": "Availability At Car ParkAPI Docs &gt; product:Parking &gt; endpoint:carpark &gt; Availability by CarparkCar Park Availability RequestMethodGETEndpointThe endpoint to use is:https://api.holidayextras.co.uk/v1/carpark/CarParkCodeFor example, for Purple Parking Park and Ride T2 at London Heathrow the endpoint is:https://api.holidayextras.co.uk/v1/carpark/LHH6To find the airport locations available for car parking, please refer to the locations endpoint.Request ParametersNB: All parameter names are case sensitive.            Name      Data Type      Format      Mandatory?      Additional Information                  ABTANumber      String      [A-Z0-9] 5 chars      Y      This is also known as an ‘agent code’. This will be confirmed to you by your Account Manager during set up.              Password      String      [A-Z0-9] 5 chars      Y*      Password required for retail agent requests - intermediaries do not require a password.This will be confirmed to you by your Account Manager during set up.              Initials      String      [A-Z] 3 chars      N      The initials of the Operator / Agent.              key      String      [A-Z]      Y      This will be assigned to you by your Account Manager during set up.              token      String      [0-9] 9 chars      Y      Please see user token endpoint for details of how to generate a token.              ArrivalDate      Date      YYYY-MM-DD      Y      Date customer drops vehicle at car park.              ArrivalTime      Time      HHMM      Y      Time customer drops vehicle at car park.              DepartDate      Date      YYYY-MM-DD      Y      Date customer picks up vehicle from car park.              DepartTime      Time      HHMM      Y      Time customer picks up vehicle from car park.              NumberOfPax      Integer      [0-9] 2 chars      N      Number of passengers.              OutFlight      String      [A-Z0-9] 9 chars      N      This is also known as an ‘flight number’. Used to establish which terminal the customer is flying from using our look up tool and return products specific to that terminal.              filter      String      [A-Z]      N      Pass in values filter=on_airport, filter=recommended or filter=meet_and_greet to only show car parks meeting those criteria. You can filter by any field that comes back in the filter section of the API.              fields      String      [A-Z] a csv list of product info fields      N      A list of product info fields can be passed in to return configurable product information e.g. fields=name,address,latitude,sellingpoint.              top3      Boolean      [0,1]      N      If a value of 1 is passed in for the top3 param, then a maximum of three car parks will be returned, one on airport, one park and ride, and one meet and greet.              System      String      [A-Z] 3 chars      Y*      For European products, you need to pass in the value of System=ABG (the default is System=ABC, which is UK products only).              lang      String      [A-Z] 2 chars      Y*      Required for requests for European products. (Values available are en, de, it, es, pt and nl.)      Car Park Availability ResponseThe car park availability response will return the specific product requested, so long as it has availability on the specific dates and durations. A summary of the request received can be found in the header field at the end of the response.For a detailed explanation of the fields returned, please see below:            Field      Additional Information                  CarPark/TotalPrice      The price of product without any surcharges/fees added.              CarPark/NonDiscPrice      The non discounted price. Some agent codes apply a discount so we return this field to enable a comparison.              CarPark/RequestFlags      NB: For European products, please see the separate table below. These flags list which details the car park operator requires from the customer. If a flag is returned with a ‘Y’ your application should send the corresponding field/value in the booking request.Flags are only returned when required. The flags which can be returned are: Registration, CarMake, CarModel, CarColour, OutFlight, ReturnFlight, OutTerminal, ReturnTerminal, Destination, MobileNum.              CarPark/Filter      The car park filters are returned, but as you are searching for a single product in this request these can be ignored.              CarPark/BookingURL      The URL to POST the booking request to for this particular product.              CarPark/MoreInfoURL      The link to more information about this product, sourced from the Product Library.              Pricing/CreditCardSurcharge      NB: This is only relevant for Intermediary Agents in Europe, where Holiday Extras is responsible for processing the payment, not the Agent. The first step in the calculation is to determine the credit card surcharge payable (x), based on the value of the booking, using this formula: x = (TotalPrice + the CanxWaiver) / 100 x CCardSurchargePercent Second, to prevent the surcharge from exceeding certain boundaries we have min and max thresholds, which can be calculated as follows: if x &lt; CCardSurchargeMin; x = CCardSurchargeMin else if x &gt; CCardSurchargeMax; x = CCardSurchargeMax              Pricing/CancellationWaiver      We provide an optional cancellation waiver. If this is not added then cancellation will incur a fee. The fee is outlined in our terms and conditions. NB: This value is not currently returned via the XML.              API_Header/Request      The API returns every parameter and value you sent in the previous request.      European products onlyFor European products only, the availability response will return a field called &lt;CarDetFlags&gt;, which identifies the fields required when making a booking. (This is instead of the &lt;RequestFlags&gt; field which is returned for UK products only).For example: &lt;CarDetFlags&gt; NNNNNNNNNNNNNNNNNN &lt;/CarDetFlags&gt;The order of the flags is always the same, and refers to these parameters respectively:            Position      Parameter      Data Type      Format      Additional Information                  1      Registration      String      [A-Z0-9] 10 chars      Vehicle registration number  NB: This field is not validated through the API.              2      CarMake      String      [A-Z0-9] 10 chars      Make of vehicle, e.g. Audi.              3      CarModel      String      [A-Z0-9] 10 chars      Model of vehicle, e.g. A6.              4      CarColour      String      [A-Z0-9] 10 chars      Colour of vehicle, e.g. White.              5      NumberOfPax      Integer      [0-9]      Number of passengers in the vehicle.              6      CarDropoffTime      Time      HHMM      Arrival time when you drop the vehicle off at the car park e.g 1000.              7      CarPickupTime      Time      HHMM      Return time, when you pick the vehicle up from the car park, e.g. 1600.              8      OutTerminal      String      [A-Z0-9] 2 chars      Single letter or number representation of the terminal e.g N or S or 4              9      OutFltNo      String      [A-Z0-9] 10 chars      Outbound flight number e.g. EZY123.              10      InFltNo      String      [A-Z0-9] 10 chars      Return flight number e.g. EZY124.              11      OutFltTime      Time      HHMM      Departure time of the outbound flight e.g. 1200.              12      InFltTime      Time      HHMM      Arrival time of the inbound flight e.g. 1500.              13      MobileNum      String      [A-Z0-9] 15 chars      Customer’s mobile number.              14      ShipName      String      [A-Z0-9] 20 chars      Name of the ship, e.g. AIDA              15      PierName      String      [A-Z0-9] 20 chars      Name of the pier or port where the ship is departing from              16      ChildSeat      String      Y/N      Is a child car seat needed?              17      AddlServices      String      [A-Z0-9] 50 chars      In this parameter you may add additional remarks regarding the booking.              18      RetTerminal      String      [A-Z0-9] 2 chars      Single letter or number representation of the terminal e.g N or S or 4      Worked ExamplesBelow are worked examples of both the request and response for availability at an airport.UK Products Availability Requesthttps://api.holidayextras.co.uk/carpark/LHH6?ABTANumber=YourABTANumber&amp;Password=YourPassword&amp;Initials=YourInitials&amp;key=YourKey&amp;token=YourToken&amp;ArrivalDate=2017-12-01&amp;ArrivalTime=1200&amp;DepartDate=2017-12-08&amp;DepartTime=1200&amp;NumberOfPax=1UK Products Availability Response&lt;?xml version=\"1.0\"?&gt;&lt;API_Reply Product=\"CarPark\" RequestCode=\"3\" Result=\"OK\"&gt;    &lt;CarPark&gt;        &lt;Name&gt;Purple Parking Park and Ride T2&lt;/Name&gt;        &lt;Code&gt;LHH6&lt;/Code&gt;        &lt;BookingURL&gt;/carpark/HPLHH6&lt;/BookingURL&gt;        &lt;MoreInfoURL&gt;/product/LHH6&lt;/MoreInfoURL&gt;        &lt;RequestFlags&gt;            &lt;CarColour&gt;1&lt;/CarColour&gt;            &lt;CarMake&gt;1&lt;/CarMake&gt;            &lt;CarModel&gt;1&lt;/CarModel&gt;            &lt;Destination&gt;1&lt;/Destination&gt;            &lt;MobileNum&gt;1&lt;/MobileNum&gt;            &lt;OutFlight&gt;1&lt;/OutFlight&gt;            &lt;OutTerminal&gt;1&lt;/OutTerminal&gt;            &lt;Registration&gt;1&lt;/Registration&gt;            &lt;ReturnFlight&gt;1&lt;/ReturnFlight&gt;            &lt;ReturnTerminal&gt;1&lt;/ReturnTerminal&gt;        &lt;/RequestFlags&gt;        &lt;TotalPrice&gt;85.95&lt;/TotalPrice&gt;        &lt;GatePrice&gt;89.99&lt;/GatePrice&gt;        &lt;Filter&gt;            &lt;terminal&gt;2&lt;/terminal&gt;            &lt;meet_and_greet&gt;0&lt;/meet_and_greet&gt;            &lt;park_and_ride&gt;1&lt;/park_and_ride&gt;            &lt;car_parked_for_you&gt;1&lt;/car_parked_for_you&gt;        &lt;/Filter&gt;    &lt;/CarPark&gt;    &lt;Pricing&gt;        &lt;CCardSurchargePercent&gt;2.20&lt;/CCardSurchargePercent&gt;        &lt;TotalPrice&gt;85.95&lt;/TotalPrice&gt;        &lt;CCardSurchargeAmount&gt;0.00&lt;/CCardSurchargeAmount&gt;        &lt;CancellationWaiver&gt;            &lt;Waiver&gt;1.99&lt;/Waiver&gt;        &lt;/CancellationWaiver&gt;    &lt;/Pricing&gt;    &lt;SepaID/&gt;    &lt;API_Header&gt;        &lt;Request&gt;            &lt;ABTANumber&gt;YourABTANumber&lt;/ABTANumber&gt;            &lt;Password&gt;YourPassword&lt;/Password&gt;            &lt;Initials&gt;YourInitials&lt;/Initials&gt;            &lt;key&gt;YourKey&lt;/key&gt;            &lt;token&gt;YourToken&lt;/token&gt;            &lt;ArrivalDate&gt;2017-12-01&lt;/ArrivalDate&gt;            &lt;ArrivalTime&gt;1200&lt;/ArrivalTime&gt;            &lt;DepartDate&gt;2017-12-08&lt;/DepartDate&gt;            &lt;DepartTime&gt;1200&lt;/DepartTime&gt;            &lt;NumberOfPax&gt;1&lt;/NumberOfPax&gt;        &lt;/Request&gt;    &lt;/API_Header&gt;&lt;/API_Reply&gt;European Products Availability Requesthttps://api.holidayextras.co.uk/carpark/MU01?ABTANumber=YourABTANumber&amp;Password=YourPassword&amp;Initials=YourInitials&amp;key=YourKey&amp;token=YourToken&amp;ArrivalDate=2017-12-01&amp;ArrivalTime=1200&amp;DepartDate=2017-12-08&amp;DepartTime=1200&amp;NumberOfPax=1&amp;System=ABGEuropean Products Availability Response&lt;?xml version=\"1.0\"?&gt;&lt;API_Reply Product=\"CarPark\" RequestCode=\"3\" Result=\"OK\"&gt;    &lt;CarPark&gt;        &lt;Name&gt;Parkservice Sky München&lt;/Name&gt;        &lt;Code&gt;MU01&lt;/Code&gt;        &lt;BookingURL&gt;/carpark/FRMU01&lt;/BookingURL&gt;        &lt;MoreInfoURL&gt;/product/MU01&lt;/MoreInfoURL&gt;        &lt;RequestFlags/&gt;        &lt;TotalPrice&gt;35.00&lt;/TotalPrice&gt;        &lt;GatePrice&gt;0.00&lt;/GatePrice&gt;        &lt;CancellationRule&gt;0&lt;/CancellationRule&gt;        &lt;CarDetFlags&gt;NNNNNNNNYYNYNNNNNN&lt;/CarDetFlags&gt;        &lt;CarDetails&gt;Y&lt;/CarDetails&gt;        &lt;DiscDates/&gt;        &lt;QRCodeProduct&gt;N&lt;/QRCodeProduct&gt;        &lt;Filter&gt;            &lt;car_parked_for_you&gt;1&lt;/car_parked_for_you&gt;            &lt;meet_and_greet&gt;0&lt;/meet_and_greet&gt;            &lt;on_airport/&gt;            &lt;recommended/&gt;            &lt;special_offer_text&gt;1&lt;/special_offer_text&gt;            &lt;valet_included&gt;0&lt;/valet_included&gt;        &lt;/Filter&gt;    &lt;/CarPark&gt;    &lt;Pricing&gt;        &lt;CCardSurchargePercent&gt;0.00&lt;/CCardSurchargePercent&gt;        &lt;TotalPrice&gt;35.00&lt;/TotalPrice&gt;        &lt;CCardSurchargeAmount&gt;0.00&lt;/CCardSurchargeAmount&gt;    &lt;/Pricing&gt;    &lt;SepaID&gt;DE11ZZZ00000633860&lt;/SepaID&gt;    &lt;API_Header&gt;        &lt;Request&gt;            &lt;ABTANumber&gt;YourABTANumber&lt;/ABTANumber&gt;            &lt;Password&gt;YourPassword&lt;/Password&gt;            &lt;Initials&gt;YourInitials&lt;/Initials&gt;            &lt;key&gt;YourKey&lt;/key&gt;            &lt;token&gt;YourToken&lt;/token&gt;            &lt;ArrivalDate&gt;2017-12-01&lt;/ArrivalDate&gt;            &lt;ArrivalTime&gt;1200&lt;/ArrivalTime&gt;            &lt;DepartDate&gt;2017-12-08&lt;/DepartDate&gt;            &lt;DepartTime&gt;1200&lt;/DepartTime&gt;            &lt;NumberOfPax&gt;1&lt;/NumberOfPax&gt;            &lt;System&gt;ABG&lt;/System&gt;            &lt;lang&gt;de&lt;/lang&gt;        &lt;/Request&gt;    &lt;/API_Header&gt;&lt;/API_Reply&gt;",
        "url": "/hxapi/parking/av/carpark/"
      }

      "hxapi-insurance-countries": {
        "title": "Insurance countries",
        "content": "Insurance countriesAPI Docs &gt; product:InsuranceInsurance Countries RequestThis endpoint will respond with a list of valid regions and / or countries.MethodGETEndpointTo request the list of region codes, the endpoint to use is:https://api.holidayextras.co.uk/v1/insurancecountriesTo request the list of countries within a given region code, the endpoint to use is:https://api.holidayextras.co.uk/v1/insurancecountries/RegionCodeFor example, to request all the countries within Europe Low, the endpoint is:https://api.holidayextras.co.uk/v1/insurancecountries/EUROPELOWList of available regions:For ease of reference, the current regions available are:            Code      Region      Covered Countries                  UKROI      UK &amp; Ireland      UK, Republic of Ireland and Channel Islands              EUROPELOW      Europe Low-risk      All countries in Europe excluding Spain, Cyprus, Malta, Turkey and Greece              EUROPEHIGH      Europe High-risk      All countries in Europe including Spain, Cyprus, Malta, Turkey and Greece              AUSNZ      Australia &amp; New Zealand      Australia, New Zealand, Cook Islands, Niue and Tokelau              WWXUSA      Worldwide: all countries excluding USA      Full list of 156 countries worldwide, excluding USA, Canada and their territories              WWIUSA      Worldwide: all countries including USA      Full list of 156 countries worldwide, including USA, Canada and their territories      Request Parameters            Name      Data Type      Format      Mandatory?      Additional Information                  ABTANumber      String      [A-Z0-9] 5 chars      Y      This is also known as an ‘agent code’. This will be confirmed to you by your Account Manager during set up.              Password      String      [A-Z0-9] 5 chars      Y      Password required for retail agent requests - intermediaries do not require a password.This will be confirmed to you by your Account Manager during set up.              key      String      [A-Z]      Y      This will be assigned to you by your Account Manager during set up.              token      String      [0-9] 9 chars      Y      Please see user token endpoint for details of how to generate a token.      Insurance Countries Response            Field      Additional Information                  Meta      A count of the countries, states or territories included within this region.              Record      The name of the country, state or territory.              API_Header/Request      The API returns every parameter and value you sent in the previous request.      Worked ExamplesBelow are worked examples of both the request and response for insurance countries.Insurance Countries Requesthttps://api.holidayextras.co.uk/v1/insurancecountries/WWXUSA?&amp;ABTANumber=YourABTANumber&amp;Password=YourPassword&amp;key=YourKey&amp;token=YourTokenInsurance Countries ResponseNB: This is a shortened example compiled from a full insurance countries response.&lt;?xml version=\"1.0\" ?&gt;&lt;API_Reply&gt;    &lt;RecordSet&gt;        &lt;Meta&gt;            &lt;Total&gt;156&lt;/Total&gt;        &lt;/Meta&gt;        &lt;Record&gt;            &lt;country&gt;Abu Dhabi&lt;/country&gt;        &lt;/Record&gt;        &lt;Record&gt;            &lt;country&gt;Afghanistan&lt;/country&gt;        &lt;/Record&gt;        &lt;Record&gt;            &lt;country&gt;Algeria&lt;/country&gt;        &lt;/Record&gt;        &lt;Record&gt;            &lt;country&gt;American Samoa&lt;/country&gt;        &lt;/Record&gt;        &lt;Record&gt;            &lt;country&gt;Angola&lt;/country&gt;        &lt;/Record&gt;        &lt;Record&gt;            &lt;country&gt;Antarctic&lt;/country&gt;        &lt;/Record&gt;        &lt;API_Header&gt;               &lt;Request&gt;                   &lt;ABTANumber&gt;YourABTANumber&lt;/ABTANumber&gt;                   &lt;Password&gt;YourPassword&lt;/Password&gt;                   &lt;key&gt;YourKey&lt;/key&gt;                   &lt;token&gt;YourToken&lt;/token&gt;                   &lt;v&gt;1&lt;/v&gt;               &lt;/Request&gt;           &lt;/API_Header&gt;       &lt;/API_Reply&gt;",
        "url": "/hxapi/insurance/countries/"
      }
      ,
    
      "hxapi-insurance-createpolicy": {
        "title": "Insurance Create Policy",
        "content": "Insurance Create PolicyAPI Docs &gt; product:InsuranceCreate Insurance Policy RequestThis endpoint will create a new insurance policy.Please note: we do not have a test environment for insurance, so you will be unable to use /sandbox/. To make test policies you will need to follow these rules:  Make the policy more than 3 months from the search date;  Do not have more than 3 test policies live at any one point;  Please advise your Account Manager so the test policies can be cancelled down in our system.Failing to notify us of test policies being made will result in your account being charged for these.MethodPOSTEndpointTo create an insurance policy, the endpoint to use is (where CertificateRef is returned in the options response):https://api.holidayextras.co.uk/v1/insurancepolicy/CertificateRefRequest ParametersNB: All parameter names are case sensitive.            Name      Data Type      Format      Mandatory?      Additional Information              ABTANumber      String      [A-Z0-9] 5 chars      Y      This is also known as an ‘agent code’. This will be confirmed to you by your Account Manager during set up.              Password      String      [A-Z0-9] 5 chars      Y      Password required for retail agent requests - intermediaries do not require a password.This will be confirmed to you by your Account Manager during set up.              key      String      [A-Z]      Y      This will be assigned to you by your Account Manager during set up.              token      String      [0-9] 9 chars      Y      Please see user token endpoint for details of how to generate a token.              Address[]      String      [0-9] 20 chars      Y      First line of address (house name / number and road) of customer. If you require more than 1 address line, then you can replicate this field and increment the number in square brackets, i.e. “Address[1]” for address line 2, and so on.              Town      String      [0-9] 4 chars      Y      Town of address.              County      String      [0-9] 4 chars      Y      County of address.              PostCode      String      [0-9] 4 chars      Y      Post code of address.              Email      String      [0-9] 4 chars      Y      Customer’s email.              DayPhone      Integer      [0-9] 15 chars max      N      The customer’s telephone number.              option      Array      [A-Z0-9]      N      Per policy options require schemeoptionID, optionRateID, optionPrice and optionIPT. Per person options also require the CertificateClientID of the person they are for. Per person options can be submitted multiple times with different CertificateClientIDs. This should be sent as a multidimensional array/hash. See the worked examples below for more information.      Create Insurance Policy ResponseThe create insurance policy response will return details of the insurance policy booked, and any options.For a detailed explanation of the fields returned, please see below:            Field      Additional Information                  familyGroupID      TBC              familyGroupName      TBC              keyFactsDocName      TBC              policyWordingDocName      TBC              SourceSystem      TBC              ResidenceID      TBC              CostofHoliday      TBC              QuoteExpired      TBC              FriendlyName      TBC              cover      There are three elements to this: cancellation, medical and possessions. Each block will return details on the limits and excesses for each type of cover.              Scheme      This block provides a summary of the scheme details, including links to the policy wording and key facts. It also returns the PolicyNumber, which is required in all communication with us post booking, including where the customer needs to make a claim.              PolicyOptions      TBC              ClientDetails      This block returns the address and contact details for the customer.              Itinerary      This block shows a summary of the date and destinations covered by the policy.              Pricing      This block provides a breakdown of the pricing elements, including gross, net and IPT.              People      This block returns details of the individuals under the policy’s cover (as provided in previous requests).              API_Header      The API returns every parameter and value you sent in the previous request.      PaymentIn the UK, we are PCI DSS compliant and so we do not accept customers’ payment details being passed to us via the API. Further details can be found in our section on Payment.Please contact your Account Manager if you have any questions concerning payment.Policy Wording and Key FactsIt is mandatory that the customer has access to the both the Policy Wording and the Key Facts document, as insurance is a financial product and subject to additional regulations around its point of sale. Both of these documents are available in the insurance schemes availability response and create insurance policy response (pre- and post-booking).Worked ExamplesBelow are worked examples of both the request and response for creating an insurance policy.Create Insurance Policy Requesthttps://api.holidayextras.co.uk/v1/insurancepolicy/YourCertificateRef    &lt;Request&gt;      &lt;ABTANumber&gt;YourABTANumber&lt;/ABTANumber&gt;      &lt;Password&gt;YourPassword&lt;/Password&gt;      &lt;key&gt;YourKey&lt;/key&gt;      &lt;token&gt;YourToken&lt;/token&gt;      &lt;title[]&gt;Mr&lt;/title[]&gt;      &lt;firstName[]&gt;Test&lt;/firstName&gt;      &lt;lastName[]&gt;Test&lt;/lastName&gt;      &lt;destinationID&gt;13&lt;/destinationID&gt;      &lt;schemePrice&gt;9.13&lt;/schemePrice&gt;      &lt;Address[]&gt;1 Test Street&lt;/Address[]&gt;      &lt;Town&gt;Testville&lt;/Town&gt;      &lt;County&gt;Testshire&lt;/County&gt;      &lt;PostCode&gt;TE1 STZ&lt;/PostCode&gt;      &lt;DayPhone&gt;01234567890&lt;/DayPhone&gt;      &lt;Email&gt;test@test.com&lt;/Email&gt;      &lt;option&gt;61389&lt;/option&gt;    &lt;/Request&gt;Create Insurance Policy Response&lt;?xml version=\"1.0\" ?&gt;&lt;API_Reply&gt;    &lt;familyGroupID&gt;1&lt;/familyGroupID&gt;    &lt;familyGroupName&gt;Individual&lt;/familyGroupName&gt;    &lt;keyFactsDocName&gt;&lt;/keyFactsDocName&gt;    &lt;policyWordingDocName&gt;HXMainAgent0317(HX001).pdf&lt;/policyWordingDocName&gt;    &lt;SourceSystem&gt;1&lt;/SourceSystem&gt;    &lt;ResidenceID&gt;1&lt;/ResidenceID&gt;    &lt;CostOfHoliday&gt;0&lt;/CostOfHoliday&gt;    &lt;QuoteExpired&gt;false&lt;/QuoteExpired&gt;    &lt;FriendlyName&gt;&lt;/FriendlyName&gt;    &lt;cover&gt;        &lt;cancellation&gt;            &lt;sectionid&gt;1&lt;/sectionid&gt;            &lt;section&gt;Cancellation Cover&lt;/section&gt;            &lt;sectionNumber&gt;B&lt;/sectionNumber&gt;            &lt;limit&gt;500&lt;/limit&gt;            &lt;excess&gt;75&lt;/excess&gt;        &lt;/cancellation&gt;        &lt;medical&gt;            &lt;sectionid&gt;7&lt;/sectionid&gt;            &lt;section&gt;Medical Emergency Expenses&lt;/section&gt;            &lt;sectionNumber&gt;D&lt;/sectionNumber&gt;            &lt;limit&gt;5000000&lt;/limit&gt;            &lt;excess&gt;100&lt;/excess&gt;        &lt;/medical&gt;        &lt;possessions&gt;            &lt;sectionid&gt;5&lt;/sectionid&gt;            &lt;section&gt;Personal possessions&lt;/section&gt;            &lt;sectionNumber&gt;G1&lt;/sectionNumber&gt;            &lt;limit&gt;500&lt;/limit&gt;            &lt;excess&gt;75&lt;/excess&gt;        &lt;/possessions&gt;    &lt;/cover&gt;    &lt;Scheme&gt;        &lt;schemeID&gt;8673&lt;/schemeID&gt;        &lt;schemeName&gt;OTA Bronze A2B&lt;/schemeName&gt;        &lt;purchaseDate&gt;2017-09-01&lt;/purchaseDate&gt;        &lt;policyWording&gt;http://secure.holidayextras.co.uk/images/groups/insurancemagenta/policy_wording/HXMainAgent0317(HX001).pdf&lt;/policyWording&gt;        &lt;PolicyNumber&gt;ITEST100067&lt;/PolicyNumber&gt;        &lt;Annual&gt;N&lt;/Annual&gt;        &lt;keyFacts&gt;http://secure.holidayextras.co.uk/images/groups/insurancemagenta/policy_wording/&lt;/keyFacts&gt;    &lt;/Scheme&gt;    &lt;PolicyOptions&gt;&lt;/PolicyOptions&gt;    &lt;ClientDetails&gt;        &lt;address&gt;            &lt;address1&gt;Test&lt;/address1&gt;            &lt;address2&gt;&lt;/address2&gt;            &lt;address3&gt;&lt;/address3&gt;            &lt;address4&gt;Test&lt;/address4&gt;            &lt;address5&gt;Test&lt;/address5&gt;            &lt;postcode&gt;CT214JF&lt;/postcode&gt;        &lt;/address&gt;        &lt;email&gt;caroline.woodhams@holidayextras.com&lt;/email&gt;        &lt;dayPhone&gt;01234567890&lt;/dayPhone&gt;    &lt;/ClientDetails&gt;    &lt;Itinerary&gt;        &lt;startDate&gt;2017-12-01&lt;/startDate&gt;        &lt;endDate&gt;2017-12-08&lt;/endDate&gt;        &lt;destinationName&gt;Europe (exc Spain, Cyprus, Malta, Turkey and Greece)&lt;/destinationName&gt;    &lt;/Itinerary&gt;    &lt;Pricing&gt;        &lt;grossAmount&gt;9.13&lt;/grossAmount&gt;        &lt;netAmount&gt;6.01&lt;/netAmount&gt;        &lt;overallAmount&gt;9.13&lt;/overallAmount&gt;        &lt;premiumIPTAmount&gt;1.52&lt;/premiumIPTAmount&gt;        &lt;medicalAmount&gt;0&lt;/medicalAmount&gt;        &lt;optionsIPT&gt;0&lt;/optionsIPT&gt;        &lt;optionsNett&gt;0&lt;/optionsNett&gt;        &lt;optionsAmount&gt;0&lt;/optionsAmount&gt;        &lt;overallNett&gt;6.01&lt;/overallNett&gt;        &lt;overallIPTAmount&gt;1.52&lt;/overallIPTAmount&gt;        &lt;premiumComm&gt;1.6&lt;/premiumComm&gt;        &lt;optionsComm&gt;0&lt;/optionsComm&gt;        &lt;overallComm&gt;1.6&lt;/overallComm&gt;        &lt;overallNet&gt;7.61&lt;/overallNet&gt;    &lt;/Pricing&gt;    &lt;People&gt;        &lt;PersonDetails&gt;            &lt;ClientID&gt;22893377&lt;/ClientID&gt;            &lt;title&gt;Mr&lt;/title&gt;            &lt;firstName&gt;Test&lt;/firstName&gt;            &lt;lastName&gt;Test&lt;/lastName&gt;            &lt;birthDate&gt;1970-01-01&lt;/bi       "faq": {
        "title": "FAQ",
        "content": "FAQWhat is the development server address?https://api.holidayextras.co.uk/sandbox/Whenever writing new code or altering existing functionality, you must use the development server (sandbox). The data returned is not ‘as live’, but the format and structure are the same. If you do not, you will affect metrics such as conversion rates, and any bookings made will be live.What is the live server address?https://api.holidayextras.co.uk/What about caching?We anticipate that many application developers will want to cache the results to certain searches. For example, there is no need to request locations every time. Much better to store these locally and create a routine that calls the API at regular intervals to get the latest list.We suggest that you do not cache availability requests though. Prices can change without notice and allocation can run out.H00x product codesThese are sometimes returned at the end of car parking requests. They represent hotels with parking to be offered as an upsell to customers taking early morning flights. You should ignore these or contact sales@holidayextras.com, tell us your agent code and we will disable them.Test Credit CardsIn order to make card bookings through our development server (sandbox) one of the following test cards must be used to process the transaction, with the correct CV2 and expiry date as shown below:Visa Credit Card - 4715059999000437CV2 - 222Expiry - 05/17Visa Debit Card - 4508750015741019CV2 - 222Expiry - 05/17Amex - 345678000000007CV2 - 2222Expiry - 05/17Credit card surchargesAgents should ignore the credit card surcharge elements. Any processing or handling fees charged on your customers’ bookings are under your control.Intermediaries must calculate the credit card surcharge using the logic below.x = ((TotalPrice + CanxWaiver) / 100 ) * CCardSurchargePercentif( x &lt; CCardSurchargeMin)  x = CCardSurchargeMinelse if x &gt; CCardSurchargeMax  x = CCardSurchargeMaxThe prices returned, are they net or with markup already added?Markup already added.How is the “Total Price” for Parking calculated?The cost of the Credit Card surcharge applies to the price of parking + cancellation waiver (if taken).So in the reply for a booking request you may see something like this:&lt;AmountPaid&gt;43.56&lt;/AmountPaid&gt;&lt;TotalPrice&gt;42.06&lt;/TotalPrice&gt;&lt;CCSurchargeAmount&gt;1.50&lt;/CCSurchargeAmount&gt;&lt;CanxWaiver&gt;0.50&lt;/CanxWaiver&gt;You may expect &lt;AmountPaid&gt; to total £44.06 (because 42.06 + 1.50 + 0.50 = 44.06). This is not an error, the &lt;CanxWaiver&gt; amount has already been added to the parking price of £41.56 to create &lt;TotalPrice&gt;, and the credit card surcharge is then applied to that value, giving &lt;AmountPaid&gt;.Does Holiday Extras need my IP address?No. We use a blacklist for unwelcome traffic, otherwise anyone can make requests to HXAPI as long as they use a valid key.How do I cancel a test booking?You only need to cancel bookings made to the live server. You do not need to cancel bookings made on the development server, no payment is actually taken.Please do not cancel bookings by ringing our call centre or using the online cancellation interface at www.holidayextras.com. Credit card charges will not be refunded to your card if you use either of these methods. Send the booking references to sales@holidayextras.com and all charges will be refunded.FAQ Germany/European product specific (System=ABG)Currency - Right now and for the near future there’s only EUR and GBP. All European products, accessed through System=ABG are returned in EUR and all UK products in GBP.Number of Pax - is actually required, as the car parks need to plan their shuttle capacities.Cancellation Process - Car parks can be cancelled free of charge until 24h before the beginning of the arrival day (basically two days before arrival). If cancelled between 24h before arrival day and arrival day, the charge is 50%. Later than that bookings can only be cancelled by our service team. Customers need to be aware of our terms and conditions, so it would be needed to show the link to our terms and conditions them during booking process (please see section booking parking, booking hotel). Easiest solution for after booking would be to offer the customer a form or/and phone number for cancellations or ammendmends. We do have our own inhouse call center, which handles requests quickly.QR code - is not needed for Germany/European products.shuttle time = 24 hours calculation? - No, they are on a daily basis, but we need the shuttle times for a better planning on the parking space regarding shuttle.Availability test/live system - The status of the data in the test system is December 2015Car park details - We are asked to collect them in the name of the parking provider. They need them to organize their services.Error messages - we can provide you a list of error messages. It is planned to provide them in different languages.Booking number/ABTA number - the combination of both is always unique",
        "url": "/faq/"
      }
      ,
    
      "hxapi-flightupdate": {
        "title": "Flight update",
        "content": "Flight updateThis allows partners to update the flight time on existing bookings.Booking flight update requestThis request is used when one or more bookings need to be updated with a new flight time.MethodPOSTEndpointThe endpoint to use is:https://api.holidayextras.co.uk/v1/flightUpdateRequest Parameters            Name      Data Type      Format      Mandatory?      Additional Information                  ABTANumber      String      [A-Z0-9] 5 chars      Y      This is also known as an ‘agent code’. This will be confirmed to you by your Account Manager during set up.              Password      String      [A-Z0-9] 5 chars      Y*      Password required for retail agent requests - intermediaries do not require a password. This will be confirmed to you by your Account Manager during set up.              key      String      [A-Z]      Y      This will be assigned to you by your Account Manager during set up.              token      String      [0-9] 9 chars      Y      Please see user token endpoint for details of how to generate a token.              notification_url      String      URL      N      Details of updates sent back to partner      NB: All parameter names are case sensitive.Notification URLIf a notification_url is provided, the endpoint will return immediately, and asynchronously send the status for the requested booking once they have been actioned.If a notification_url is not provided, the endpoint will process the request data synchronously and return the result of the process in the response.Request Body Object PropertiesThe body should be a well formatted JSON array, containing items which are objects with the following properties.            Name      Data Type      Format      Mandatory?      Additional Information                  hx_booking_ref      String      [A-Z0-9] 5-12 chars      Y      HX full booking reference.              partner_booking_ref      String      [A-Z]      Y      The unique reference for the partner’s booking.              email      String      [A-Z0-9] 50 chars      Y      The email address registered with the booking.              arrival      String      ISO 8601      Y      New or current parking arrival date and time.              depart      String      ISO 8601      Y      New or current parking departure date and time.              price      integer             Y      Booking amount in pence      NB: All property names are case sensitive.Request Body ExampleThe above below shows two booking being sent, which each booking object as an element of the array:[  {    \"hx_booking_ref\": \"HX123\",    \"partner_booking_ref\": \"AB123\",    \"email\": \"customer1@hx.com\",    \"arrival\": \"2017-03-04T12:12:12Z\",    \"depart\": \"2017-03-04T12:12:12Z\",    \"price\": 1234  },  {    \"hx_booking_ref\": \"HX124\",    \"partner_booking_ref\": \"AB124\",    \"email\": \"customer2@hx.com\",    \"arrival\": \"2017-03-04T12:12:12+0100\",    \"depart\": \"2017-03-04T12:12:12+0100\",    \"price\": 1234  }]Partner NotificationOnce the bookings contained in a request have been processed the status will be POST’ed back to the partner using the given notification_url.The body of this POST request will contain well formed JSON in the following format:[  {    \"partner_booking_ref\": \"AB123\",    \"status\": \"OK\",    \"message\": \"Success\"  },  {    \"partner_booking_ref\": \"AB124\",    \"status\": \"ERR\",    \"message\": \"booking not found\"  }]The example above shows two bookings that have been processed, the first update has succeeded, but the second has failed.",
        "url": "/hxapi/flightUpdate/"
      }

      "hxapi-fasttrack-av": {
        "title": "Availability At FastTrack",
        "content": "# Availability At FastTrack## FastTrack Availability Request### MethodGET### EndpointThe endpoint to use is:```https://api.holidayextras.co.uk/v1/fasttrack/AirportCode```For example, for fasttrack availability at Manchester the endpoint is:```https://api.holidayextras.co.uk/v1/fasttrack/MAN```To find the airport locations available for fasttrack, please refer to the [locations endpoint.](/hxapi/locations)### Request ParametersNB: All parameter names are case sensitive.| Name        | Data Type    | Format      | Mandatory? | Additional Information || ----        | ---------    | ------      | -----------| ---------------------- || ABTANumber  | String       | [A-Z0-9] 5 chars | Y     | This is also known as an 'agent code'. This will be confirmed to you by your Account Manager during set up. || Password    | String  | [A-Z0-9] 5 chars | Y*       | Password required for retail agent requests - intermediaries do not require a password.This will be confirmed to you by your Account Manager during set up. || Initials    | String  | [A-Z] 3 chars  | N        | The initials of the Operator / Agent. || key         | String  | [A-Z]                                  | Y        | This will be assigned to you by your Account Manager during set up.|| token       | String  | [0-9] 9 chars                         | Y        | Please see [user token endpoint](/hxapi/usertoken) for details of how to generate a token. || ArrivalDate | Date    | YYYY-MM-DD  | Y        | Date customer enters the fasttrack. || ArrivalTime | Time    | HHMM       | Y        | Time customer enters the fasttrack. || Adults      | Integer | [0-4] 1 char | Y        | Number of adults requiring entry to the fasttrack. || Children    | Integer | [0-3] 1 char | N        | Number of children requiring entry to the fasttrack. || OutFlight   | String  | [A-Z0-9] 9 chars | N | This is also known as an 'flight number'. Used to establish which terminal the customer is flying from using our look up tool and return products specific to that terminal. |## FastTrack Availability ResponseThe fasttrack availability response will return the specific product requested, so long as it has availability on the specific dates and times. A summary of the request received can be found in the header field at the end of the response.For a detailed explanation of the fields returned, please see below: | Field                | Additional Information | | ----                 | ---------------------- | | FastTrack/Price   | The price of product _without_ any surcharges/fees added. | | FastTrack/NonDiscPrice | The non discounted price. Some agent codes apply a discount so we return this field to enable a comparison.| | FastTrack/Name | The name of the fasttrack. | | FastTrack/Code | The product code for the fasttrack, which must be used in the booking request. | | FastTrack/BookingURL   | The URL to POST the booking request to for this particular product. | | FastTrack/MoreInfoURL  | The link to more information about this product, sourced from the Product Library.|## Worked ExamplesBelow are worked examples of both the request and response for availability at an airport.### UK Products Availability Request```https://api.holidayextras.co.uk/v1/fasttrack/MAN/?ABTANumber=YourABTANumber&Password=YourPassword&Initials=YourInitials&key=YourKey&token=YourToken&ArrivalDate=2019-10-22&ArrivalTime=1200&Adults=2&Children=0```### UK Products Availability Response ```xml      FastTrack Terminal 1    APMANSF1    /v1/fastTrack/APMANSF1    /v1/product/MANSF1    10.00    GBP          //d1xcii4rs5n6co.cloudfront.net/libraryimages/85558-manchester-airport-security-fasttrack-T1.png                                                          Short on time? Take the fast track through security and you’ll fly through.    //d1xcii4rs5n6co.cloudfront.net/libraryimages/81386-MAN-fasttrack-core.png          What is it?            The Security FastTrack pass gives you access to the priority lane at the airport’s security checks. You’ll whizz past the standard queue, giving you more time to relax in departures before your flight.            Once you book we’ll email you the passes, so make sure you print them and take them with you, or have them ready on your mobile phone. There’ll be a voucher each with a barcode, which you’ll need to scan at the entrance before you go through.           When can I use it?     Available 2.30am - 11pm.            Is it the same price for children?     Yes, the pass is £5 per person.          The small print:     You won't need this service if you have mobility issues or small children with pushchairs as there's already a dedicated lane.          Jet 2 passengers who have purchased FastTrack tickets must use the security lanes located on Departure level 5, in Terminal 1.           Security FastTrack tickets can only be used once for the date you have booked.                If you have booked more than one ticket the vouchers will all be in the lead passenger’s name.               All FastTrack's terms and conditions will apply to you, so please read them here.                      0        0        0        0        1000                    0        0        0        0        1000                    MAN      Manchester      airport              1        1                    2        2                    3        3              1    //d1xcii4rs5n6co.cloudfront.net/libraryimages/fasttrack.jpg          With this special, VIP pass through security, you could be the first through the gate. We'll give you one voucher for all passengers, so make sure you hold the square, patterned barcode on your own voucher under the special camera at the entrance before you go through. You’ll then need to do the same with your boarding pass.  You can only use the Fast Track once, on the day you’ve booked. Even though Fast Track customers get their own lane through security, all the normal airport security rules will still apply. Since the airport already has its own special lanes for customers with mobility issues or those with small children, they won't need to use this service.       Jet 2 customers who have purchased Fast Track tickets must use the security lanes located on Departure level 5 in Terminal 1.         Please ensure you have read the Airport's Terms and Conditions.        Manchester    1    10.00    1        FastTrack Terminal 2    APMANSF2    /v1/fastTrack/APMANSF2    /v1/product/MANSF2    10.00    GBP          //d1xcii4rs5n6co.cloudfront.net/libraryimages/85558-manchester-airport-security-fasttrack-T2.png                                                          Short on time? Take the fast track through security and you’ll fly through.    //d1xcii4rs5n6co.cloudfront.net/libraryimages/81386-MAN-fasttrack-core.png    &lt;h2&gt; What is it?&lt;/h2&gt; &lt;p&gt;The Security FastTrack pass gives you access to the priority lane at the airport’s security checks. You’ll whizz past the standard queue, giving you more time to relax in departures before your flight. &lt;/p&gt; &lt;p&gt; Once you book we’ll email you the passes, so make sure you print them and take them with you. There’ll be a voucher each with a barcode, which you’ll need to scan at the entrance before you go through. &lt;/p&gt; &lt;h2&gt;When can I use it?&lt;/h2&gt; &lt;p&gt;Available 2.30am - 11pm.&lt;/p&gt; &lt;h2&gt; Is it the same price for children?&lt;/h2&gt; &lt;p&gt;Yes, the pass is £5 per person.&lt;/p&gt; &lt;h2&gt;The small print:&lt;/h2&gt; &lt;p&gt;You won't need this service if you have mobility issues or small children with pushchairs as there's already a dedicated lane.&lt;/p&gt;&lt;p&gt;Security FastTrack tickets can only be used once for the date you have booked.&lt;/p&gt; &lt;p&gt; If you have booked more than one ticket the vouchers will all be in the lead passenger’s name.&lt;/p&gt; &lt;p&gt;All FastTrack's terms and conditions will apply to you, so please read them &lt;a href=\"http://www.manchesterairport.co.uk/terms-and-cond
