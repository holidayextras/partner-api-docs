      "hxapi-hotel-av": {
        "title": "Hotel Availability Request",
        "content": "## Hotel Availability Request### MethodGET### EndpointThe endpoint to use is:```https://api.holidayextras.co.uk/v1/hotel/LocationCode```For example, for London Heathrow the endpoint is:```https://api.holidayextras.co.uk/v1/hotel/LHR```If you know the specific hotel code, then you can request availability by entering that into the endpoint. For example, for the Hilton at London Heathrow the endpoint is:```https://api.holidayextras.co.uk/v1/hotel/LHRHIL```To find the airport locations available for hotels, please refer to the [locations endpoint.](/hxapi/locations)### Request ParametersNB: All parameter names are case sensitive. | Name        | Data Type    | Format | Mandatory? | Additional Information | | ----        | ----    | ------ | -------- | ---------------------- | | ABTANumber  | String  | [A-Z0-9] 5 chars | Y | This is also known as an 'agent code'. This will be confirmed to you by your Account Manager during set up.| | Password    | String  | [A-Z0-9] 5 chars | Y*       | Password required for retail agent requests - intermediaries do not require a password.This will be confirmed to you by your Account Manager during set up.| | Initials    | String  | [A-Z] 3 chars | N  | The initials of the Operator / Agent. | | key         | String  | [A-Z]                                  | Y        | This will be assigned to you by your Account Manager during set up.| | token       | String  | [0-9] 9 chars                         | Y        | Please see [user token endpoint](/hxapi/usertoken) for details of how to generate a token. | | ArrivalDate | Date    | YYYY-MM-DD                             | Y        | Date customer arrives at hotel. | | Nights      | Integer  | 1                                  | Y        | Number of nights the customer wants to stay in the hotel. NB: It is only possible to book one night stays.| | RoomType      | String  | [A-Z0-9] 3 chars | Y        | See [RoomCodes](/hxapi/types/roomcode) for a list of valid codes. | | SecondRoomType        | String  | [A-Z0-9] 3 chars | N*        | NB: This feature is only available in the UK. This parameter is mandatory if the customer wishes to book two rooms at the same time. The room codes are as per RoomType. | | ParkingDays       | Integer  | [0-9] 2 chars | Y        | NB: The maximum duration accepted for ParkingDays is 30.| | System      | String  | [A-Z] 3 chars | Y*       | For European products, you need to pass in the value of `System=ABG` (the default is `System=ABC`, which is UK products only). | | lang        | String  | [A-Z] 2 chars | Y*       | Required for requests for European products. (Values available are `en`, `de`, `it`, `es`, `pt` and `nl`.)| | Terminal | String | [A-Z1-9] 1 char | N | An optional field when requesting hotel and parking that will filter the availble results to those that serve the given terminal. Terminal options can be found using the [Terminal](/hxapi/terminal) request, where the name of the terminal is a word only the first character is needed for this request ( eg. N for the North terminal ). | | fields      | String  | [A-Z] a csv list of product info fields | N        | A list of product info fields can be passed in to return configurable product information e.g. `fields=name,address,latitude,sellingpoint`. |## Hotel Availability ResponseFor a detailed explanation of the fields returned, please see below: | Field                | Additional Information | |----------------------|------------------------| | Hotel/BookingURL | The URL to POST the booking request to for this particular product. | | Hotel/MoreInfoURL | The link to more information about this product, sourced from the Product Library. | | Hotel/RequestFlags |  These flags list which details the car park operator requires from the customer. If a flag is returned with a ‘Y’ your application should send the corresponding field/value in the booking request. Flags are only returned when required. The flags which can be returned are: `Registration`, `CarMake`, `CarModel`, `CarColour`, `OutFlight`, `ReturnFlight`, `OutTerminal`, `ReturnTerminal`, `Destination`, `MobileNum` | | Hotel/Price | The price of product without any surcharges/fees added.| | Hotel/PriceWithSurcharge | *NB: Please ignore this field - we no longer accept new agents sending payment details via our API.* | | Hotel/Adults* | The maximum number of adults included in the room occupancy. | | Hotel/Children* | The maximum number of children included in the room occupancy. | | Hotel/RoomCode | *NB: Please ignore this field as it relates to internal systems.* | | Hotel/BoardBasis | *NB: Please ignore this field as it is no longer used and will be deprecated in future versions of the API.* | | Hotel/ParkingDays | This returns the number of days parking available. NB: This may differ from the value requested, due to parking packages usually being set up in the system as either 4, 8 or 15 days. | | Hotel/CarPark | If your request included car parking, this is the car park code. | | Hotel/Filter | *NB: Please ignore this field as it is for internal use only.* | | Hotel/lead_time_cancellation | This is the number of days before the booking starts that the product will switch from flexible to non-flexible. | | API_Header/Request | The API returns every parameter and value you sent in the previous request.  | \\* Where two rooms have been requested, these fields represent the total of adults and children across all rooms. Additional fields will show the individual room occupancy:  `FirstRoomAdults`, `FirstRoomChildren`, `SecondRoomAdults` and `SecondRoomChildren`.## Key Information on HotelsPlease read this section through carefully, as it contains useful information about restrictions on how hotels must be sold.### Advance purchaseAdvance purchase products are non-refundable and non-cancellable. As a result, Cancellation Waiver must *not* be sold to customers purchasing a product with `advance_purchase` set to 1.### Day Use OnlyThere is a field in the product library for hotels, named `day_use_only`. Day use products must not be sold to customers wishing to have an overnight stay where `day_use_only` is set to 1.### Parking Includes ArrivalIn order to establish whether the package includes parking for the night of the hotel stay the `parking_includes_arrival` field needs to be taken into account.Where this field is set to 0, this means the night of the hotel stay is not included as there is free overnight parking. Parking stay will start from the following day. Where it is set to 1, this means that parking starts from the date the customer checks into the hotel.### Mystery / Un-named ProductsThere are some hotels in which the name field will not provide the name of the hotel e.g `Mystery 4-star hotel`.  The name of these hotels should not be provided to the customer until the booking is made, along with other identifying details such as address, hotel images, restaurant names etc.### Lead time cancellationFlexible bookings become non flexible within a certain timeframe before the stay date ie booking turns non flexible within 30 days of stay. Scenario 1* Flexible booking made outside 60 days of stay.* Cancellation policy - only able to canx up to 30 days before stay date.* Booking is non flex within 30 days of stay date.Scenario 2* Flexible booking made inside 60 days of stay date.* Cancellation policy - only able to canx up to 3 days before stay date.* Booking is non flex within 3 days of stay date.## Worked ExamplesBelow are worked examples of both the requests and responses for hotel availability.### UK Hotel Availability Request - Room Only (zero days parking)```https://api.holidayextras.co.uk/v1/hotel/LHR?ABTANumber=YourABTANumber&Password=YourPassword&key=YourKey&token=YourToken&ArrivalDate=2017-12-01&Nights=1&RoomType=T21&ParkingDays=0```### UK Hotel Availability Response - Room Only (zero days parking)NB: This is a shortened example compiled from a full availability response.```xml            Mercure        LHRMEA        /v1/hotel/HPLHRMEA        /v1/product/LHRMEA                    1                45.00        45.90        2        1        TRL        RO        0        45.00        30        1        1        1                Thistle T5        LHRPAA        /v1/hotel/HPLHRPAA        /v1/product/LHRPAA                85.50        87.21        2        1        TRL        RO        0        85.50        30        1                    0                1                Hilton T5        LHRHLT        /v1/hotel/HPLHRHLT        /v1/product/LHRHLT                    1            1            1                99.00        100.98        2        1        TRL        RO        0        99.00                2.00        0.00        4.00        0.00        0.00        0.00        2.99                                YourABTANumber            YourPassword            YourKey            YourToken            2017-12-01            1            T21            0            1            ```### UK Hotel Availability Request - Room with Parking```https://api.holidayextras.co.uk/v1/hotel/LHR?ABTANumber=YourABTANumber&Password=YourPassword&key=YourKey&token=YourToken&ArrivalDate=2017-12-01&Nights=1&RoomType=T21&ParkingDays=8```### UK Hotel Availability Response - Room with ParkingNB: This is a shortened example compiled from a full availability response.```xml            Mercure with Purple Parking Meet and Greet        LHRMPU        /v1/hotel/HPLHRMPU        /v1/product/LHRMPU                    1            1            1            1            1            1            1                129.00        131.58        2        1        TRL        RO        8        129.00        LHR5        LHR5                    1                        Thistle T5 with parking at the hotel and breakfast        LHRPAT        /v1/hotel/HPLHRPAT        /v1/product/LHRPAT                130.00        132.60        2        1        TRL        RO        8        130.00                    1            1            0                       Sheraton Skyline with parking at the hotel       LHRSKA       /v1/hotel/HPLHRSKA       /v1/product/LHRSKA              134.00       136.68       2       1       TRL       RO       8       134.00                  0                     2.00        0.00        4.00        0.00        0.00        0.00        2.99                                YourABTANumber            YourPassword            YourKey            YourToken            2017-12-01            1            T21            8            1            ```### European Hotel Availability Request - Room with Parking```https://api.holidayextras.co.uk/v1/hotel/MUC?ABTANumber=YourABTANumber&Password=YourPassword&key=YourKey&token=YourToken&ArrivalDate=2017-12-01&Nights=1&RoomType=D20&ParkingDays=8&System=ABG&lang=de```### European Hotel Availability Response - Room with ParkingNB: This is a shortened example compiled from a full availability response.```xml            Schweigers Landgasthof        MUCLAN        /v1/hotel/FRMUCLAN        /v1/product/MUCLAN                120.00        NaN        2        0        DZ        F        15        120.00                Airporthotel Regent        MUCREG        /v1/hotel/FRMUCREG        /v1/product/MUCREG                97.00        NaN        2        0        DZ        F        15        97.00                  NH München Airport          MUCAST          /v1/hotel/FRMUCAST          /v1/product/MUCAST                    113.00          NaN          2          0          DZ          U          8          113.00                0.00        0.00        0.00                                TESTG            Redacted            mytestkey            generate            2017-12-01            1            D20            8            ABG            de            1               ```",
        "url": "/hxapi/hotel/av/"
      }

      "hxapi-hotel-bkg": {
        "title": "Hotel Booking Request",
        "content": "# Hotel Booking Request## MethodPOST## EndpointThe endpoint to use is:```https://api.holidayextras.co.uk/v1/hotel/LocationCode```For example, for _Mercure at London Heathrow_ the endpoint is:```https://api.holidayextras.co.uk/v1/hotel/LHRMEA```## Request ParametersThe parameters _must_ be sent in the body of the request, as `x-www-form-urlencoded` data.NB: All parameter names are case sensitive. | Name        | Data Type    | Format | Mandatory? | Additional Information | | ----        | ----    | --------- | -------- | ---------------------- | | ABTANumber  | String  | [A-Z0-9] 5 chars | Y | This is also known as an 'agent code'. This will be confirmed to you by your Account Manager during set up.| | Password    | String  | [A-Z0-9] 5 chars | N*       | Password required for retail agent requests - intermediaries do not require a password.This will be confirmed to you by your Account Manager during set up.| | Initials    | String  | [A-Z] 3 chars | N  | The initials of the Operator / Agent. | | key         | String  | [A-Z]                                  | Y        | This will be assigned to you by your Account Manager during set up.| | token       | String  | [0-9] 9 chars                         | Y        | This is the same token used in the availability request. | | ArrivalDate | Date    | YYYY-MM-DD                             | Y        | Date customer arrives at hotel. | | Nights | Integer  | 1, 2, 3, etc                                  | Y        | Number of nights the customer wants to stay in the hotel. NB: For European products it is only possible to book one night stays. | | RoomCode      | String  | [A-Z0-9] 3 chars | Y        | See [RoomCodes](/hxapi/types/roomcode) for a list of valid codes. | | Adults | Integer       | [1-5] 1 char                           | Y                 | The number of adults occupying the room. | | Children | Integer       | [0-4] 1 char                           | Y                 | The number of children occupying the room. | | ParkingDays       | Integer  | [0-9] 2 chars | Y        | NB: The maximum duration accepted for ParkingDays is 30.|| Title | String | [A-Z] 4 chars | Y        | Title of lead passenger|| Initial | String | [A-Z] 1 chars | Y        | Initial of lead passenger|| Surname | String | [A-Z] 20 chars | Y        | Surname of lead passenger|| Address[] | String | [A-Z0-9] 25 chars | Y        | First line of address (house name / number and road) of lead passenger. If you require more than 1 address line, then you can replicate this field and increment the number in square brackets, i.e. \"Address[1]\" for address line 2, and so on. NB: This field can be set to NA|| Town | String | [A-Z] 20 chars | Y        | Town of address. NB: This field can be set to NA|| County | String | [A-Z] 20 chars | Y        | County of address. NB: This field can be set to NA|| PostCode | String | [A-Z0-9] 10 chars | Y        | Post code of address. NB: This field can be set to NA|| DayPhone | Integer | [0-9] 20 chars max  | N                 | The customer's telephone number. |  | Email | String | [A-Z0-9] 50 chars | Y        | The email address of customer. || CustomerRef | String | [0-9A-Z] 20 chars| N | Enter your Customer Reference to help match bookings for accounting purposes. || Remarks | String | [0-9A-Z] 60 chars| N | Pass in Remarks for notification such as COT REQUESTED in ROOM || Waiver | Boolean | [0,1]  | Y | Defaults to 0 if not supplied. || DataProtection | String | [Y,N] | N | Does the customer consent to receiving offers from Holiday Extras? Y = Yes, will receive offers, N = No, customer data is protected. Defaults to No if not supplied. |                   | PriceCheckFlag | String | [Y] | Y | Indicates a price check will be carried out prior to booking. If the price is lower in the system the booking will be made as the customer will benefit from a saving.  If the price has changed and is higher than the price stated on availability, an error will return to explain that the price has increased, the booking can still be made but the customer must confirm that they will pay the higher amount.  You should then resubmit the request changing the PriceCheckPrice with the new price.|                     | PriceCheckPrice | Float | [0-9] | Y        | Price of the product, received from the availability request or price check. || System      | String  | [A-Z] 3 chars | Y*       | For European products, you need to pass in the value of `System=ABG` (the default is `System=ABC`, which is UK products only). || lang        | String  | [A-Z] 2 chars | Y*       | Required for requests for European products. (Values available are `en`, `de`, `it`, `es`, `pt` and `nl`.)|## Multiple rooms on same bookingCurrently, we can only accept a maximum of 2 rooms per booking. If the customer needs more, you will need to make multiple requests. If an intermediary account, you should note that this would lead to multiple transactions on the credit card, and multiple charges, and therefore we advise against it.The additional parameters for including a second room are:| Name        | Data Type    | Format | Mandatory? | Additional Information || ----        | ------------ | ------------- | -------- | ---------------------- || SecondRoomType        | String  | [A-Z0-9] 2 chars | N*        | This parameter is mandatory if the customer wishes to book two rooms at the same time. The room codes are as per [Room Codes](/hxapi/types/roomcode). || SecondRoomCode        | String        | [Room Codes](/hxapi/types/roomcode) | N                 | NB: Please note that the room codes differ between availability and booking requests. || SecondRoomAdults      | Integer       | [1-5] 1 char | N | The number of adults occupying the second room. || SecondRoomChildren    | Integer       | [0-4] 1 char | N | The number of children occupying the second room. |## UK Hotels with parkingThe additional parameters for hotel with parking (where parking > 0 days) are:| Name        | Data Type    | Format | Mandatory? || ----        | ----    | --------- | -------- || CarDropoffDate        | Date   | YYYY-MM-DD    | Y  || CarDropoffTime        | Time   | HHMM    | Y  || CarPickupDate         | Date   | YYYY-MM-DD | Y  || CarPickupTime         | Time   | HHMM    | Y  || ReturnFlight          | String | [0-9A-Z] 10 chars | N || TerminalCode          | String | [0-9A-Z] 2 chars  | N || Registration          | String | [0-9A-Z] 10 chars | N || CarMake               | String | [0-9A-Z] 10 chars | N || CarModel              | String | [0-9A-Z] 10 chars | N || CarColour             | String | [A-Z] 10 chars    | N |## PaymentIn the UK, we are PCI DSS compliant and so we do not accept customers' payment details being passed to us via the API. Further details can be found in our section on [Payment](/hxapi/payment).Please contact your Account Manager if you have any questions concerning payment.## Booking Terms and ConditionsIt is important that the customer has access to the Terms and Conditions at the time of placing their booking and after. We highly recommend that these are made clear to the customer _before_ booking.For European products, please use the following link:```http://www.holidayextras.de/images/de-hx/pdf/agb.pdf```If you require translations of Terms and Conditions into other languages, you can simply change ``/de-hx/`` (German) into ``nl-hx`` (Dutch), ``it-hex`` (Italian), ``pt-hx`` (Portuguese), ``fr-hx`` (French), ``es-hx`` (Spanish) or ``en-hx`` (English).# Hotel Booking ResponseThe hotel booking response will confirm that a booking has been placed in our system.For a detailed explanation of the fields returned, please see below:| Field                | Additional Information || ----                 | ---------------------- || Booking/BookingRef  | This is the reference for this booking. It must be referred to in all communication with us concerning this booking. NB: Our booking references are up to 12 char alphanumeric (including 1/I and 0/O/Q).|| Booking/AgentComm  | Commission you have earned from this booking. || Itinerary | This section confirms details of the hotel on the booking. || Room | This section confirms details of the room booked at the hotel. || ClientDetails  | Confirmation of the customer's details that were sent in the booking request. || Pricing |  Confirmation of the price paid by the customer for the hotel room. || API_Header/Request  | A list of parameters that were sent in the booking request. |## Booking ConfirmationWe expect partners to create their own booking confirmations to send to customers, using the information provided in the booking response.However, we also have capability to send booking confirmation emails ourselves on behalf of partners. This feature is not available as standard, and so if you wish to enable this please speak to your Account Manager.# Worked ExamplesBelow are worked examples of both the request and response for booking hotels.## UK Hotel Booking Request - Room Only```https://api.holidayextras.co.uk/v1/hotel/LHRMEA``````xml          YourABTANumber      YourPassword      YourKey              YourToken      2017-12-01              1      DBL      0      2      0      Mr      T      TEST      1 Test Street      Testville      Testshire      TE1 STS      01234567890      test@test.com      N      Y      55.00      1    ```## UK Hotel Booking Response - Room Only```xml            YourBookingRef        6.53        0.00        /v1/booking/YourBookingRef        /v1/confirmation?email=test@test.com&booking_ref=HPABCDE&product_type=hotels                    55.00        2017-12-01        1        RO        N                        LHRMEA        Mercure        0        0                2        0        0        DBL                                                        MR        T        TEST        test@test.com                                                                    YourABTANumber            YourPassword            YourKey            YourToken            2017-12-01            1            DBL            0            2            0            Mr            T            TEST            1 Test Street            Testville            Testshire            TE1 STS            01234567890            test@test.com            N            Y            55.00            1            ```The `PdfUrl` field contains a URL that can be used to retrieve a PDF copy ofthe confirmation email. Note that you will need to append the fields`ABTANumber`, `Password` and `key` to the link in order to authenticate.Example: https://api.holidayextras.co.uk/sandbox/v1/confirmation?email=test%40holidayextras.com&booking_ref=HPABCDE&product_type=hotels&ABTANumber=WT314&Password=redacted&key=YourKey## European Hotel Booking Request```https://api.holidayextras.co.uk/v1/hotel/MUCLAN``````xml          YourABTANumber      YourPassword      YourKey              YourToken      2017-12-01              1      DZ      0      2      0      Mr      T      TEST      1 Test Street      Testville      Testshire      TE1 STS      01234567890      test@test.com      N      Y      120.00      1    ```## European Hotel Booking Response```xml            YourBookingRef        /v1/booking/YourBookingRef.de        /v1/confirmation?email=test%40test.com&amp;booking_ref=FRABCDE&amp;product_type=hotels                    2017-12-01        1        F        N        0        0        MUCLAN        Schweigers Landgasthof                2        0        0        DZ                Herr        T        TEST        TEST@TEST.COM        TESTVILLE        TE1 STS        01234567890                1 Test Street        TBC        N        TESTSHIRE                120.00                            YourABTANumber            YourPassword            YourKey            YourToken            2017-12-01            1            DBL            0            2            0            Mr            T            TEST            1 Test Street            Testville            Testshire            TE1 STS            01234567890            test@test.com            N            Y            120.00            ABG            de            1            ```The `PdfUrl` field contains a URL that can be used to retrieve a PDF copy ofthe confirmation email. Note that you will need to append the fields`ABTANumber`, `Password` and `key` to the link in order to authenticate.Example: https://api.holidayextras.co.uk/sandbox/v1/confirmation?email=test%40holidayextras.com&booking_ref=FRABCDE&product_type=hotels&ABTANumber=WT314&Password=redacted&key=YourKey",
        "url": "/hxapi/hotel/bkg/"
      }

        "content": "# Manage A Booking[API Docs](/hxapi/) > product:[viewamendcancel](index)## Manage A Booking EndpointsHere are the endpoints for managing a booking:| View booking | [https://api.holidayextras.co.uk/v1/booking/YourBookingRef](view) | GET || Amend booking - Simple | [https://api.holidayextras.co.uk/v1/booking/YourBookingRef](amend_simple) | POST || Amend booking - Complex | [https://api.holidayextras.co.uk/v1/booking/YourBookingRef](amend_complex) | POST || Cancel booking | [https://api.holidayextras.co.uk/v1/booking/YourBookingRef](cancel) | POST |## Manage A Booking Top TipsThe three methods provided will enable your customers via your integration to manage their own booking online.### Amending a bookingWe allow both simple and complex amends:- A ***simple amend*** is where the booking details are updated, without affecting the price. This is also known as an \"amend no re-price\". For example, adding a car registration number to a parking booking.- A ***complex amend*** is where the booking details are updated and this does affect the price. This is also known as an \"amend re-price\". For example, changing the date of a booking.",

      "hxapi-parking": {
        "title": "Parking",
        "content": "# Parking[API Docs](/hxapi/) > product:[Parking](index)## Parking EndpointsHere are the car parking specific endpoints: | Request | Endpoint | Method | | ------ | -------- | ------ | | Availability at airport  | [https://api.holidayextras.co.uk/v1/carpark/AirportCode](av/airport)        | GET    | | Availability at car park | [https://api.holidayextras.co.uk/v1/carpark/CarParkCode](av/carpark)        | GET    | | Make booking at car park | [https://api.holidayextras.co.uk/v1/carpark/CarParkCode](bkg)               | POST   |## Parking User JourneyBelow is a diagram detailing how the endpoints can be used to create a parking user journey. More information on each endpoint can be found in the detailed guides listed above. ![Image of Parking User Journey](/hxapi/parking/Parking_User_Journey.png)## Parking Top TipsWe have put together these top tips, which detail how to optimise your use of our API for providing parking to your customers.#### Merging Product Library data into availability responseTo save sending a separate `https` request for information from the Product Library, you can specify a comma-separated list of values to pull this information back with the availability request.Just specify a parameter named ``fields`` and include the Product Library field names there.For example:```&fields=field_a,field_b,field_c```Alternatively, the method for querying the product library as a separate request [is outlined here](/hxapi/productlibrary/parking).#### Advance purchaseThere is a field in the Product Library for car parks, named ``advance_purchase``. Advance purchase products are non-refundable and non-cancellable. As a result, the Cancellation Waiver must not be sold to customers purchasing a product with ``advance_purchase`` set to 1.#### Request flagsThe request flags brought back from availability searches indicate the fields required in the booking by the car park. You *must* retrieve this information from the customer at the time of booking.There are occasions where your booking will go through without sending this information but can fail later when importing the bookings to car parks. This causes us considerable administrative difficulties and may result in your customer's booking being cancelled without notice.#### Good to go meet and greetNew product types which are amendable by dates and times but cannot be cancelled.  The response will return `CanAmendCantCancel` set to either 1 or 0.",
        "url": "/hxapi/parking/"
      }
      ,

      "": {
        "title": "Welcome to Holiday Extras",
        "content": "# Welcome to Holiday Extras[Holiday Extras](http://www.holidayextras.co.uk/) is the UK market leader for airport hotels and other travel ancillaries including airport parking, lounges, insurance and car hire.The purpose of this documentation is to enable you to quickly on-board with our API, so you can start searching for and booking our products in *just a few hours*.## Contents[Getting Started](intro)[Detailed Guides](hxapi/)[FAQs](/faq)## Versioning|Version Number|Date|Details||--------------|----|-------|| 1.11.0 | 27th March 2019 | Added docs explaining bundle products || 1.10.0 | 25th January 2019 | Added optional `Terminal` param for hotel with parking requests. ||1.9.6 | 6th December 2018 | Updated sandbox hostname for legacy payments (EU) ||1.9.5 | 3rd October 2018 | Mandatory Infants parameter added for Lounges.||1.9.4 | 10th September 2018 | Holidayextras booking ref field size increased from 5 to 12 characters.||1.9.3 | 9th July 2018 | Security doc added. Extra field explanations added to View Booking section.||1.9.2 | 19th June 2018 | Accessibility flag added.||1.9.1 | 12th April 2018 | Add docs for BarCode node.||1.9 | 12th March 2018 | DE Start section overhauled.||1.8.1 | 2nd March 2018 | Max pax per Lounge booking changed from 9 to 4.||1.8 | 23rd February 2018 | Locations Request section updated.||1.7 | 16th February 2018 | Payment Gateway section added.||1.6 | 12th February 2018 | View/Amend/Cancel docs updated.||1.5.1 | 2nd February 2018 | Booking Confirmation info updated.||1.5 | 16th January 2018 | Lounge documentation overhauled.||1.4.1 | 11th December 2017 | URL link to PDF included in Create, Amend and View Booking responses.||1.4 | 26th September 2017 | Added section for updating booking flight details.||1.3 | 4th September 2017 | Insurance section overhauled.||1.2.2         | 18th August 2017 | Updated Account Setup section.||1.2.1         | 14th August 2017 | Added Direct Debit and SEPA mandate forms/links.||1.2           | 7th August 2017 | Payment section added clarifying supported methods including SEPA.||1.1.3         | 25th July 2017 | CarPickupDate format changed from DDMMMYY to YYYY-MM-DD in Hotel Booking request. ||1.1.2         | 24th July 2017 | Update endpoints for hotel availability and make booking.||1.1.1         |5th July 2017| Removal of references to DE hotel endpoints.||1.1           |31st May 2017| Update to documentation, including: Intro, Index and Car Parking guides.||1.0           |March 2017| Migration of API in back end from legacy stack to new (no changes for partners).|As a guide, we will update the version of the API docs according to the size and impact of the change:__Minor releases:__e.g. documentation updates or changes to API not requiring Partner changes.__Major releases__e.g. addition of new products and functionality or significant changes to structure of API requiring Partner changes.We reserve the right to remove outdated and unused functionality, and make changes that may result in deprecation of existing methods. Where this occurs, we will contact you via your Account Manager to advise. Older methods of using the API will be supported for a period of time whilst updates are made by our partners.## Payment Gateway GuidesThese endpoints for the [Payment Gateway](/payment-gateway). Please check the table below for details of which endpoints are available.|Payment Endpoints|UK|Europe||-----------------|--|------||[Pay](/payment-gateway/pay)|Yes|Yes||[Refund](/payment-gateway/refund)|Yes|Yes|",

      "payment-gateway-integration": {
        "title": "Payment Gateway: Integration",
        "content": "# Payment Gateway: Integration[API Docs](/) > [Payment Gateway](/payment-gateway/) > [Integration](/payment-gateway/integration)## How it worksThis is a high overview of how the payment flow works.There are 2 main steps in our payment gateway integration system. You will need to:1. Integrate our frontend payment script on your payment page2. Make token payment requests to our API from your backend system (with the token provided by the frontend script)The goal of the frontend payment script is to make it possible for customers to provide their card details in a secure way.Once customers provide their card number, the card number gets tokenised and it's only this token we'll be using throughout the payment flow afterwards. This token is secure and cannot be used for anything else than making payments within the HX payment system.The frontend payment script will need a placeholder provided by you which will sit in your form. When the placeholder is in place, the script will create several DOM elements which are needed for the user to interact with so that a token can be gathered by the customer. Once the token is populated on the page, the form can be submitted and you will have access to the token in your backend.Then you will need to make a POST request to our payment gateway API with that token for making a payment.**NOTE:** When integrating you will need to test against the staging environment which is located at https://payment-gateway-staging.holidayextras.co.uk## Getting SetupThis explains the step by step process of getting setup in order to be able to access the Payment Gateway.### 1. Ask for authentication credentialsYou need to contact your Holiday Extras representative to get your authentication credentials created. These credentials are required with every request made to the Payment Gateway endpoints. Without them, you will not be able to access these endpoints. The authentication credentials should be passed in an `auth` header, demonstrated in each of endpoints documentation.### 2. Ask for a channelWhen integrating with the Payment Gateway, we will provide you with a channel to pass in the body of every request. This is for us to use to determine who is using our Payment Gateway. Please see the endpoint documentation for usage on the `channel` parameter.### 3. Integrate the frontend payment scriptTo integrate the script into your page you need a few prerequisites. You will need to:- have your domain served on https- add an empty placeholder HTML element into your form- load the payment script on the page- configure the script on page loadHere is a very simple example snippet that demonstrates this:```html  ... the contents of your existing form      ... rest of your form with any other inputs and the submit button, etc... any other content you have on your page```**NOTE:** When you're integrating the payment script you will need to use its staging version located at https://payment-gateway-staging.holidayextras.co.uk/payment.staging.1.0.0.min.jsThe `defaultToPayframe` option is provided for making the integration process easier as it removes the additional security step we have in our contact centre. The solution we have requires additional telephony software that we use which is not provided with this API. Not having the telephony solution when integrating the payment script would make it impossible to complete the integration, so this option just disables that step (only in the staging environment).The placeholder div is used by the payment script to put the appropriate DOM elements it needs in order to get the customer card details.The fields that get created are:- expiry date input (needed for tokenising the card number)- token input (needed so that it gets submitted with your form to make a payment)- obfuscated card number input (will be used only if there were 2 failed attempts to get the card number via DTMF)- button to trigger DTMFWhen the payment script loads on the page and gets configured, it will put those fields so the customer can input the expiry date and then trigger our DTMF system. If the customer successfully inputs their card number via DTMF in a secure way the script will populate the token field with the payment token. When the form gets submitted that token can be used on the backend to make a token payment.If DMTF fails 2 times the payment script will fallback to putting a card number input on the page which will be replaced by an iframe for inputting the card number in a secure way. Once the card number and expiry dates are populated, the script will again automatically populate the token field.You don't need to track the count of failures as this is done by the payment script. All you need to do is to provide a boolean value for the result of the last payment attempt. This should be done on each page load when the payment script gets configured.",
        "url": "/payment-gateway/integration/"
      }
      ,
    
      "integration-process": {
        "title": "Integration Process",
        "content": "# Integration ProcessWe aim to make the process for partners integrating with our API straightforward, by following these simple steps:1. Create an account;2. Kick off call;3. Development phase;4. Certification;5. Go live.More details on each of these steps can be found below.## 1. Account CreationBefore you can start interacting with our API, you must apply for an *API account*, even if you are already working with us.#### Insurance only:If you are integrating with our API for insurance products, then the process is different than that set out below, due to regulations imposed by the Financial Conduct Authority. Please contact our [Insurance Team](mailto:travelinsurance@holidayextras.com) in the first instance, who will be happy to talk you through the process of account creation.#### All other products:Please complete the [sign up form](https://docs.google.com/forms/d/e/1FAIpQLSd1H4fp744DNt8mzwKt-7bh_xer3N2JbIHhNLRgUHwf2r9GZw/viewform?usp=sf_link), which is automatically submitted to us upon completion.You are also required to submit one of the following finance forms to us, depending on your region:- For UK Partners: [Direct Debit Mandate](/hxapi/DD_MANDATE_RBS_HX.pdf)- For European Partners: [SEPA Mandate](/hxapi/SEPA_Basislastschriftmandat.pdf)Once all the information has been received, we aim to set up the account within 48 hours (if submitted at weekends or bank holidays, this will not be processed until the following working day).When completed, the finance forms should be sent by email to either our [UK](mailto:sales@holidayextras.com) or [European](mailto:hxapi-contact@holidayextras.de) Partnerships teams (depending on your region). We will respond with your account details and any further instructions for getting started.## 2. Kick off callOnce your account has been created you will be assigned an Account Manager, who will support you throughout the integration process. The initial contact with your Account Manager will be either a conference call or face to face meeting (whichever is most practical), which will cover more detail around the scope of the integration and provide an overview of how our API works. Technical support will also be available on this call.More details can be found in the [kick off document](https://docs.google.com/document/d/1dL6kF3_hpBIKeXeEUkehR22geAhpazD8V58EVSRrUKo/edit).## 3. Development phaseDuring the development phase, your Account Manager will be contactable to answer any queries you may have. We will agree in the kick off call the level of support you require, which will depend on the complexity of your integration and the timescales for completing it. For example, we can set up regular calls to review progress, and provide technical contact details to support with integration queries.## 4. CertificationOnce you have completed your development we will invite you to a call to seek certification for your integration. This is an important step as it enables us to check you are using our API correctly.The key parts of certification are use case testing, load testing and security. We will expect to review examples of requests made and responses received for each product you are using.More details can be found in the [certification checklist](https://docs.google.com/document/d/1W8cAttcx9l8VPSY999p0TzmrWifJyqIi3shxZVcrYTE/edit).## 5. Go LiveOnce we are satisfied that your integration meets the requirements in the certification check we will add your production credentials to our systems and notify you of the details. We will agree a date by which you will complete your integration and be live in production.It is the final stage in the integration process, so we will also ensure that all outstanding issues have been rectified, and that we have the correct reporting in place, so we can monitor performance from go live.Once your integration is live the day to day management of the account will be handled by the Account Manager, as agreed between us.",
        "url": "/integration_process/"
      }
      ,
    
      "intro": {
        "title": "Getting Started",
        "content": "#  Getting Started## Integration ProcessIn our experience, the most successful integrations (delivered on-time, free from defects) are the ones that follow our [integration process](/integration_process). Here you can find details on the process, including how to create an account.## System requirementsThe platform and programming language you use to interact with our API is up to you. We expect the most common use case to be the creation of a web or mobile application.The only system requirements are the ability to:*  make HTTPS requests;*  parse XML and/or JSON files.### Note: We have permanently disabled all non-HTTPS access. Your systems will need to be making all of their API calls via HTTPS only.### Rate LimitingRequest limits are applied on a per-key basis. Thresholds can be adjusted if they prove too restrictive, but we need to protect our API from applications which make an unreasonable number of requests. There are distinct thresholds for the number of permissible requests per minute, per hour and per day. We reserve the right to alter these limits.Any abuse or misuse of our API may result in the application key being disabled or restricted.## Overview of our APIThe detailed guides assume a level of programming knowledge. You should be familiar with HTTPS, XML, JavaScript and server-side programming.### API DesignOur API has been designed following [RESTful principles](https://en.wikipedia.org/wiki/Representational_state_transfer). Every request is made over `https` using the standard method. For data retrieval, you always use the GET method. For making a booking (thus creating a new resource), the POST method must be used.A single URL can have different functions depending on the method used to access it. Using the following URL as an example with each method:```https://api.holidayextras.co.uk/v1/carpark/LGW2```GET - returns availability and pricing information for that car park;POST -  makes a booking at that car park.### Server AddressWhenever writing new code or altering existing functionality, you *must* use the sandbox server as a testing environment, before deploying to production.The data returned  in the sandbox is not 'as live', but the format and structure are the same. If you do not, you will affect metrics such as conversion rates, and you will be responsible for any test bookings that have been made in the live environment, i.e. payment.Sandbox URL: https://api.holidayextras.co.uk/sandbox/Live URL: https://api.holidayextras.co.uk/### Reply FormatsOur API can return data in two formats: XML (default) and JavaScript. To specify the format explicitly, append the file extension to the request.*  .xml (default if not specified)*  .js```https://api.holidayextras.co.uk/sandbox/v1/prodlib/LGW2/lite?key=YourKey```is the same as```https://api.holidayextras.co.uk/sandbox/v1/prodlib/LGW2/lite.xml?key=YourKey```The same query, with results in javascript```https://api.holidayextras.co.uk/sandbox/v1/prodlib/LGW2/lite.js?key=YourKey```### User JourneyEach product generally follows the same journey:1. Generate a user token;2. Search for availability;3. Make a booking;4. View the booking.Additional requests can be made for locations and additional product information. Please refer to each product's [detailed guide](/hxapi/) for more specific detail on the user journey.### Making Test BookingsBookings made against the test server can be made with a test credit card number. If you use a valid card number, no payment will be taken. There are a range of cards and scenarios which will allow a test booking against the test server to be processed - see [FAQ](/faq#test-credit-cards) for more detail.However when you point your application to our live server, you will need to use a valid credit card: the bookings will be live and will need to be cancelled.Please do not cancel bookings by ringing our call centre or using the online cancellation interface at [www.holidayextras.com](http://www.holidayextras.com). Credit card charges will *not be refunded* to your card if you use either of these methods. Send the booking references to  and all charges will be refunded.## Go Live ProcedureBefore you can deploy your code to production and start making live bookings, we will need you to contact us to confirm how your application is interacting with our API and ensure all agreements are in place.## Where to next?If you are ready to begin, we suggest you start with our [Detailed Guides](/hxapi/).",
        "url": "/intro/"
      }

        "content": "# Lookup Locations[API Docs](/hxapi/) > product:[Car Hire](/hxapi/carhire) > endpoint:[locations](/hxapi/carhire/locations)```htmlGET: /carHire/locations```## RequestThe following GET parameters are mandatory:```javascript\"key\": 1,\"Query\": \"London\"```Query searches against name and/or country_name.Example request:```htmlhttps://api.holidayextras.co.uk/v1/sandbox/carHire/locations.js?key=1&Query=London```## ResponseCar Hire returns a list of locations, including a location code, name and country. The location code can be used as part of an Availability request when searching for Pickup or Dropoff locations.```json{  \"API_Reply\": {    \"Locations\": [      {        \"code\": \"FL965\",        \"name\": \"Amsterdam (Schipol) Airport\",        \"country_name\": \"Netherlands\"      },      {...},      {...}    ]  }}```",

      "hxapi-locations": {
        "title": "Locations Request",
        "content": "## Locations RequestAll available locations can be requested by specific product type, e.g. car parking. ### MethodGET### EndpointThe endpoint to use is:```https://api.holidayextras.co.uk/v1/location```### Request ParametersNB: All parameter names are case sensitive. | Name        | Data Type    | Format | Mandatory? | Additional Information | | ----        | ----    | ------ | -------- | ---------------------- | | key         | String  | [A-Z]                                  | Y        | This will be assigned to you by your Account Manager during set up.| | token       | String  | [0-9] 9 chars                         | Y        | Please see [user token endpoint](/hxapi/usertoken) for details of how to generate a token. |  Product and market specific parameters:  | Market | Product | Parameters             |  |--------|---------|------------------------| | UK     | Parking | type=1                 | | UK     | Hotels  | type=2                 | | UK     | Lounges | type=3                 | | EU     | Parking | type=carpark&system=de | | EU     | Hotels  | type=hotel&system=de   | | EU     | Lounges | type=lounge&system=de  |  ## Hotel Availability ResponseFor a detailed explanation of the fields returned, please see below: | Field                | Additional Information | |----------------------|------------------------| | Code | Location code to be used in the product specific request. | | Name | Location name. | | MoreInfoURL |  Link to the location entry in product library - this URL can be called to retrieve content relating to that location. | | Type | Type of location. | | API_Header/Request | The API returns every parameter and value you sent in the previous request.  |## Worked ExamplesBelow are worked examples of both the requests and responses for locations.### UK Parking Location Request```https://api.holidayextras.co.uk/v1/location?key=YourKey&token=YourToken&type=1```### UK Parking Location ResponseNB: This is a shortened example compiled from a full UK parking location response.```xml            ABZ        Aberdeen        /v1/product/ABZ        airport                BFS        Belfast International        /v1/product/BFS        airport                BHD        Belfast City (George Best)        /v1/product/BHD        airport                         YourABTANumber            YourPassword            YourKey            YourToken            1            mytestkey            1            ```### EU Hotel Location Request```https://api.holidayextras.co.uk/v1/location?key=YourKey&token=YourToken&type=hotel&system=de```### EU Hotel Location ResponseNB: This is a shortened example compiled from a full EU hotel location response.```xml            AMS        Amsterdam (Schiphol)        /v1/product/AMS        german_airport                BER        Berlin Brandenburg        /v1/product/BER        german_airport                BGY        Bergamo        /v1/product/BGY        german_airport                         YourKey            YourToken            hotel            de            1            ```",
        "url": "/hxapi/locations/"
      }

      "hxapi-insurance-options": {
        "title": "Insurance options",
        "content": "# Insurance options[API Docs](/hxapi/) > product:[Insurance](/hxapi/insurance/options)## Insurance Schemes Options RequestThis endpoint will respond with the options available for the selected insurance scheme.### MethodGET### EndpointTo request the list of options available for the selected insurance scheme, the endpoint to use is (where `SchemeCode` is returned in the [insurance scheme availability response](/hxapi/insurance/availability)):```https://api.holidayextras.co.uk/v1/insurancepolicy/SchemeCode```For example, to request the options available for `SchemeCode` \"8673\" (Europe low risk, single trip), the endpoint is:```https://api.holidayextras.co.uk/v1/insurancepolicy/8673```### Request ParametersNB: All parameter names are case sensitive. | Name  | Data Type | Format | Mandatory? | Additional Information | | ----  | --------- | ------ | ---------- | ---------------------- | | ABTANumber | String | [A-Z0-9] 5 chars | Y | This is also known as an 'agent code'. This will be confirmed to you by your Account Manager during set up. | | Password | String | [A-Z0-9] 5 chars | Y | Password required for retail agent requests - intermediaries do not require a password.This will be confirmed to you by your Account Manager during set up. | | key   | String | [A-Z] | Y | This will be assigned to you by your Account Manager during set up.| | token | String | [0-9] 9 chars | Y | Please see [user token endpoint](/hxapi/usertoken) for details of how to generate a token. | | StartDate | Date | YYYY-MM-DD | Y | Date customer wants policy to start (start date of trip if single trip, or up to 30 days from search date if annual trip) | | EndDate | Date | YYYY-MM-DD | N* | Date customer wants policy to end (return date of trip if single trip). NB: If no end date is provided, system will assume you are requesting an annual policy. | | birthDate[] | Date | YYYY-MM-DD | Y | Date of birth for customers. All customers requiring inclusion on this policy must provide their date of birth. You can add multiple people by enumerating each date of birth in the format birthDate[0], birthDate[1], birthDate[2], and so on. | | title[] | String | [A-Z] 4 chars | Y | Customer's title. All customers requiring inclusion on this policy must provide their title. You can add multiple people by enumerating each title in the format title[0], title[1], title[2], and so on. | | firstName[] | String | [A-Z] 15 chars | Y | Customer's first name. All customers requiring inclusion on this policy must provide their first name in full (initials will not be accepted). You can add multiple people by enumerating each first name in the format firstName[0], firstName[1], firstName[2], and so on. | | lastName[] | String | [A-Z] 15 chars | Y | Customer's last name. All customers requiring inclusion on this policy must provide their last name in full. You can add multiple people by enumerating each last name in the format lastName[0], lastName[1], lastName[2], and so on. | | destinationID | Integer | [0-9] 2 chars | Y | Found in the [insurance scheme availability response](/hxapi/insurance/availability) | | schemePrice | Float | [0-9] | Y | Found in the [insurance scheme availability response](/hxapi/insurance/availability) |## Insurance Schemes Options ResponseThe insurance schemes options response will return all the options that are available on for the selected scheme. A summary of the request received can be found in the header field at the end of the response.For a detailed explanation of the fields returned, please see below: | Field | Additional Information | | ----- | ---------------------- | | Option/SchemeOptionID | TBC | | Option/optionName | TBC | | Option/optionPrice | TBC | | Option/optionNet | TBC | | Option/optionRateID | TBC | | Option/optionIPT | TBC | | Option/optionDescriptionWording | TBC | | Option/optionType | TBC | | Option/maxValue | TBC | | Option/AgeGroup | TBC | | Option/activityBandPricing | TBC | | Option/activityBandPricing/schemeoptionID | TBC | | Option/activityBandPricing/coverWording | TBC | | Option/activityBandPricing/hazBand | TBC | | Option/activityBandPricing/optIndividualPricing | TBC | | Option/activityBandPricing/optIndividualPrices/IndividualPrice | This will contain various information such as: the `certificateClientID`, which must be passed through to the create policy request to include this option; the option price; a breakdown of the option Insurance Premium Tax and Net Premium. | | Activities/Activity | TBC | | Quote/certificateRef | TBC | | Quote/certificateID | TBC | | Quote/People/Person | TBC | | Quote/Pricing | TBC | | API_Header | The API returns every parameter and value you sent in the previous request. |## Worked ExamplesBelow are worked examples of both the request and response for insurance schemes options.### Insurance Schemes Options Request```https://api.holidayextras.co.uk/v1/insurancepolicy/8673?ABTANumber=YourABTANumber&Password=YourPassword&key=YourKey&token=YourToken&StartDate=2017-12-01&EndDate=2017-12-08&birthDate[0]=1970-01-01&title[]=Mr&firstName[]=Test&lastName[]=Test&destinationID=13&schemePrice=9.13```### Insurance Schemes Options ResponseNB: This is a shortened example compiled from a full insurance schemes options response.```xml                        61389            Gadget Cover (up to ?2000)            15.00            11.86            12828326            2.50            We provide cover for your gadgets against theft, loss, accidental damage, malicious damage and unauthorised calls when you are on a trip that is covered by your travel insurance policy. The gadgets must be in good condition and full working order at the time of your trip. &#60;a href=&#34;https://secure.holidayextras.co.uk/images/groups/insurancemagenta/policy_wording/Gadget_wording_Tiga.pdf&#34; target=&#38;#39;_blank&#38;#39;&#62;Policy wording&#60;/a&#62;            S            6                            Hazardous Activity Cover                        The policy can be extended to cover Hazardous Activities. Some activities are covered as standard, while others are covered with the payment of an additional premium. When you tick the box, please enter all the activites you will be doing, and the cover provided will be shown.            H                            61385                You will need to pay the additional premium to cover this activity. There is no cover under the Personal Accident or Personal Liability section of the policy while participating in this activity. Cover for medical expenses remains in place but the medical excess increases to &#38;pound;250.                D                1                                                            23207639                        3.65                        12831315                        2.40                        0.61                                                                        Fencing (within organisers guidelines)                                                        61386                You will need to pay the additional premium to cover this activity. There is no cover under the Personal Accident or Personal Liability section of the policy while participating in this activity. Cover for medical expenses remains in place.                C                1                                                            23207639                        3.65                        12829917                        2.40                        0.61                                                                        Airboating                    Biathlon                    Bobsleigh (on a wintersports policy only)                    Cross Channel Swimming (with full support team)                    Dry Slope Skiing                    Football or soccer (other than children?s club in resort)                    Gaelic Football                    Heliskiing (on a wintersports policy only)                    Hockey                    Ice Hockey (on a wintersport / 100 311 54\",        \"sellingpoint\": \"Book now: our winter special is only available for a limited time. Note new cancellation policy.\",        \"hinweis\": \"Dieses Angebot gilt für Anreisen ab 02.11.2019 und späteste Rückreise am 04.04.2020. Es ist umbuchbar und stornierbar und gilt nur solange der Vorrat reicht. Bitte beachten Sie, dass bei Umbuchungen gegebenenfalls ein Aufpreis anfallen kann. Die Maximalparkdauer beträgt 35 Tage.\\r\\nBringen Sie bitte Ihre Buchungsbestätigung und Ihre Flugdetails (Flugnummer des Rückfluges und Ankunftszeit in Frankfurt) mit zum Check-in des Parkplatzes.\\r\\nDer Shuttletransfer erfolgt zum Terminal 1. Alle Gäste, die ab Terminal 2 fliegen, können ab Terminal 1 kostenfrei mit der Sky Line oder dem Flughafen-Shuttle-Bus (alle paar Minuten) zum Terminal 2 fahren. \\r\\nDer Transfer ist für maximal 5 Personen möglich. Unser Tipp: Setzen Sie Ihre Mitfahrer zuerst am Flughafen ab! \\r\\nWir empfehlen Ihnen, ca. 2,5 Stunden vor Ihrer Abflugzeit am Parkplatz anzureisen. Bitte beachten Sie dies bei der Angabe Ihrer Anreisezeit, da ansonsten kein pünktlicher Transfer gewährleistet werden kann. \",        \"anfahrt\": \"Aus allen Richtungen: Auf die A3 in Richtung Frankfurter Kreuz/ Flughafen Frankfurt fahren. In Höhe des Flughafens Frankfurt von der A3 auf die B43 in Richtung Kelsterbach/ Industriepark Höchst abfahren. NICHT auf die B43 in Richtung Kelsterbach abbiegen sondern, sondern weiter geradeaus fahren auf der B40. Nach weiteren 1,5 km rechts abbiegen auf die B40A in Richtung Frankfurt-Stadtmitte. Nach ungefähr 4 km auf gelangt man auf die Mainzer Landstraße. Dort den Gebäudekomplex TOOM Markt/ Promarkt/ Cinestar passieren und anschließend an der Ampel rechts abbiegen in die Straße \\\"In der Schildwacht\\\". Nach ungefähr 400 m am Ende der Straße erneut rechts abbiegen in die Lärchenstraße. Nach weiteren 300 m erreicht man auf der linken Seite die Airparks-Einfahrt.\\r\\n\\r\\nBitte darauf achten, dass man der Ausschilderu       "payment-gateway-pay": {
        "title": "Payment Gateway: Pay",
        "content": "# Payment Gateway: Pay[API Docs](/) > [Payment Gateway](/payment-gateway/) > [Pay](/payment-gateway/pay)## Payment RequestThis endpoint will take payment using a token and required payment parameters.**Note**: Token payment is currently available for Level 5 Germany agents only.### MethodPOST### EndpointTo make a payment, the endpoint to use is:```https://payment-gateway.holidayextras.co.uk/pay```### Request Headers| Name  | Data Type | Format | Mandatory? | Additional Information || ----  | --------- | ------ | ---------- | ---------------------- || Content-Type | String | `application/json` | Y | This should always be `application/json` || Authorization   | String | `Basic dXNlcm5hbWU6cGFzc3dvcmQ=` | Y | Base64 encoded string for the `username:password` credentials which will be created and provided to you. This header is required with every request.|| Accept | String | `application/vnd.holidayextras.v1+json` | N | To use a different version please provide a different value. |### Request ParametersNB: All parameter names are case sensitive. | Name  | Data Type | Format | Mandatory? | Additional Information | | ----  | --------- | ------ | ---------- | ---------------------- | | channel | String | [A-Z] | Y | This will be supplied with your authentication credentials. | | paymentId | String | [A-Z] | Y | A unique ID to be used when making the payment. This cannot already exist otherwise payment will fail. | | token   | String | [0-9] | Y | A tokenised card to make the payment against. This needs to exist already, otherwise payment will fail. | | paymentReference | String | [A-Z] | Y | A reference used to group multiple payments together, doesn't need to be unique. | | amount | String | [0-9] | Y | The price (in pence) to be paid. |## Payment ResponseFor a detailed explanation of the fields returned, please see below: | Field | Additional Information | | ----- | ---------------------- | | amount | The amount that has been paid | | status | The status of the payment | | error | The error if the payment fails |## ExamplesBelow are examples of both the request and response for a new payment.### Payment Request**POST**  `https://payment-gateway.holidayextras.co.uk/pay`**HEADERS** `Content-Type: application/json` `Accept: application/vnd.holidayextras.v1+json` `Authorization: Basic dXNlcm5hbWU6cGFzc3dvcmQ=````{  \"channel\": \"channel\",  \"paymentId\": \"testPaymentId\",  \"token\": \"4111111111111111\",  \"paymentReference\": \"testPaymentRef\",  \"amount\": \"1234\"}```### Payment Response#### Successful payment```{    \"amount\": 12.34,    \"id\": \"testPaymentId\",    \"status\": \"SUCCESS\"}```#### Failed payment```{    \"amount\": 12.34,    \"status\": \"FAIL\",    \"error\": \"Failed to make payment\"}```",
        "url": "/payment-gateway/pay/"
      }
      ,
    
      "hxapi-payment": {
        "title": "Payment",
        "content": "# PaymentFor all UK partners and any new partners integrating after **1st July 2017**, Holiday Extras will not accept payment details being passed through the API. The responsibility for collecting and processing payment from the customer is the responsibility of the partner.If you have any questions concerning this then please contact your Account Manager.## Existing integrationsFor existing integrations *in Europe only* we will continue to support the following payment methods via the API:### SEPATo make a payment using SEPA, the following fields must be included in the booking request:| Name | Data Type\t| Format\t| Mandatory?\t| Additional Information ||------|------------|---------|-------------|------------------------|| AccountName | String | [A-Z0-9] | Y | Name on the account || AccountNumber | String | See additional information | Y | The IBAN account number. The IBAN number structure comprises 2 character country code, 2 character check digits (integer), followed by up to 30 characters (integers). [More information on IBAN.](http://www.sepaforcorporates.com/single-euro-payments-area/iban-number-format-sepa-country/) || SortCode | String | [A-Z0-9] 11 chars  | Y | The SEPA sort code |The following test details can be used in sandbox only:- AccountName - Mr T Test- AccountNumber - DE00000000000000000066- SortCode - 99999999999### Payment by credit or debit cardTo make a payment using credit or debit cards, you must use a different endpoint to that stated in the Detailed Guides. This is to enable us to tokenise the card details before they reach our systems.The endpoints that must be used are:Sandbox:`https://payment-staging.holidayextras.co.uk/legacy/sandbox/`Production:`https://payment.holidayextras.co.uk/legacy/`In order for us to process the payment, the following fields must be included in the booking request:| Name | Data Type\t| Format\t| Mandatory?\t| Additional Information ||------|------------|---------|-------------|------------------------|| CardNumber | String | [0-9] Max 16 chars | Y | Name on the account || ExpiryDate | Date | MMYY | Y | The expiry date of the card || CV2 | Integer | [0-9] 4 chars | Y* | * This is a mandatory requirement for partners in the UK; for European partners this is discretionary. The 3 digit number printed in the signature space of most cards (For Amex only, it is a 4 digit number printed on the front of the card). Also known as \"CVV\" or \"CVV2\".  |The following test details can be used in sandbox only:#### Visa Credit Card:- CardNumber\t- 4715059999000437- ExpiryDate\t- 05/21- CV2\tInteger - 222#### Visa Debit Card:- CardNumber\t- 4508750015741019- ExpiryDate\t- 05/21- CV2\tInteger - 222#### American Express:- CardNumber\t- 345678000000007- ExpiryDate\t- 05/21- CV2\tInteger - 2222NB: We do not provide test card details for the production (live) environment.",
        "url": "/hxapi/payment/"
      }
      ,
    
      "payment-gateway-refund": {
        "title": "Payment Gateway: Refund",
        "content": "# Payment Gateway: Refund[API Docs](/) > [Payment Gateway](/payment-gateway/) > [Refund](/payment-gateway/refund)## Refund RequestThis endpoint will make a refund based on existing payments.### MethodPOST### EndpointTo make a refund, the endpoint to use is:```https://payment-gateway.holidayextras.co.uk/refund```### Request Headers| Name  | Data Type | Format | Mandatory? | Additional Information || ----  | --------- | ------ | ---------- | ---------------------- || Content-Type | String | `application/json` | Y | This should always be `application/json` || Authorization   | String | `Basic dXNlcm5hbWU6cGFzc3dvcmQ=` | Y | Base64 encoded string for the `username:password` credentials which will be created and provided to you. This header is required with every request.|| Accept | String | `application/vnd.holidayextras.v1+json` | N | To use a different version please provide a different value. |### Request ParametersNB: All parameter names are case sensitive. | Name  | Data Type | Format | Mandatory? | Additional Information | | ----  | --------- | ------ | ---------- | ---------------------- | | channel | String | [A-Z] | Y | This will be supplied with your authentication credentials. | | payments | Array | [String, String] | Y | An array listing all payments made for this booking. | | amount | String | [0-9] | Y | The price (in pence) to be refunded. |## Refund ResponseFor a detailed explanation of the fields returned, please see below: | Field | Additional Information | | ----- | ---------------------- | | amount | The amount that has been refunded | | status | The status of the refund | | error | The error if the refund fails |## ExamplesBelow are examples of both the request and response for a refund.### Refund Request**POST**  `https://payment-gateway.holidayextras.co.uk/refund`**HEADERS** `Content-Type: application/json` `Accept: application/vnd.holidayextras.v1+json` `Authorization: Basic dXNlcm5hbWU6cGFzc3dvcmQ=````{  \"channel\": \"channel\",  \"payments\": [\"testPaymentId1\", \"testPaymentId2\"],  \"amount\": \"1234\"}```### Refund Response#### Successful Refund```{    \"amount\": 12.34,    \"id\": \"REFUND-testPaymentId1\",    \"status\": \"SUCCESS\"}```#### Failed Refund```{    \"amount\": 12.34,    \"status\": \"FAIL\",    \"error\": \"Failed making refund\"}```",
        "url": "/payment-gateway/refund/"
      }

      "hxapi-request24": {
        "title": "Amend-no-reprice",
        "content": "# Amend-no-repriceThis must be a POST, as you are amending a booking. It must be made over HTTPS, you must enforce this.Unlike the normal amend process, you will not be asked for confirmation before completing this. There is only one request to send for amend-no-reprice## /booking/YourBookingRef### MethodPOST### Parameters | Name           | Data Type | Format     | Required | | ----           | --------- | ------     | -------- | | StartCustomer  | String    | [0-9]{6}   | Y        | | BusinessUnit   | String    | [0-9]{3}   | Y        | | Operator       | String    | [A-Z]{3}   | Y        | | BookingRef     | String    | [A-Z0-9] {5,12} | Y        | | ReturnFlight   |           | [A-Z0-9] {10} | N        | | Remarks        | String    | [A-Z0-9] {60} | N        | | Registration   | String    | [A-Z0-9] {10} | Y        | | Pax            | Number    | [0-9] {2} | N        | | CarMake        | String    | [A-Z0-9] {10} | N        | | CarModel       | String    | [A-Z0-9] {10} | N        | | CarColour      | String    | [A-Z0-9] {10} | N        | | OutFltNo       | String    | [A-Z0-9] {10} | N        | | InFltNo        | String    | [A-Z0-9] {10} | N        | | OutFltTime     | Number    | HHMM       | N        | | InFltTime      | Number    | HHMM       | N        | | OutTerminal    |           | [A-Z0-9] {4} | N        | | RetTerminal    |           | [A-Z0-9] {4} | N        | | ShipName       |           | [A-Z0-9] {20} | N        | | PierName       |           | [A-Z0-9] {20} | N        | | ChildSeat      | Boolean   | [Y/N] | N        | | AddlServices   | Boolean   | [Y/N]| N        | | MobileNum      |           | [A-Z0-9] {15} | N        | | CarDropoffTime | Number    | HHMM       | N        | | CarPickupTime  | Number    | HHMM       | N        | | Title          | String    | [A-Z] {4}| Y        | | Initial        | String    | [A-Z] {1} | Y        | | Surname        | String    | [A-Z] {15} | Y        | | Address        | Striing   | [A-Z0-9] {25} | N        | | Town           | String    | [A-Z0-9] {20} | N        | | County         | String    | [A-Z0-9] {20} | N        | | PostCode       | String    | [A-Z0-9] {10} | N        | | DayPhone       |           | [A-Z0-9] {20} | N        | | EvePhone       |           | [A-Z0-9] {20} | N        | | Confirmation   | Boolean   | [Y/N]      | Y        | | DataProtection | Boolean   | [Y/N] | N        | | Email          | String    | [A-Z0-9] {50}| N        | | InvoiceReqd    | Boolean   | [Y/N]| N        | | TaxType        | String    | [A-Z0-9] {2} | N        | | TaxLocation    | String    | [A-Z0-9] {3} | N        | | InvLanguage    | String    | [A-Z0-9] {2} | N        | | InvHouseNo     | Integer   | [0-9] {4}    | N        | | InvCountry     | String    | [A-Z0-9] {20} | N        | | InvStreet      | String    | [A-Z0-9] {20} | N        | | InvTown        | String    | [A-Z0-9] {20} | N        | | InvPostcode    | String    | [A-Z0-9] {10} | N        | | InvCompany     | String    | [A-Z0-9] {40} | N        | | CustVATNo      | String    | [A-Z0-9] {10} | N        | | SupplierVATId  | String    | [A-Z0-9] {15} | N        | | InvTitle      | String    | [A-Z0-9] {4} | N        | | InvFirstName      | String    | [A-Z0-9] {20} | N        | | InvSurname      | String    | [A-Z0-9] {15} | N        | | InvEmail      | String    | [A-Z0-9] {50} | N        |### Requestsznt -> api```https://api.holidayextras.co.uk/de-start/sandbox/v1/booking/10524994/?BookingRef=FBKM6&BusinessUnit=001&CarDropoffTime=1200&CarPickupTime=1300&Confirmation=Y&County=testcountyaenderung&Email=test.email&Initial=T&Operator=BJT&Remarks=test&Surname=Testnameaenderung&Title=Herr&TraveltainmentCustomer=111111&holidayextras.com=&key=YourKey```api -> chauntry```xml            111111        001        BJT        Y                FBKM6                        test tcountyaenderung            test.email            T            BJT            test            Testnameaenderung            Herr            111111                        YourKey            de            ABG            ```### Request Fields ExplainedAny fields sent through in the level 24 request will amend what is saved to chipsFields include:BookingRef - Reference of the booking which is to be amendedAddress - An array of address lines to replace the current addressPax - Number of passengers#### Invoice Only Fieldslang - Language for the invoiceHouseNumberCountryCompanyCustomerVAT",

      "security": {
        "title": "Security",
        "content": "# SecurityProtecting customers' data by having secure systems is a top priority for Holiday Extras. Since the introduction of the General Data Protection Regulations (GDPR) came into force on 25th May 2018, we have updated and made public key information around our data security and privacy policies for our customers and partners. Please see the relevant sections below for more details.## Security StandardsTo assist with understanding how we comply with GDPR, we have prepared this policy document containing details of our [security standards](https://drive.google.com/file/d/17BXVXOAiHj2aVYB8OwDqf29GR_B0DfO4/view). If you have specific questions concerning this then please contact your Account Manager.## Business Continuity and Disaster Recovery PolicyIn the event of a disaster or unforeseen event affecting our business operations, we follow internal policies and procedures. As we cannot make these publicly available, here is a summary of our [business continuity and disaster recovery policies.](https://docs.google.com/document/d/1hC4IwGUHDl0yj_8bJat8rU1DRGlFLUlSFwcMpMOmKBo/edit)## Privacy PolicyIn line with GDPR, we have updated our [Privacy Policy](https://www.holidayextras.co.uk/privacy.html) - this is applicable where we are processing customer data on behalf of our partners.",
        "url": "/security/"
      }

      "hxapi-usertoken": {

        "content": "# Generating A User Token[API Docs](/hxapi/) > endpoint:[usertoken](/hxapi/usertoken)Any request to the API for either availability or to make a booking must include a valid user token. Your application should obtain a new user token for every user who embarks on an availability search. Once a user has made a booking, we expect the user token to be dropped, **it should not be reused**.This is not intended as a mechanism for identifying returning users. If you require that functionality, your application should handle it separately.## MethodGET## Parameters | Name | Data Type | Mandatory? | | ---- | --------- | -------- | | key  | String    | Y        |## Request```https://api.holidayextras.co.uk/v1/usertoken?key=YourKey```## Reply```xml    YourToken    /v1                        YourKey            1            ```",
        "url": "/hxapi/usertoken/"

      "hxapi-viewamendcancel-view": {
        "title": "View Booking",
        "content": "# View Booking[API Docs](/hxapi/) > product:[view](/hxapi/viewamendcancel/view)## View Booking RequestThis method works for bookings made for any product type using our API.### MethodGET### EndpointThe endpoint to use is (where `YourBookingRef` is the Holiday Extras booking reference):{% codetabs %}{% codetab XML %}```https://api.holidayextras.co.uk/v1/booking/YourBookingRef```{% endcodetab %}{% codetab JSON %}```https://api.holidayextras.co.uk/v1/booking/YourBookingRef.js```Note the `.js` extension.{% endcodetab %}{% endcodetabs %}### Request ParametersNB: All parameter names are case sensitive.| Name        | Data Type    | Format | Mandatory? | Additional Information || ----        | ----    | --------- | -------- | ---------------------- || ABTANumber  | String  | [A-Z0-9] 5 chars | Y | This is also known as an 'agent code'. This will be confirmed to you by your Account Manager during set up.|| Password    | String  | [A-Z0-9] 5 chars | N*       | Password required for retail agent requests - intermediaries do not require a password.This will be confirmed to you by your Account Manager during set up.|| Initials    | String  | [A-Z] 3 chars | N  | The initials of the Operator / Agent. || key         | String  | [A-Z]                                  | Y        | This will be assigned to you by your Account Manager during set up.|| Email | String | [A-Z0-9] 50 chars | Y        | Email address used to make the booking (i.e. the email address of the lead passenger)|| System      | String  | [A-Z] 3 chars | Y*       | For European products, you need to pass in the value of `System=ABG` (the default is `System=ABC`, which is UK products only). |## View Booking ResponseThe view booking response will return all of the details against that booking record in our system.For a detailed explanation of the fields returned, please see below:| Field                | Additional Information || ----                 | ---------------------- || Booking/BookingRef  | This is the reference for this booking. It must be referred to in all communication with us concerning this booking. NB: Our booking references are up to 12 char alphanumeric (including 1/I and 0/O/Q).|| Booking/Amendable | This will return one of the following: `Y` = booking can be amended; `N` = booking cannot be amended; `C` = booking has been cancelled; `S` = booking is same day so cannot be amended or cancelled. || Booking/CanxDate | If the booking has been cancelled, the date on which it was will return here. || Booking/AgentComm  | Commission you have earned from this booking. || Booking/BookingDate | The date the booking was originally made on. || Booking/PdfURL | A link to generate a pdf version of the booking confirmation. || Itinerary | This block will return details of the original booking, as per the booking response for each product type. Please see the respective booking guides for further details on the fields. || ClientDetails | This block will return details of the lead passenger. || Pricing | This block will return details of the price paid by the customer. || VAT | Please ignore this block. || CustRef | If you have passed in a Customer Reference with your original booking request, it will return here. || BarCode | A link to generate a bar code for the booking confirmation. || API_Header/Request  | A list of parameters that were sent in the view booking request. |## Worked ExamplesBelow are worked examples of both the request and response for view a booking.### UK Products View Booking Request (for a car park){% codetabs %}{% codetab XML %}```https://api.holidayextras.co.uk/v1/booking/YourBookingRef?ABTANumber=YourABTANumber&Password=YourPassword&Initials=YourInitials&key=YourKey&Email=test@test.com```{% endcodetab %}{% codetab JSON %}```https://api.holidayextras.co.uk/v1/booking/YourBookingRef.js?ABTANumber=YourABTANumber&Password=YourPassword&Initials=YourInitials&key=YourKey&Email=test@test.com```Note the `.js` extension.{% endcodetab %}{%
